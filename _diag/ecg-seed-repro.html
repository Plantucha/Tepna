<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>ECGDex seed repro</title>
<style>body{background:#0c0c0f;color:#d8d8df;font:13px/1.55 ui-monospace,Menlo,monospace;margin:0;padding:20px}
pre{white-space:pre-wrap}.ok{color:#5fbf7f}.bad{color:#ff6a6a}.dim{color:#888}h2{color:#9fc7ff;font-size:14px;border-bottom:1px solid #2a2a33;padding-bottom:6px;margin:22px 0 10px}</style>
</head><body>
<pre id="out">running…</pre>
<script src="../ecgdex-dsp.js"></script>
<script>
const out = document.getElementById('out');
const L = [];
const log = (s='', cls='') => L.push(cls ? `<span class="${cls}">${s}</span>` : s);
const flush = () => out.innerHTML = L.join('\n');

// ── REAL opening transient captured from Polar_H10_..._20260625_215300_ECG.txt (samples 0..129, ~1 s) ──
const REAL_TRANSIENT = [5064,4976,4906,4848,4755,4689,4645,4554,4468,4422,4340,4280,4301,4245,4087,4026,4052,3993,3882,3828,3786,3696,3609,3570,3535,3465,3400,3367,3316,3239,3177,3153,3144,3088,2988,2932,2907,2846,2799,2790,2758,2692,2632,2592,2546,2481,2422,2385,2353,2311,2287,2271,2234,2213,2259,2401,2536,2432,2052,1675,1573,1685,1773,1787,1782,1747,1708,1687,1659,1617,1589,1566,1543,1529,1501,1463,1433,1412,1394,1373,1352,1338,1326,1315,1296,1284,1287,1280,1247,1217,1203,1177,1142,1121,1093,1042,989,940,891,849,814,784,754,733,714,695,681,667,654,642,630,616,602,586,570,556,549,535,519,505,486,467,453,444,425,409,397,386,370,353];

// ── detector internals copied VERBATIM from ecgdex-dsp.js (lines 347-414) so the test reflects real behaviour ──
function bandpass(int16, fs){
  const N=int16.length, x=new Float32Array(N);
  const RChp=1/(2*Math.PI*5), aHp=RChp/(RChp+1/fs); let yh=0,xp=0;
  for(let i=0;i<N;i++){const xi=int16[i]; yh=aHp*(yh+xi-xp); xp=xi; x[i]=yh;}
  const RClp=1/(2*Math.PI*15), aLp=(1/fs)/(RClp+1/fs); let yl=0;
  for(let i=0;i<N;i++){yl=yl+aLp*(x[i]-yl); x[i]=yl;}
  return x;
}
function ptFeature(bp, fs){
  const N=bp.length, d=new Float32Array(N);
  for(let i=2;i<N-2;i++) d[i]=(2*bp[i+1]+bp[i+2]-bp[i-2]-2*bp[i-1]);
  const sq=new Float32Array(N); for(let i=0;i<N;i++) sq[i]=d[i]*d[i];
  const win=Math.max(1,Math.round(0.10*fs)), integ=new Float32Array(N); let acc=0;
  for(let i=0;i<N;i++){acc+=sq[i]; if(i>=win) acc-=sq[i-win]; integ[i]=acc/win;}
  return integ;
}
// BUGGY seeding (current code): init = MAX of first 2 s
function detectPeaks_current(int16, bp, fs){
  const N=int16.length, integ=ptFeature(bp,fs), refractory=Math.round(0.20*fs);
  let init=0; const initN=Math.min(N,2*fs);
  for(let i=0;i<initN;i++) init=Math.max(init,integ[i]);
  let SPKI=0.5*init, NPKI=0.1*init, THRI=NPKI+0.25*(SPKI-NPKI);
  const peaks=[]; let last=-refractory;
  for(let i=1;i<N-1;i++){
    if(integ[i]>integ[i-1]&&integ[i]>=integ[i+1]&&integ[i]>THRI){
      if(i-last>refractory){const w=Math.round(0.07*fs);let bi=i,bv=-Infinity;for(let j=Math.max(0,i-w);j<=Math.min(N-1,i+w);j++){if(int16[j]>bv){bv=int16[j];bi=j;}}peaks.push(bi);last=i;SPKI=0.125*integ[i]+0.875*SPKI;}
      else NPKI=0.125*integ[i]+0.875*NPKI;
    } else if(integ[i]>integ[i-1]&&integ[i]>=integ[i+1]) NPKI=0.125*integ[i]+0.875*NPKI;
    THRI=NPKI+0.25*(SPKI-NPKI);
  }
  return {peaks, seedInit:init};
}
// FIX A — robust seed from a global percentile of integ (a 2 s startup transient is negligible over the night)
function quantileSub(arr, q){
  const step=Math.max(1,Math.floor(arr.length/20000)), s=[];
  for(let i=0;i<arr.length;i+=step) s.push(arr[i]);
  s.sort((a,b)=>a-b); return s[Math.min(s.length-1,Math.floor(q*s.length))];
}
function detectPeaks_robust(int16, bp, fs){
  const N=int16.length, integ=ptFeature(bp,fs), refractory=Math.round(0.20*fs);
  const init=quantileSub(integ,0.99);                       // ← only change: global 99th pct, not max(first 2s)
  let SPKI=0.5*init, NPKI=0.1*init, THRI=NPKI+0.25*(SPKI-NPKI);
  const peaks=[]; let last=-refractory;
  for(let i=1;i<N-1;i++){
    if(integ[i]>integ[i-1]&&integ[i]>=integ[i+1]&&integ[i]>THRI){
      if(i-last>refractory){const w=Math.round(0.07*fs);let bi=i,bv=-Infinity;for(let j=Math.max(0,i-w);j<=Math.min(N-1,i+w);j++){if(int16[j]>bv){bv=int16[j];bi=j;}}peaks.push(bi);last=i;SPKI=0.125*integ[i]+0.875*SPKI;}
      else NPKI=0.125*integ[i]+0.875*NPKI;
    } else if(integ[i]>integ[i-1]&&integ[i]>=integ[i+1]) NPKI=0.125*integ[i]+0.875*NPKI;
    THRI=NPKI+0.25*(SPKI-NPKI);
  }
  return {peaks, seedInit:init};
}

try{
  const DSP = window.ECGDSP || window.ECGDex;
  const fs = 130;
  // clean synthetic overnight ECG (real DSP), then scale R-peaks to ~600 uV to match THIS recording
  const syn = DSP.genSynthetic({fs, durSec: 400});
  let mx=0; for(let i=0;i<syn.int16.length;i++){const a=Math.abs(syn.int16[i]); if(a>mx)mx=a;}
  const scale = 600/mx;
  const clean = new Int16Array(syn.int16.length);
  for(let i=0;i<clean.length;i++) clean[i]=Math.round(syn.int16[i]*scale);
  let mxC=0; for(let i=0;i<clean.length;i++){const a=Math.abs(clean[i]); if(a>mxC)mxC=a;}

  // dirty = real transient (+ short taper to 0) prepended to the SAME clean signal
  const taper=[]; for(let k=1;k<=30;k++) taper.push(Math.round(353*(1-k/30)));
  const pre = REAL_TRANSIENT.concat(taper);
  const dirty = new Int16Array(pre.length + clean.length);
  dirty.set(pre,0); dirty.set(clean, pre.length);

  log('<b>ECGDex R-peak seeding — reproduction with the REAL DSP</b>','');
  log(`fs=${fs} Hz · clean synthetic: ${clean.length} samples (${(clean.length/fs/60).toFixed(1)} min) · R-peak ≈ ${mxC} µV`,'dim');
  log(`transient prepended: peak ${Math.max(...REAL_TRANSIENT)} µV (real, from the file) → ratio ≈ ${(Math.max(...REAL_TRANSIENT)/mxC).toFixed(1)}× the QRS`,'dim');

  log('<h2>1 · Real analyze() — clean vs +transient</h2>');
  function tryAnalyze(rec,label){
    try{ const r=DSP.analyze(rec); log(`${label}: <span class="ok">OK</span> — ${r.nn.length} NN beats, mean HR ${r.hr}`,''); }
    catch(e){ log(`${label}: <span class="bad">THROW</span> — "${e.message}"`,''); }
  }
  tryAnalyze({int16:clean, fs, gaps:[], t0Ms:syn.t0Ms, durSec:clean.length/fs}, 'clean signal            ');
  tryAnalyze({int16:dirty, fs, gaps:[], t0Ms:syn.t0Ms, durSec:dirty.length/fs}, 'clean + real transient  ');

  log('<h2>2 · Why — detector peak counts on the +transient signal</h2>');
  const bpD = bandpass(dirty, fs);
  const cur = detectPeaks_current(dirty, fs?bpD:bpD, fs);
  const rob = detectPeaks_robust(dirty, bpD, fs);
  const bpC = bandpass(clean, fs);
  const curClean = detectPeaks_current(clean, bpC, fs);
  log(`current seed (max of first 2 s):  init=${cur.seedInit.toExponential(2)}  →  <span class="${cur.peaks.length<12?'bad':'ok'}">${cur.peaks.length} peaks</span>  ${cur.peaks.length<12?'→ throws "Too few R-peaks"':''}`,'');
  log(`  (same detector on the CLEAN signal, no transient: <span class="ok">${curClean.peaks.length} peaks</span> — so the signal is fine; the SEED is the problem)`,'dim');
  log(`robust seed (global 99th pct):     init=${rob.seedInit.toExponential(2)}  →  <span class="${rob.peaks.length<12?'bad':'ok'}">${rob.peaks.length} peaks</span>  ${rob.peaks.length>=12?'→ recovers':''}`,'');

  log('<h2>3 · The mechanism</h2>');
  log('• The 2 s seed window is dominated by the ~5 kµV electrode-settling decay.','dim');
  log('• ptFeature squares the derivative → the seed init is set ~ '+(cur.seedInit/rob.seedInit).toFixed(0)+'× the real QRS level.','dim');
  log('• THRI floors at ~0.25·SPKI, and SPKI ONLY updates when a peak fires — so once seeded high it never recovers.','dim');
  log('• Net: no beat ever crosses threshold → <12 peaks → analyze() throws.','dim');
  flush();
}catch(e){ log('HARNESS ERROR: '+e.message+'\n'+e.stack,'bad'); flush(); }
</script>
</body></html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>ECGDex seed fix — verify patched DSP</title>
<style>body{background:#0c0c0f;color:#d8d8df;font:13px/1.55 ui-monospace,Menlo,monospace;margin:0;padding:20px}
.ok{color:#5fbf7f}.bad{color:#ff6a6a}.dim{color:#888}h2{color:#9fc7ff;font-size:14px;border-bottom:1px solid #2a2a33;padding-bottom:6px;margin:20px 0 10px}</style>
</head><body>
<pre id="out">running…</pre>
<script src="../ecgdex-dsp.js"></script>
<script>
const out=document.getElementById('out'), L=[];
const log=(s='',c='')=>L.push(c?`<span class="${c}">${s}</span>`:s); const flush=()=>out.innerHTML=L.join('\n');
function transient(peak, fs){ const n=Math.round(2*fs), a=[]; for(let i=0;i<n;i++) a.push(Math.round(peak*Math.exp(-i/(0.27*fs)))); for(let k=1;k<=20;k++) a.push(Math.round(a[a.length-1]*(1-k/20))); return a; }
function prepend(int16, pre){ const d=new Int16Array(pre.length+int16.length); d.set(pre,0); d.set(int16,pre.length); return d; }
try{
  const DSP=window.ECGDSP||window.ECGDex, fs=130; let allPass=true;
  log('<b>ECGDex R-peak SEED FIX — patched analyze() end-to-end</b>');
  log('seed helper present: '+(typeof DSP._seedScale==='function' ? '<span class="ok">no (closure-private, expected)</span>' : '<span class="dim">private</span>'),'');
  function run(scenario, durSec){
    const syn=DSP.genSynthetic({fs, durSec, scenario});
    // scale to ~600 µV R-peaks to match the real recording, then prepend a ~5 kµV settling transient
    let mx=0; for(let i=0;i<syn.int16.length;i++){const v=Math.abs(syn.int16[i]); if(v>mx)mx=v;}
    const sc=600/mx, clean=new Int16Array(syn.int16.length);
    for(let i=0;i<clean.length;i++) clean[i]=Math.round(syn.int16[i]*sc);
    const dirty=prepend(clean, transient(5000, fs));
    let rc=null,rd=null,ec=null,ed=null;
    try{ rc=DSP.analyze({int16:clean,fs,gaps:[],t0Ms:syn.t0Ms,durSec:clean.length/fs}); }catch(e){ ec=e.message; }
    try{ rd=DSP.analyze({int16:dirty,fs,gaps:[],t0Ms:syn.t0Ms,durSec:dirty.length/fs}); }catch(e){ ed=e.message; }
    const cN=rc?rc.nn.length:0, dN=rd?rd.nn.length:0;
    const ratio=cN?dN/cN:0, hrOK=rc&&rd?Math.abs(rc.hr-rd.hr)<=3:false;
    const pass = !!rc && !!rd && ratio>=0.85 && hrOK;
    allPass = allPass && pass;
    log(`<b>${scenario}</b> (${(durSec/60).toFixed(0)} min):`);
    log(`  clean  : ${rc?`<span class="ok">OK</span> ${cN} beats, HR ${rc.hr}`:`<span class="bad">THROW "${ec}"</span>`}`);
    log(`  +transient: ${rd?`<span class="ok">OK</span> ${dN} beats, HR ${rd.hr}`:`<span class="bad">THROW "${ed}"</span>`}  ${rd?`(ratio ${(ratio*100).toFixed(0)}% · ΔHR ${rc?Math.abs(rc.hr-rd.hr).toFixed(1):'?'})`:''}`);
    log(`  verdict: ${pass?'<span class="ok">PASS — transient no longer suppresses detection</span>':'<span class="bad">FAIL</span>'}`);
  }
  run('hour', 1800);
  run('osa', 2*3600);
  log('');
  log(allPass?'<span class="ok">★ ALL SCENARIOS PASS — seed fix verified on the real patched DSP</span>':'<span class="bad">✗ a scenario failed</span>');
  flush();
}catch(e){ log('HARNESS ERROR: '+e.message+'\n'+(e.stack||''),'bad'); flush(); }
</script>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>texture test (worker)</title></head>
<body style="background:#0c0f14;color:#e6edf6;font-family:ui-monospace,monospace;padding:16px">
<h3>Texture test (worker pool) — rMSSD transfer + DFA-α1</h3>
<div id="out">booting…</div>
<script>
'use strict';
const out=document.getElementById('out');
const K=Math.min(8,navigator.hardwareConcurrency||4);
let workers=[],pend=new Map(),seq=1,PTS=[];
function boot(){let readies=[];for(let i=0;i<K;i++){const w=new Worker('_texworker.js');const rec={w};workers.push(rec);
  readies.push(new Promise(res=>{let done=false;w.onmessage=ev=>{const m=ev.data||{};
    if(m.type==='ready'){if(!done){done=true;res();}}
    else if(m.type==='done'){const p=pend.get(m.reqId);if(p){pend.delete(m.reqId);p(m);}}};}));}
  return Promise.all(readies);}
function job(rec,seed){return new Promise(res=>{const id=seq++;pend.set(id,res);rec.w.postMessage({type:'job',reqId:id,seed});});}
async function run(N){
  await boot();
  let next=0,done=0;
  async function lane(rec){while(next<N){const s=next++;const m=await job(rec,s);
    if(m.nights)m.nights.forEach(x=>PTS.push(x));
    done++;if(done%100===0)out.textContent='patient '+done+'/'+N+' · '+PTS.length+' nights';}}
  await Promise.all(workers.map(lane));
  finish();
}
function finish(){
  const bins={};PTS.forEach(([t,r])=>{const b=Math.round(t/5)*5;(bins[b]||(bins[b]=[])).push(r);});
  const rows=Object.keys(bins).map(Number).sort((a,b)=>a-b).map(b=>{const a=bins[b];const m=a.reduce((s,v)=>s+v,0)/a.length;
    const sd=Math.sqrt(a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length);return{t:b,rend:+m.toFixed(1),sd:+sd.toFixed(1),k:a.length};});
  const lo=PTS.filter(p=>p[0]<=15).map(p=>p[1]).sort((a,b)=>a-b);
  const loMean=lo.length?lo.reduce((s,v)=>s+v,0)/lo.length:null;
  const rend=PTS.map(p=>p[1]).sort((a,b)=>a-b);const rmin=rend[0],rmax=rend[rend.length-1];
  const nearFloor=rend.filter(v=>v<=rmin+0.8).length;
  const a1s=PTS.filter(p=>p[0]>=25&&p[0]<=55&&p[2]!=null&&p[3]>=200).map(p=>p[2]).sort((a,b)=>a-b);
  const a1mean=a1s.length?a1s.reduce((s,v)=>s+v,0)/a1s.length:null;
  const a1med=a1s.length?a1s[Math.floor(a1s.length/2)]:null;
  // a1 across LOW targets too (do they keep texture?)
  const a1lo=PTS.filter(p=>p[0]<=15&&p[2]!=null&&p[3]>=200).map(p=>p[2]).sort((a,b)=>a-b);
  const a1loMed=a1lo.length?a1lo[Math.floor(a1lo.length/2)]:null;
  window.__T={nNights:PTS.length,rmin:+rmin.toFixed(1),rmax:+rmax.toFixed(1),
    floorT15:{mean:loMean==null?null:+loMean.toFixed(1),min:lo[0],max:lo[lo.length-1],k:lo.length},
    pctNearFloor:+(100*nearFloor/PTS.length).toFixed(2),
    a1_bulk:{mean:a1mean==null?null:+a1mean.toFixed(3),median:a1med==null?null:+a1med.toFixed(3),k:a1s.length},
    a1_lowT:{median:a1loMed==null?null:+a1loMed.toFixed(3),k:a1lo.length},
    transfer:rows};
  out.innerHTML='<b>DONE</b> nights='+PTS.length+' · rendered ['+rmin.toFixed(1)+','+rmax.toFixed(1)+'] · floorPileup '+(100*nearFloor/PTS.length).toFixed(2)+'%<br>'
    +'target≤15 → mean '+(loMean==null?'—':loMean.toFixed(1))+' ['+lo[0]+'…'+lo[lo.length-1]+'] k='+lo.length+'<br>'
    +'<b>α1 bulk(25-55) median '+(a1med==null?'—':a1med.toFixed(3))+' mean '+(a1mean==null?'—':a1mean.toFixed(3))+'</b> · α1 lowT(≤15) median '+(a1loMed==null?'—':a1loMed.toFixed(3))+'<br><br>'
    +'<table border=1 cellpadding=3 style="border-collapse:collapse"><tr><th>target</th><th>rend</th><th>sd</th><th>k</th></tr>'
    +rows.map(r=>'<tr><td>'+r.t+'</td><td>'+r.rend+'</td><td>'+r.sd+'</td><td>'+r.k+'</td></tr>').join('')+'</table>';
}
run(1600);
</script>
</body></html>

name: types

# Phase 4a — machine-checked contracts (SIGNAL-ADAPTER-AND-FRONTIER brief).
# Runs `tsc --noEmit --checkJs` over the clean CORE adapter layer (tsconfig.json).
# CI-ONLY: it emits nothing, ships nothing, adds no runtime dependency or CDN —
# the 100%-local / single-file / offline invariant (CLAUDE.md §5.3) is untouched.
# This is a dev-time gate that gives the next coder a precise, checkable target;
# it is independent of the Node assertion suite (tests.yml) and the browser
# gates (browser-gates.yml).

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Type-check CORE contracts (tsc --noEmit --checkJs)

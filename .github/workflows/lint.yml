name: lint

# ⚠ COMPATIBILITY SHIM (BIOME-FORMATTER Phase 3 step 2). ESLint the TOOL is retired — there is no
# `.eslintrc`, no `npx eslint`, and `npm run lint` runs Biome. This workflow exists ONLY because the
# `main` branch Ruleset still lists a REQUIRED status check named `eslint`; a PR that removed the old
# ESLint job therefore can't merge until that check reports. So the job below is keyed `eslint` (to
# produce that check name) but runs `biome lint` — the same control-flow/dead-code floor Biome now owns.
#
# 👉 DELETE THIS FILE once `eslint` is removed from the main Ruleset's required status checks
#    (Settings → Rules → Rulesets). At that point Biome's lint already runs inside format.yml
#    (`biome ci --changed`), so this file has no remaining purpose.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pinned Biome (devDependency)
        run: npm ci
      - name: Biome lint (satisfies the legacy `eslint` required-check; ESLint itself is retired)
        run: npx @biomejs/biome lint --no-errors-on-unmatched

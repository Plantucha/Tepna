name: lint

# OWN-THE-BUILD Part D.1 — ESLint over the SOURCE *.js/*.mjs (the flake8 analog).
# Catches the CONTROL-FLOW / DEAD-CODE / logic-smell class the behavior + provenance
# gates cannot see (see .eslintrc.json for the rule floor + rationale). CI-ONLY:
# emits nothing, ships nothing, adds no runtime dependency/CDN — the 100%-local /
# single-file / offline invariant (CLAUDE.md) is untouched.
#
# LINT ONLY — NEVER `--fix` in CI: an autofix rewrites source bytes, which moves
# every inlined bundle's manifestHash and would force a fleet re-bundle. The
# bundled *.html are ignored by .eslintrc (they are build outputs, not source).
# Version-PINNED for determinism. Independent of tests.yml / types.yml /
# browser-gates.yml and SUBORDINATE to them — a green lint never means the science
# is tested; correctness confidence comes from the behavior + equiv/provenance gates.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: ESLint source (.js/.mjs; no --fix)
        run: npx -y eslint@8.57.0 . --ext .js,.mjs --max-warnings=100000

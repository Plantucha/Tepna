name: biome

# BIOME-FORMATTER — Biome, CHECK-ONLY. The `biome` status check (this workflow) is the SOLE format + lint
# gate; ESLint was fully RETIRED (.eslintrc + the npx eslint script + the old lint.yml shim all deleted;
# `npm run lint` = biome). Two event modes, BOTH now enforce whole-tree-consistent format + the lint floor:
#   • PR            → CHANGED-FILES-ONLY format + lint (`biome ci --changed`) — fast per-PR gate.
#   • push / manual → WHOLE-TREE format + lint (`biome ci`). As of ARCHITECTURE-DEBT-REDUCTION §P4 the whole
#                     tree is Biome-formatted and the biome.json formatter-override list is RETIRED, so the
#                     on-push sweep is now `biome ci` (format + lint), not the old `biome lint`-only floor.
#                     "is this file format-gated?" is no longer a guess — every in-scope *.js is.
# `biome.json linter.rules` = the control-flow / dead-code floor (0 errors on the current tree). Warnings do
# not fail the gate (advisory, as ESLint's --max-warnings=100000 was).
# CI-ONLY: emits nothing, ships nothing, adds no runtime dependency/CDN — the 100%-local / single-file /
# offline invariant (CLAUDE.md) is untouched. Biome is a devDependency (package.json), exactly like tsc.
#
# ⚠ CHECK-ONLY — NEVER `--write` in CI (CLAUDE.md §🔏): a formatter that reflows a shipped *.js moves that
# bundle's manifestHash and forces a fixture re-record. So the gate only VALIDATES format; applying it is an
# author-side step (run `biome format --write` locally, then re-bundle). `--no-errors-on-unmatched` keeps a
# docs/config-only PR (zero in-scope files) green instead of erroring.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so Biome can diff changed files vs the base branch
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pinned Biome (devDependency; ships nothing)
        run: npm ci
      # PR → format + lint on the CHANGED *.js/*.mjs only (the §B2-safe --changed gate: never demands a
      # legacy file be reformatted just because a sibling PR touched it).
      - name: Biome format + lint-floor check — changed files (PR)
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.base_ref || 'main' }}"
          git fetch --no-tags origin "$BASE"
          npx @biomejs/biome ci --changed --since="origin/$BASE" --no-errors-on-unmatched
      # push to main / manual → the WHOLE-TREE format + lint gate. Since ARCHITECTURE-DEBT-REDUCTION §P4
      # reflowed the whole tree and retired the biome.json formatter-override list, whole-tree FORMAT is
      # now 0 errors (it was the override list that used to force this to lint-only). So the on-push sweep
      # is `biome ci` (format + lint), making format enforcement unconditional everywhere. `--changed` is
      # meaningless on a push to main (it would diff the commit against itself), so the sweep is whole-tree.
      - name: Biome format + lint — whole tree (push / manual)
        if: github.event_name != 'pull_request'
        run: npx @biomejs/biome ci --no-errors-on-unmatched

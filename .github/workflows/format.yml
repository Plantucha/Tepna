name: biome

# BIOME-FORMATTER Phases 0–1 (formatter) + Phase 3 (lint floor) — Biome, CHECK-ONLY. The `biome` status
# check (this workflow) is the SOLE format + lint gate; ESLint was fully RETIRED in Phase 3 (.eslintrc + the
# npx eslint script + the old lint.yml shim all deleted; `npm run lint` = biome). Two event modes:
#   • PR            → CHANGED-FILES-ONLY format + lint (`biome ci --changed`) — never touches the untouched
#                     legacy tree (the §B2-safe gate; see the --changed note below).
#   • push / manual → WHOLE-TREE lint floor (`biome lint`) — the on-push coverage the retired eslint shim
#                     ran, now under the `biome` name (lint only; whole-tree format is deliberately NOT run,
#                     see §🔏). This mirrors tests.yml/types.yml/no-network.yml, which also run on push.
# `biome.json linter.rules` = the control-flow / dead-code floor (0 errors on the current tree). Warnings do
# not fail the gate (advisory, as ESLint's --max-warnings=100000 was).
# CI-ONLY: emits nothing, ships nothing, adds no runtime dependency/CDN — the 100%-local / single-file /
# offline invariant (CLAUDE.md) is untouched. Biome is a devDependency (package.json), exactly like tsc.
#
# ⚠ CHECK-ONLY — NEVER `--write` in CI (CLAUDE.md §🔏 / brief §B2): a formatter that reflows a shipped
# *.js moves that bundle's manifestHash and forces a full fixture re-record for identical behavior. So the
# gate only VALIDATES format; applying it is on-touch only (a file you are already re-bundling). `--changed`
# is what makes this §B2-safe — a PR that doesn't touch a legacy file never demands it be reformatted, so
# this gate is green from day one on the unformatted tree and only enforces format on what's new/touched.
# `--no-errors-on-unmatched` keeps a docs/config-only PR (zero in-scope files) green instead of erroring.
#
# FORMATTER OVERRIDE (SECURITY-CSP-STRICT-SCRIPT-SRC-2026-07-11): a few shipped bundle-source *.js files
# that predate Biome were touched by that PR with BYTE-MINIMAL diffs (the inline-handler -> data-act
# migration) but deliberately NOT reflowed — reflowing them churns every provenance fixture (§🔏) AND breaks
# ~17 format-sensitive source-text safety gates in tests/dex-tests.js. So biome.json `overrides` disables the
# FORMATTER (only) for exactly those files; the LINTER floor still runs on them. Drop a file from that list
# the day it is genuinely reformatted on a behavioral re-bundle. (This is the §B2 "on-touch" escape hatch for
# a legacy file you touched but must not reflow — encoded in config instead of left as a red gate.)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so Biome can diff changed files vs the base branch
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pinned Biome (devDependency; ships nothing)
        run: npm ci
      # PR → format + lint on the CHANGED *.js/*.mjs only (the §B2-safe --changed gate: never demands a
      # legacy file be reformatted just because a sibling PR touched it).
      - name: Biome format + lint-floor check — changed files (PR)
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.base_ref || 'main' }}"
          git fetch --no-tags origin "$BASE"
          npx @biomejs/biome ci --changed --since="origin/$BASE" --no-errors-on-unmatched
      # push to main / manual → the WHOLE-TREE lint floor (control-flow / dead-code). This is the on-push
      # coverage the retired eslint shim (lint.yml) provided, now under the `biome` name. LINT only, not
      # `ci` — whole-tree FORMAT would demand the unformatted legacy tree be reflowed (CLAUDE.md §🔏),
      # whereas whole-tree LINT is 0 errors. `--changed` is meaningless on a push to main (it would diff
      # the commit against itself), so the sweep is whole-tree.
      - name: Biome lint floor — whole tree (push / manual)
        if: github.event_name != 'pull_request'
        run: npx @biomejs/biome lint --no-errors-on-unmatched

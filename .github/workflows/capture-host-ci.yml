name: capture-host-ci

# Python CI for the OUT-OF-SUITE capture-host (the Tepna Vigil box software). Path-filtered so it runs
# ONLY when capture-host/ changes — the JS suite's Node/browser gates are unaffected, and vice versa.
# Covers the reverse-engineered BLE decoders (oxyii / polar_pmd / viatom), the suite-critical writers
# (Clock Contract / the ~10% HR-bug regression), clockcfg, and the live-sample telemetry bus. No BLE
# hardware needed — the tested modules are pure-Python (bleak/aiohttp are only imported by the runtime
# daemon: capture/webmon/bonding/pull_session/polar_psftp, which read 0% in this hardware-free CI).
# Coverage is REPORTED every run with a conservative --cov-fail-under backstop (source-only ~51% today);
# it guards against a coverage CRATER, not normal incremental additions.
#
# Runs on a MATRIX of Python versions, and the version the real box runs is required to be one of them —
# see the note on the matrix below for why that is load-bearing rather than tidiness.

# The filter includes THIS FILE: without it a change to the workflow could not run the workflow, so an
# edit to the matrix, the pin or the coverage floor would merge completely unexercised.
on:
  push:
    paths: ['capture-host/**', '.github/workflows/capture-host-ci.yml']
  pull_request:
    paths: ['capture-host/**', '.github/workflows/capture-host-ci.yml']
  workflow_dispatch:

defaults:
  run:
    working-directory: capture-host

jobs:
  test:
    runs-on: ubuntu-latest
    # ⚠️ THE BOX'S VERSION MUST BE IN THIS MATRIX. It was pinned to 3.12 alone while the Vigil box ran
    # 3.13.11 — CI was green on a Python the hardware does not execute. That is not hypothetical here:
    # capture.py's clock path calls datetime.utcnow(), deprecated in 3.12 and slated for REMOVAL, so a
    # 3.12-only CI would have stayed green through the exact release that broke the box's clock. When the
    # box is upgraded, add the new version here FIRST and let CI prove it before the box moves.
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']   # 3.13 = the box (Vigil, 3.13.11); 3.12 = the older baseline
    name: test (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tooling + runtime deps
        # The runtime deps are installed even though there is no BLE hardware here. They import fine
        # without an adapter (bleak defers all D-Bus contact to connect time), and WITHOUT them
        # polar_psftp/pull_session cannot even be imported — so any test touching them fails outright, or
        # worse, gets written as an importorskip and silently stops running. A guard that skips in CI is
        # a guard that isn't there. Installing them is also what lets those modules report real coverage.
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff
          pip install -r requirements.txt
      - name: Lint (ruff — real errors only)
        run: ruff check .
      - name: Unit tests + coverage (pytest)
        run: pytest -q --cov=. --cov-report=term-missing --cov-fail-under=48

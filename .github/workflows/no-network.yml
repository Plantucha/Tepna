name: no-network

# Privacy invariant gate — the analogue of verify-provenance. Asserts NO remote egress across the
# shipped web-app surfaces (8 bundles + Data Unifier / OverDex + their loose modules) and the
# capture-host Python lens, by booting the self-verifying no-network.html headless and reading its
# own verdict (window.__noNetworkOK). Fast (no render-coverage) → runs on every push.
# Requires the canonical-<link> scanner fix in no-network.html (else the SEO metadata false-positives).

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  no-network:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright (chromium only)
        run: |
          npm install --no-save playwright@1.48.0
          npx playwright install --with-deps chromium

      - name: Serve the repo
        run: |
          python3 -m http.server 8080 --bind 127.0.0.1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/no-network.html >/dev/null && break
            sleep 0.5
          done

      - name: Run the no-network gate
        env:
          BASE_URL: http://127.0.0.1:8080
          NN_ONLY: '1'
        run: node tests/browser-gates.mjs

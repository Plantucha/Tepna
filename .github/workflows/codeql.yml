# SPDX-License-Identifier: Apache-2.0
name: CodeQL

# CodeQL, scoped to the SOURCE (2026-07-14). Replaces GitHub's default setup, which pointed the
# analysis at the whole tree and was therefore spending most of its time on generated bytes:
#
#   authored source   *.js / *.mjs      147 files   4.8 MB   ← the only place app logic is written
#   build outputs     *.html            159 files    14 MB   ← every bundle RE-INLINES the shared spine
#   served mirror     docs/**           145 files    14 MB   ← a byte-copy of the bundles + pages
#
# Each of the 10 bundles inlines clock.js / dex-export.js / metric-registry.js / the DSPs, and docs/
# holds another full copy of all of it — so default setup was analysing the same source roughly a
# dozen times over. That is the slowness, and it also made the RESULTS worse: one real finding in a
# shared module was reported once per bundle it had been inlined into.
#
# Scoping to the sources loses no coverage of shipped code. Per CLAUDE.md the build model is
# "edit the *.js + .src.html, never the bundled .html" — 100 % of runtime logic is authored in *.js,
# and the bundles are a pure projection of it. The HTML we skip is either a build output or a
# gate/harness page (Dex-Test-Suite.html, verify-provenance.html) that never ships to a user.
#
# The security surface this exists to watch is real and is fully inside the scanned set: the apps
# parse UNTRUSTED user files (vendor CSV/TXT/EDF from consumer devices) and render the results into
# the DOM — a genuine DOM-XSS / prototype-pollution surface, all of it in *-dsp.js / *-render.js /
# *-app.js. capture-host/*.py is real Python (the Polar BLE capture host).
#
# NOT a required check (ruleset `protect-main` requires: test · no-network · typecheck · biome).
# A security scanner should inform a merge, not gate a release cut.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # weekly full sweep, so a new query pack still sees the tree even in a quiet week
    - cron: '17 3 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # default setup listed javascript, javascript-typescript AND typescript — overlapping aliases
        # for one analysis. `javascript-typescript` is the single canonical language; `actions` scans
        # the workflows themselves (supply-chain), and is cheap (~40 s).
        language: [javascript-typescript, python, actions]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # paths-ignore applies to the interpreted languages (JS/TS, Python) — exactly our case.
          config: |
            paths-ignore:
              - '**/*.html'
              - 'docs/**'
              - 'docs-archive/**'
              - 'uploads/**'
              - 'node_modules/**'

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

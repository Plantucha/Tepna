; }\n.progress-bar { height:100%; background:linear-gradient(90deg,var(--blue),var(--teal)); border-radius:4px; transition:width .3s; width:0; box-shadow:0 0 12px rgba(61,224,208,.45); }\n\n/* ── ERROR / STATUS ────────────────────────────────────────── */\n.error { font-size:12px; color:var(--red); min-height:0; margin-bottom:8px; }\n.proc-status { font-size:12px; color:var(--teal); min-height:0; margin-bottom:8px; font-weight:600; letter-spacing:.02em; }\n\n/* ── SECTION DIVIDERS ──────────────────────────────────────── */\n/* v22.42: calmer hierarchy — no more shouty all-caps.\n   Sentence-case 13px label sits flush against a thin rule for\n   a more \"health-dashboard\" feel and less \"tech-report\" density. */\n.sec-label {\n  display:flex; align-items:baseline; gap:var(--sp-3);\n  font-size:13px; letter-spacing:0; text-transform:none;\n  color:var(--text2); margin:var(--sp-6) 0 var(--sp-3);\n  font-weight:var(--fw-semibold);\n}\n.sec-label::after { content:''; height:1px; flex:1; background:rgba(255,255,255,.05); }\n.section-title {\n  display:flex; align-items:baseline; gap:var(--sp-3);\n  font-size:13px; letter-spacing:0; text-transform:none;\n  color:var(--text2); margin:var(--sp-6) 0 var(--sp-3);\n  font-weight:var(--fw-semibold);\n}\n.section-title::after { content:''; height:1px; flex:1; background:rgba(255,255,255,.05); }\n\n/* v22.42: Stronger header variant for primary sections (Trends, Night Summary).\n   Use this when you want the section to read as a real H2 rather than a quiet\n   metadata label. Add class=\"sec-label sec-label-lg\" to any sec-label div. */\n.sec-label.sec-label-lg,\n.section-title.section-title-lg {\n  font-size:var(--fs-section);\n  font-weight:var(--fw-bold);\n  color:var(--text);\n  letter-spacing:-.015em;\n  margin:var(--sp-7) 0 var(--sp-4);\n}\n.sec-label.sec-label-lg::after,\n.section-title.section-title-lg::after { display:none; }\n\n/* ── GLOBAL CONTROLS — compact, calm toolbar ──────────────── */\n.global-controls {\n  display:flex; justify-content:space-between; align-items:center;\n  flex-wrap:wrap; gap:var(--sp-4); margin-bottom:var(--sp-5);\n  padding:10px var(--sp-4);\n  background:var(--surface); border:var(--b); border-radius:14px;\n}\n.gc-left, .gc-right { display:flex; align-items:center; gap:var(--sp-3); flex-wrap:wrap; }\n.gc-label { font-size:var(--fs-help); color:var(--text3); font-weight:var(--fw-semibold); white-space:nowrap; }\n.gc-btn-group { display:flex; gap:2px; background:var(--surface2); padding:3px; border-radius:9px; }\n.gc-btn {\n  background:transparent; border:1px solid transparent; color:var(--text3);\n  padding:5px 11px; border-radius:7px; cursor:pointer;\n  font-size:11px; font-weight:var(--fw-semibold); transition:all .15s;\n}\n.gc-btn:hover { background:rgba(255,255,255,.04); color:var(--text); }\n.gc-btn.active { background:rgba(61,224,208,.13); color:var(--teal); }\n.gc-range { width:100px; accent-color:var(--blue); vertical-align:middle; }\n.gc-range-val { font-size:11px; color:var(--blue); font-weight:var(--fw-bold); min-width:16px; display:inline-block; }\n\n/* ── CHARTS ─────────────────────────────────────────────────── */\n.chart-grid {\n  display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr));\n  gap:var(--sp-4); margin-bottom:var(--sp-5);\n}\n/* Chart-grid sections may extend slightly wider than text-heavy content.\n   Apply margin negation when --grid-max > --content-max is desired. */\n\n/* ── ADVANCED TRENDS — collapsible group ────────────────────\n   v22.42: hide the long tail of research charts by default so\n   the default view stays focused on the 6 core trend charts. */\n.adv-trends {\n  margin: var(--sp-3) 0 var(--sp-5);\n  border:var(--b); border-radius:14px;\n  background:var(--surface);\n  overflow:hidden;\n}\n.adv-trends summary {\n  cursor:pointer; list-style:none;\n  padding:14px 18px;\n  display:flex; align-items:center; gap:var(--sp-3);\n  font-size:13px; font-weight:var(--fw-semibold);\n  color:var(--text2);\n  user-select:none;\n  transition:background .15s;\n}\n.adv-trends summary::-webkit-details-marker { display:none; }\n.adv-trends summary:hover { background:rgba(255,255,255,.02); color:var(--text); }\n.adv-trends summary .adv-icon {\n  color:var(--text3); font-size:10px;\n  transition:transform .2s;\n  display:inline-block; width:12px; text-align:center;\n}\n.adv-trends[open] summary .adv-icon { transform:rotate(90deg); }\n.adv-trends summary .adv-count {\n  font-size:11px; color:var(--text3); font-weight:var(--fw-regular);\n  margin-left:auto;\n}\n.adv-trends[open] .chart-grid {\n  padding:0 18px 18px;\n  margin-bottom:0;\n}\n.chart-wrap {\n  background:var(--surface); border:var(--b); border-radius:var(--r-md);\n  padding:var(--sp-5); margin-bottom:var(--sp-4); overflow:hidden;\n}\n.chart-card {\n  background:var(--surface); border:var(--b); border-radius:var(--r-md);\n  padding:var(--sp-5); overflow:hidden;\n}\n/* chart-title var() rule removed — consolidated */\n.chart-sub { font-size:var(--fs-card-sub); color:var(--text3); margin-bottom:var(--sp-3); }\n.chart-card h4 { font-size:var(--fs-card-title); font-weight:var(--fw-semibold); color:var(--text); margin-bottom:var(--sp-1); }\n/* canvas rule removed — all charts are SVG; width:100% !important on canvas would break any future canvas usage */\n.chart-legend {\n  display:flex; flex-wrap:wrap; gap:var(--sp-3);\n  margin-top:var(--sp-3); font-size:var(--fs-help); color:var(--text3);\n}\n.legend-item { display:flex; align-items:center; gap:6px; }\n.legend-line { width:14px; height:2px; border-radius:1px; }\n.legend-dot  { width:8px; height:8px; border-radius:50%; }\n.chart-note { font-size:11px; color:var(--text3); margin-top:var(--sp-2); line-height:1.5; font-style:italic; }\n\n/* ── METRIC GRID ───────────────────────────────────────────── */\n.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:var(--sp-2); margin-bottom:var(--sp-3); }\n.grid-3 { grid-template-columns:repeat(3,1fr); }\n.metric {\n  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.04);\n  border-radius:13px; padding:12px 14px;\n  transition:border-color .15s;\n}\n.metric:hover { border-color:rgba(255,255,255,.08); }\n.m-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; font-weight:var(--fw-semibold); }\n.m-val { font-size:var(--fs-metric-md); font-weight:var(--fw-bold);\n  line-height:1.1; color:var(--text); letter-spacing:-.02em;\n  overflow-wrap:break-word; word-break:break-word;\n}\n/* Long string labels in research dump — smaller font so they fit the card */\n.m-val.lbl { font-size:13px; line-height:1.35; font-weight:var(--fw-semibold); }\n.m-sub { font-size:10px; color:var(--text3); margin-top:3px; }\n/* .m-val status colors defined in unified status token mapping block */\n\n/* ── METRIC GROUP (inside night detail) ─────────────────────── */\n.metric-group { margin-bottom:var(--sp-4); }\n.metric-group h3 {\n  font-size:11px; font-weight:var(--fw-semibold); color:var(--text2);\n  text-transform:uppercase; letter-spacing:.06em;\n  margin-bottom:var(--sp-2); padding-bottom:5px;\n  border-bottom:1px solid rgba(255,255,255,.04);\n}\n.metric-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:6px; }\n.metric-row {\n  display:flex; justify-content:space-between; align-items:center;\n  padding:7px 10px; background:rgba(255,255,255,.02);\n  border:1px solid rgba(255,255,255,.03); border-radius:10px; font-size:11px;\n}\n.metric-name { color:var(--text3); }\n.metric-val  { font-weight:700; color:var(--text); font-size:11px; }\n/* .metric-val status colors defined in unified status token mapping block */\n\n/* ── NIGHT TABLE / ROWS ─────────────────────────────────────── */\n.night-table { display:flex; flex-direction:column; gap:var(--sp-2); margin-bottom:var(--sp-5); }\n.night-row {\n  background:var(--surface); border:var(--b); border-radius:var(--r-md);\n  padding:var(--sp-4) var(--sp-5); cursor:pointer; transition:border-color .15s, background .15s, box-shadow .15s;\n}\n.night-row:hover { border-color:rgba(61,224,208,.2); background:rgba(61,224,208,.025); box-shadow:0 2px 12px rgba(0,0,0,.15); }\n.night-detail { display:none; background:rgba(11,15,20,.6); border:var(--b); border-top:none; border-bottom-left-radius:var(--r-md); border-bottom-right-radius:var(--r-md); padding:var(--sp-5); margin-top:-8px; }\n.night-detail.open { display:block; animation:fadeIn .2s ease; }\n\n/* ── Research night-jump rail — fixed vertical anchors ───────────── */\n#nightJumpRail {\n  display:none;               /* shown by syncAccordions in research mode */\n  position:fixed; top:50%; right:14px; transform:translateY(-50%);\n  z-index:60; flex-direction:column; gap:4px;\n  background:rgba(13,18,24,.82); backdrop-filter:blur(10px);\n  border:1px solid rgba(61,224,208,.16); border-radius:12px;\n  padding:10px 8px; box-shadow:0 8px 30px rgba(0,0,0,.4);\n  max-height:80vh; overflow-y:auto;\n}\n#nightJumpRail .njr-title {\n  font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.14em;\n  text-transform:uppercase; color:var(--text3); text-align:center;\n  padding:0 2px 6px; border-bottom:1px solid rgba(255,255,255,.06); margin-bottom:4px;\n}\n#nightJumpRail .njr-item {\n  display:flex; align-items:center; gap:8px; width:100%;\n  background:transparent; border:1px solid transparent; border-radius:8px;\n  padding:5px 9px 5px 6px; cursor:pointer; text-align:left;\n  color:var(--text2); font-family:'IBM Plex Mono',monospace;\n  transition:background .15s, border-color .15s, color .15s;\n}\n#nightJumpRail .njr-item:hover { background:rgba(61,224,208,.08); color:var(--text); }\n#nightJumpRail .njr-idx {\n  flex:0 0 auto; width:18px; height:18px; border-radius:5px;\n  display:grid; place-items:center; font-size:10px; font-weight:600;\n  background:rgba(255,255,255,.06); color:var(--text3);\n}\n#nightJumpRail .njr-latest .njr-idx { background:rgba(61,224,208,.18); color:var(--accent,#4dd9ac); }\n#nightJumpRail .njr-date { font-size:11px; letter-spacing:.01em; white-space:nowrap; }\n#nightJumpRail .njr-item.njr-open { border-color:rgba(61,224,208,.22); }\n#nightJumpRail .njr-item.njr-open .njr-idx { background:rgba(61,224,208,.16); color:var(--accent,#4dd9ac); }\n#nightJumpRail .njr-item.njr-active {\n  background:rgba(61,224,208,.14); border-color:rgba(61,224,208,.4); color:var(--text);\n}\nbody.light #nightJumpRail { background:rgba(255,255,255,.92); border-color:rgba(0,0,0,.08); }\n@media (max-width:900px) {\n  #nightJumpRail { display:none !important; }   /* too cramped on narrow screens */\n}\n\n/* Night card date/stats */\n.nr-date { font-size:14px; font-weight:700; color:var(--text); margin-bottom:8px; letter-spacing:-.01em; }\n.nr-stats { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }\n.nr-stat {\n  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.04);\n  border-radius:8px; padding:5px 10px;\n  font-size:11px; color:var(--text3);\n  display:flex; flex-direction:column; align-items:center; gap:2px;\n}\n.nr-stat .label { font-size:9px; color:var(--text4); text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px; }\n.nr-stat span.g, .nr-stat .g { color:var(--status-ok);      font-weight:700; }\n.nr-stat span.w, .nr-stat .w { color:var(--status-caution); font-weight:700; }\n.nr-stat span.r, .nr-stat .r { color:var(--status-concern); font-weight:700; }\n.nr-flags { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }\n.nr-flag {\n  padding:2px 8px; border-radius:8px;\n  font-size:10px; font-weight:700; white-space:nowrap;\n}\n.nr-flag.ok   { background:rgba(45,212,191,.12); color:var(--status-ok);      border:1px solid rgba(45,212,191,.25); }\n.nr-flag.warn { background:rgba(245,158,11,.12); color:var(--status-caution); border:1px solid rgba(245,158,11,.25); }\n.nr-flag.bad  { background:rgba(248,113,113,.12); color:var(--status-concern); border:1px so }\n.cv-good { color:var(--status-ok); }\n.cv-warn { color:var(--status-caution); }\n.cv-bad  { color:var(--status-concern); }\n.ss-rank-label { font-size:11px; color:var(--text2); font-weight:700; margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }\n.ss-bars { display:flex; flex-direction:column; gap:4px; margin-bottom:4px; }\n.ss-row  { display:grid; grid-template-columns:150px 1fr 70px; align-items:center; gap:8px; font-size:11px; }\n.ss-label { color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n.ss-bar-wrap { background:var(--surface2); border-radius:3px; height:5px; overflow:hidden; }\n.ss-bar { height:100%; border-radius:3px; transition:width .4s; }\n.ss-bar.good { background:var(--status-ok); }\n.ss-bar.warn { background:var(--status-caution); }\n.ss-bar.bad  { background:var(--status-concern); }\n.ss-val { font-weight:700; text-align:right; }\n.ss-val.good { color:var(--status-ok); }\n.ss-val.warn { color:var(--status-caution); }\n.ss-val.bad  { color:var(--status-concern); }\n\n/* ── PROJ CARDS ─────────────────────────────────────────────── */\n.proj-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:var(--sp-4); margin-bottom:var(--sp-4); }\n.proj-card {\n  background:var(--surface); border:var(--b); border-radius:var(--r-md);\n  padding:var(--sp-5); display:flex; flex-direction:column; gap:var(--sp-3);\n}\n.proj-card.proj-good { border-color:rgba(45,212,191,.35); }\n.proj-card.proj-warn { border-color:rgba(245,158,11,.35); }\n.proj-card.proj-bad  { border-color:rgba(248,113,113,.35); }\n.proj-header { display:flex; align-items:center; gap:var(--sp-3); }\n.proj-icon { font-size:18px; }\n.proj-title { font-size:var(--fs-card-title); font-weight:var(--fw-semibold); color:var(--text); flex:1; letter-spacing:-.005em; }\n.proj-badge { font-size:10px; font-weight:var(--fw-bold); padding:3px 9px; border-radius:20px; letter-spacing:.02em; }\n.proj-badge.proj-good { background:rgba(45,212,191,.12); color:var(--status-ok); }\n.proj-badge.proj-warn { background:rgba(245,158,11,.12); color:var(--status-caution); }\n.proj-badge.proj-bad  { background:rgba(248,113,113,.12); color:var(--status-concern); }\n.proj-main { display:flex; align-items:baseline; gap:var(--sp-2); }\n.proj-value { font-size:var(--fs-metric-xl); font-weight:var(--fw-bold); line-height:1; letter-spacing:-.02em; }\n.proj-val-good { color:var(--status-ok); }\n.proj-val-warn { color:var(--status-caution); }\n.proj-val-bad  { color:var(--status-concern); }\n.proj-unit { font-size:var(--fs-help); color:var(--text3); }\n.proj-range { font-size:var(--fs-help); color:var(--text2); background:var(--surface2); border-radius:10px; padding:6px 12px; }\n.proj-waterfall { background:var(--surface2); border-radius:12px; padding:var(--sp-3) var(--sp-4); display:flex; flex-direction:column; gap:var(--sp-1); }\n.proj-factor { display:flex; justify-content:space-between; align-items:center; font-size:var(--fs-help); color:var(--text2); gap:var(--sp-2); padding:3px 0; border-bottom:1px solid rgba(255,255,255,.04); }\n.proj-factor:last-child { border-bottom:none; }\n.proj-factor.proj-total { color:var(--text); font-weight:var(--fw-semibold); border-top:var(--b); padding-top:8px; margin-top:var(--sp-1); }\n.pf-val { font-weight:var(--fw-semibold); font-size:var(--fs-help); white-space:nowrap; }\n.pf-pos { color:var(--status-ok); }\n.pf-neg { color:var(--status-concern); }\n.pf-neutral { color:var(--text2); }\n.proj-conf { height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }\n.proj-conf-bar { height:100%; background:linear-gradient(90deg,var(--blue),var(--green)); border-radius:2px; transition:width .5s; }\n.proj-conf-label { font-size:10px; color:var(--text3); }\n.proj-flags { display:flex; flex-wrap:wrap; gap:5px; }\n.proj-corr { font-size:11px; color:var(--blue); font-style:italic; }\n.proj-disclaimer { font-size:11px; color:var(--text3); background:rgba(255,200,50,.05); border:1px solid rgba(245,158,11,.15); border-radius:8px; padding:6px 10px; line-height:1.5; }\n.proj-cite { font-size:11px; color:var(--text3); line-height:1.5; }\n\n/* ── PROJ-FACTOR variant: subtle inline progress fill behind the row ──\n   Used when an individual component has a 0–100 score we want to\n   visualise without separating label from value with a bar. The fill\n   sits BEHIND the row content so label : value stay adjacent. */\n.proj-factor.pf-prog { position:relative; overflow:hidden; }\n.proj-factor.pf-prog .pf-bg {\n  position:absolute; left:0; top:0; bottom:0; border-radius:6px;\n  z-index:0; opacity:0.18; pointer-events:none;\n}\n.proj-factor.pf-prog > span,\n.proj-factor.pf-prog > .pf-val { position:relative; z-index:1; }\n.pf-bg.ok   { background:var(--status-ok); }\n.pf-bg.warn { background:var(--status-caution); }\n.pf-bg.bad  { background:var(--status-concern); }\n\n/* ── KARVONEN CARD ───────────────────────────────────────────── */\n.karv-card { background:var(--surface); border:var(--b); border-radius:18px; padding:18px; margin-bottom:14px; display:flex; flex-direction:column; gap:12px; }\n.karv-readiness { display:grid; grid-template-columns:140px 1fr; gap:16px; align-items:start; padding:14px; border-radius:14px; }\n.karv-readiness.karv-good { background:rgba(45,212,191,.07); border:1px solid rgba(45,212,191,.25); }\n.karv-readiness.karv-warn { background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.25); }\n.karv-readiness.karv-bad  { background:rgba(248,113,113,.07); border:1px solid rgba(248,113,113,.25); }\n.karv-read-label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }\n.karv-read-val   { font-size:42px; font-weight:900; line-height:1; }\n.karv-read-unit  { font-size:14px; font-weight:400; color:var(--text2); }\n.karv-read-tier  { font-size:13px; font-weight:700; margin-top:4px; }\n.karv-val-good { /* color via unified status mapping */ }\n.karv-val-warn { /* color via unified status mapping */ }\n.karv-val-bad  { /* color via unified status mapping */ }\n.karv-read-bar-wrap { height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-bottom:10px; }\n.karv-read-bar  { height:100%; border-radius:3px; transition:width .5s; }\n.karv-bar-good  { background:linear-gradient(90deg,var(--green),#56d364); }\n.karv-bar-warn  { background:linear-gradient(90deg,var(--amber),#ffa657); }\n.karv-bar-bad   { background:linear-gradient(90deg,var(--red),#f85149); }\n.karv-score-grid { display:flex; flex-direction:column; gap:3px; }\n.karv-score-row  { display:flex; justify-content:space-between; font-size:11px; color:var(--text2); }\n.karv-score-val  { font-weight:700; color:var(--text); }\n.karv-rec { display:flex; align-items:flex-start; gap:12px; padding:12px 14px; border-radius:12px; font-size:12px; }\n.karv-rec.karv-rec-good { background:rgba(45,212,191,.07); border:1px solid rgba(45,212,191,.2); }\n.karv-rec.karv-rec-warn { background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.2); }\n.karv-rec.karv-rec-bad  { background:rgba(248,113,113,.07); border:1px solid rgba(248,113,113,.2); }\n.karv-rec-emoji { font-size:22px; flex-shrink:0; margin-top:1px; }\n.karv-rec-title { font-weight:600; color:var(--text); margin-bottom:6px; }\n.karv-rec-zones { display:flex; gap:6px; flex-wrap:wrap; }\n.karv-zone-tag  { font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; }\n.karv-zone-header { margin-bottom:4px; }\n.karv-hr-pills { display:flex; flex-wrap:wrap; gap:6px; }\n.karv-pill { background:var(--surface2); border:var(--b); border-radius:20px; padding:4px 12px; font-size:11px; color:var(--text2); }\n.karv-pill strong { color:var(--text); }\n.karv-zones { display:flex; flex-direction:column; gap:6px; }\n.karv-zone  { display:grid; grid-template-columns:10px 1fr 160px; align-items:center; gap:10px; padding:9px 12px; background:var(--surface2); border-radius:12px; border:1px solid transparent; transition:border-color .15s; }\n.karv-zone.karv-zone-rec { border-color:var(--zc,var(--border)); background:var(--surface3); }\n.karv-zone-swatch { width:10px; height:10px; border-radius:50%; flex-shrink:0; }\n.karv-zone-info { flex:1; }\n.karv-zone-name { font-size:12px; font-weight:700; margin-bottom:1px; }\n.karv-zone-range { font-weight:400; color:var(--text); font-size:12px; }\n.karv-zone-purpose { font-size:10px; color:var(--text3); }\n.karv-zone-bar-wrap { height:5px; background:var(--surface); border-radius:3px; overflow:hidden; position:relative; }\n.karv-zone-bar { height:100%; border-radius:3px; position:absolute; top:0; }\n.karv-footer { font-size:10px; color:var(--text3); border-top:var(--b); padding-top:8px; line-height:1.7; }\n\n/* ── FILE CHIP ────────────────────────────────────────────────── */\n.file-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 11px; background:rgba(88,166,255,.08); border:1px solid rgba(88,166,255,.2); color:var(--blue); border-radius:999px; font-size:11px; font-weight:600; margin-bottom:14px; }\n\n/* ── T-INDEX TABLE ────────────────────────────────────────────── */\n.t-table { display:flex; flex-direction:column; gap:3px; margin-bottom:10px; font-size:11px; }\n.t-row { display:grid; grid-template-columns:80px 60px 1fr; align-items:center; gap:8px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.03); }\n.t-row.hdr { color:var(--text3); font-size:10px; text-transform:uppercase; letter-spacing:.05em; font-weight:600; border-bottom:1px solid rgba(255,255,255,.08); padding-bottom:6px; margin-bottom:2px; }\n.t-pct { font-weight:700; }\n.t-pct.good { color:var(--status-ok); }\n.t-pct.warn { color:var(--status-caution); }\n.t-pct.bad  { color:var(--status-concern); }\n.bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }\n.bar-fill { height:100%; border-radius:3px; transition:width .3s; }\n\n/* ── FLAGS PANEL ──────────────────────────────────────────────── */\n.flags-wrap { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }\n.fpill { display:inline-block; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; border:1px solid transparent; }\n/* fpill color rules consolidated in status token mapping block below */\n\n/* ── SPIKE LIST ───────────────────────────────────────────────── */\n.spike-list { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }\n.spike-item { display:grid; grid-template-columns:72px 1fr auto; align-items:center; gap:8px; padding:8px 10px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.04); border-radius:10px; }\n.spike-time { font-size:11px; color:var(--text3); }\n.spike-bar-wrap { display:flex; flex-direction:column; gap:3px; }\n.spike-lbl { font-size:10px; color:var(--text2); }\n.spike-mini { height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; }\n.spike-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--purple),var(--red)); }\n.spike-badge { background:rgba(248,113,113,.12); color:var(--red); border:1px solid rgba(248,113,113,.25); border-radius:20px; padding:2px 7px; font-size:10px; font-weight:700; text-align:center; }\n.spike-spo2  { font-size:10px; color:var(--text3); text-align:center; margin-top:2px; }\n\n/* ── MISC ─────────────────────────────────────────────────────── */\n.reset-link { color:var(--text3); font-size:11px; cursor:pointer; margin-top:10px; display:inline-block; }\n.reset-link:hover { color:var(--text2); text-decoration:underline; }\n.kpi-val { }\n.proj-value, td { }\n\n/* ── Drag-over visual feedback ──────────────────────────────── */\n#uploadArea.drag {\n  border-color:var(--teal);\n  background:rgba(61,224,208,.06);\n  box-shadow:0 0 0 4px rgba(61,224,208,.08);\n}\n\n/* ── Night row: flatten bottom corners when expanded so detail connects flush ── */\n.night-row[aria-expanded=\"true\"] {\n  border-bottom-left-radius:0;\n  border-bottom-right-radius:0;\n}\n\n/* ── BADGE ────────────────────────────────────────────────────── */\n.badge {\n  background:rgba(61,224,208,.06); border:1px solid rgba(61,224,208,.18);\n  border-radius:20px; padding:3px 11px; font-size:10px; color:var(--teal);\n  white-space:nowrap; font-weight:700; letter-spacing:.03em;\n}\n\n/* ── RESPONSIVE ─────────────────────────────────────────────── */\n@media (min-width:1081px) {\n  /* Sidebar has Core/Advanced/Research — hide the duplicate in the topbar */\n  .topbar .mode-bar, .topbar .mode-hint { display:none; }\n}\n@media (max-width:1080px) {\n  .app { grid-template-columns:1fr; }\n  .main-wrap { padding:18px; }\n}\n@media (max-width:768px) {\n  .chart-grid { grid-template-columns:1fr !important; }\n  .tab { padding:8px 12px; font-size:11px; }\n  th, td { padding:7px 10px; font-size:11px; }\n  .proj-grid { grid-template-columns:1fr; }\n  .proj-value { font-size:28px; }\n  .karv-readiness { grid-template-columns:1fr; }\n  .karv-zone { grid-template-columns:10px 1fr; }\n  .karv-zone-bar-wrap { display:none; }\n  .ss-kpi-grid { grid-template-columns:repeat(2,1fr); }\n  .ss-row { grid-template-columns:110px 1fr 55px; }\n  .ss-controls { gap:10px; }\n  .gc-range { width:70px; }\n}\n@media (max-width:480px) {\n  .metric-grid { grid-template-columns:1fr 1fr; }\n  .prof-grid { grid-template-columns:1fr; }\n  .grid-3 { grid-template-columns:1fr 1fr; }\n}\n\n/* ── Override legacy 24px side margins from JS-rendered output ── */\n#results .chart-grid, #results .table-wrap,\n#results .alert, #results .proj-grid,\n#results .global-controls { margin-left:0; margin-right:0; }\n#results .section-title, #results .sec-label { margin-left:0; margin-right:0; }\n#results .night-card { margin-left:0; margin-right:0; }\n\n/* ═══════════════════════════════════════════════════════\n   v22 — HIERARCHY + REFINEMENT SYSTEM\n═══════════════════════════════════════════════════════ */\n\n/* ── Three-color status system ───────────────────────── */\n:root {\n  --status-ok:      #2DD4BF;\n  --status-caution: #F59E0B;\n  --status-concern: #F87171;\n  --text-hero:   48px;\n  --text-h1:     32px;\n  --text-h2:     24px;\n  --text-body:   18px;\n  --text-label:  14px;\n  --text-caption:12px;\n}\n\n/* ── Mode toggle bar ─────────────────────────────────── */\n.mode-bar {\n  display:flex; background:var(--surface); border:var(--b);\n  padding:3px; border-radius:11px; gap:2px; margin-left:auto;\n}\n.mode-btn {\n  padding:6px 14px; border-radius:8px; font-size:11px; font-weight:var(--fw-semibold);\n  color:var(--text3); border:none; background:transparent; cursor:pointer;\n  transition:all .15s; white-space:nowrap;\n  letter-spacing:.02em;\n}\n.mode-btn.active { background:rgba(61,224,208,.13); color:var(--teal); }\n.mode-btn:hover:not(.active) { background:rgba(255,255,255,.03); color:var(--text); }\n\n/* ── Data-tier visibility (mode system) ─────────────── */\n[data-tier=\"secondary\"], [data-tier=\"research\"] { display:none !important; }\nbody[data-mode=\"advanced\"] [data-tier=\"secondary\"]  { display:flex !important; }\nbody[data-mode=\"advanced\"] [data-tier=\"research\"]   { display:none !important; }\nbody[data-mode=\"research\"] [data-tier=\"secondary\"]  { display:flex !important; }\nbody[data-mode=\"research\"] [data-tier=\"research\"]   { display:flex !important; }\n/* sections (block-level) */\nsection[data-tier=\"secondary\"], div.sec-section[data-tier=\"secondary\"],\nsection[data-tier=\"research\"],  div.sec-section[data-tier=\"research\"]  { display:none !important; }\nbody[data-mode=\"advanced\"] section[data-tier=\"secondary\"],\nbody[data-mode=\"advanced\"] div.sec-section[data-tier=\"secondary\"] { display:block !important; }\nbody[data-mode=\"research\"]  section[data-tier=\"secondary\"],\nbody[data-mode=\"research\"]  div.sec-section[data-tier=\"secondary\"],\nbody[data-mode=\"research\"]  section[data-tier=\"research\"],\nbody[data-mode=\"research\"]  div.sec-section[data-tier=\"research\"]  { display:block !important; }\n/* metric cards use block layout — override the generic display:flex for [data-tier] elements */\nbody[data-mode=\"advanced\"] .metric[data-tier=\"secondary\"],\nbody[data-mode=\"research\"]  .metric[data-tier=\"secondary\"],\nbody[data-mode=\"research\"]  .metric[data-tier=\"research\"]  { display:block !important; }\n\n/* chart-wrap cards use block layout — same override so they participate in chart-grid cleanly */\nbody[data-mode=\"advanced\"] .chart-wrap[data-tier=\"secondary\"],\nbody[data-mode=\"research\"]  .chart-wrap[data-tier=\"secondary\"],\nbody[data-mode=\"research\"]  .chart-wrap[data-tier=\"research\"]  { display:block !important; }\n/* research-accordion containers need block not flex */\nbody[data-mode=\"advanced\"] .research-accordion[data-tier=\"secondary\"],\nbody[data-mode=\"research\"]  .research-accordion[data-tier=\"secondary\"],\nbody[data-mode=\"research\"]  .research-accordion[data-tier=\"research\"]  { display:block !important; }\n\n/* ── Metric weight hierarchy ─────────────────────────── */\n.metric-hero {\n  background:linear-gradient(180deg,rgba(61,224,208,.08),rgba(18,24,33,.6));\n  border:1px solid rgba(61,224,208,.2); border-radius:22px;\n  padding:28px 24px; text-align:center;\n}\n.metric-hero .m-label { font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); margin-bottom:8px; }\n.metric-hero .m-val   { font-size:48px; font-weight:700; line-height:1; }\n.m-unit { font-size:10px; color:var(--text3); margin-top:2px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }\n.metric-hero .m-unit  { font-size:14px; color:var(--text3); margin-top:4px; }\n\n.metric-primary { border-radius:16px; padding:16px 14px; }\n.metric-primary .m-val { font-size:24px; }\n\n.metric-secondary { border-radius:12px; padding:10px 12px; opacity:.9; }\n.metric-secondary .m-val { font-size:18px; }\n\n.metric-research { border-radius:12px; padding:10px 12px; }\n.metric-research .m-val { font-size:18px; color:var(--blue); }\n.metric-research .m-val.zero { color:var(--text3); }\n\n/* ── Readiness hero block ────────────────────────────── */\n.readiness-hero {\n  display:grid; place-items:center;\n  min-height:300px; padding:var(--sp-7) var(--sp-6);\n  background:\n    radial-gradient(ellipse at 30% 20%, rgba(61,224,208,.08) 0%, transparent 60%),\n    radial-gradient(ellipse at 80% 80%, rgba(88,166,255,.04) 0%, transparent 55%),\n    linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);\n  border:1px solid rgba(255,255,255,.06); border-radius:24px;\n  margin-bottom:var(--sp-6); position:relative; overflow:hidden;\n  box-shadow:0 4px 24px rgba(0,0,0,.18);\n}\n.readiness-hero:before {\n  content:''; position:absolute; inset:-30% auto auto -10%;\n  width:35%; height:120%;\n  background:radial-gradient(circle,rgba(45,212,191,.06),transparent 60%);\n}\n.readiness-score  { font-size:var(--fs-metric-hero); font-weight:var(--fw-bold); line-height:1; letter-spacing:-.04em; color:var(--readiness-color, var(--status-ok)); }\n.readiness-tier   { font-size:13px; letter-spacing:.04em; text-transform:none; color:var(--text2); margin-top:var(--sp-3); font-weight:var(--fw-semibold); }\n.readiness-date   { font-size:11px; letter-spacing:0; text-transform:none; margin-top:var(--sp-2); }\n.readiness-note   { font-size:var(--fs-body); color:var(--text2); margin-top:var(--sp-4); max-width:420px; text-align:center; line-height:1.55; }\n\n/* Hero footer — projected ANS age (informational) */\n.readiness-ansage {\n  margin-top:var(--sp-5);\n  padding-top:var(--sp-4);\n  border-top:1px solid rgba(255,255,255,.08);\n  width:100%; max-width:520px;\n  display:flex; flex-wrap:wrap; align-items:baseline;\n  justify-content:center; gap:6px 14px;\n  font-family:'IBM Plex Mono',monospace;\n}\n.readiness-ansage .ra-label {\n  font-size:11px; letter-spacing:.1em; text-transform:uppercase;\n  color:var(--text3); font-weight:600;\n}\n.readiness-ansage .ra-main {\n  font-size:14px; color:var(--text2); letter-spacing:.01em;\n}\n.readiness-ansage .ra-main b { color:var(--accent,#4dd9ac); font-weight:700; }\n.readiness-ansage .ra-break {\n  font-size:12px; color:var(--text3);\n  background:rgba(255,255,255,.04); padding:2px 8px; border-radius:6px;\n}\n.readiness-ansage .ra-note {\n  font-size:10px; letter-spacing:.06em; text-transform:uppercase;\n  color:var(--text4); flex-basis:100%; text-align:center; margin-top:2px;\n}\nbody.light .readiness-ansage { border-top-color:rgba(0,0,0,.08); }\nbody.light .readiness-ansage .ra-break { background:rgba(0,0,0,.04); }\n.readiness-zones  { margin-top:var(--sp-4); display:flex; gap:var(--sp-2); align-items:center; flex-wrap:wrap; justify-content:center; }\n.readiness-zone-chip {\n  padding:5px 14px; border-radius:999px; font-size:12px; font-weight:var(--fw-semibold);\n}\n.readiness-scores-grid { display:flex; gap:var(--sp-3); flex-wrap:wrap; justify-content:center; margin-top:var(--sp-4); }\n.readiness-subscore {\n  background:rgba(255,255,255,.025); border:var(--b);\n  border-radius:12px; padding:10px 16px; text-align:center; min-width:72px;\n}\n.readiness-subscore .rs-val  { font-size:var(--fs-metric-md); font-weight:var(--fw-bold); }\n.rs-val.ok   { color:var(--status-ok); }\n.rs-val.warn { color:var(--status-caution); }\n.rs-val.bad  { color:var(--status-concern); }\n.readiness-zone-chip.ok   { background:rgba(45,212,191,.10); color:var(--status-ok);      border:1px solid rgba(45,212,191,.2); }\n.readiness-zone-chip.warn { background:rgba(245,158,11,.08); color:var(--status-caution); border:1px solid rgba(245,158,11,.2); }\n.readiness-subscore .rs-label{ font-size:10px; color:var(--text3); margin-top:var(--sp-1); text-transform:uppercase; letter-spacing:.05em; }\n\n/* ── Night row v22 — 2-column ────────────────────────── */\n.night-row-v22 {\n  display:grid; grid-template-columns:140px 1fr;\n  gap:var(--sp-5); align-items:center;\n}\n.nr-left  { display:flex; flex-direction:column; gap:var(--sp-1); }\n.nr-date-v22  { font-size:15px; font-weight:var(--fw-semibold); color:var(--text); letter-spacing:-.005em; }\n.nr-dur   { font-size:12px; color:var(--text3); }\n.nr-readiness-pill {\n  display:inline-flex; align-items:center; gap:5px;\n  padding:3px 11px; border-radius:999px; font-size:12px; font-weight:var(--fw-semibold);\n  margin-top:var(--sp-1);\n}\n.nr-readiness-pill.ok   { background:rgba(45,212,191,.12); color:var(--status-ok); border:1px solid rgba(45,212,191,.25); }\n.nr-readiness-pill.warn { background:rgba(245,158,11,.12); color:var(--status-caution); border:1px solid rgba(245,158,11,.25); }\n.nr-readiness-pill.bad  { background:rgba(248,113,113,.12); color:var(--status-concern); border:1px solid rgba(248,113,113,.25); }\n\n.nr-center { display:flex; flex-wrap:wrap; gap:var(--sp-2); }\n.nr-kpi {\n  display:flex; flex-direction:column; align-items:center;\n  background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.04);\n  border-radius:11px; padding:8px 14px; min-width:68px;\n}\n.nr-kpi-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; font-weight:var(--fw-semibold); }\n.nr-kpi-val   { font-size:var(--fs-metric-lg); font-weight:var(--fw-bold); line-height:1; letter-spacing:-.02em; }\n.nr-kpi-val.ok   { color:var(--status-ok); }\n.nr-kpi-val.warn { color:var(--status-caution); }\n.nr-kpi-val.bad  { color:var(--status-concern); }\n.nr-kpi-val.neu  { color:var(--text2); }\n\n.nr-right { display:flex; align-items:center; }\n.nr-expand-btn {\n  background:none; border:var(--b); border-radius:9px;\n  padding:7px 10px; cursor:pointer; color:var(--text3);\n  font-size:13px; transition:all .15s; line-height:1;\n}\n.nr-expand-btn:hover { border-color:rgba(61,224,208,.3); color:var(--teal); }\n.night-row[aria-expanded=\"true\"] .nr-expand-btn { transform:rotate(180deg); }\n\n/* Advanced stats panel inside row */\n.nr-advanced {\n  margin-top:12px; padding-top:12px;\n  border-top:var(--b);\n  display:flex; flex-wrap:wrap; gap:5px;\n}\n.nr-chip {\n  padding:3px 9px; border-radius:7px; font-size:11px; font-weight:600;\n  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.04);\n  color:var(--text3);\n  display:inline-flex; align-items:center; gap:4px;\n}\n.nr-chip .chip-label { color:var(--text4); font-weight:500; }\n.nr-chip.ok   { color:var(--status-ok);      border-color:rgba(45,212,191,.2); }\n.nr-chip.warn { color:var(--status-caution); border-color:rgba(245,158,11,.2); }\n.nr-chip.bad  { color:var(--status-concern); border-color:rgba(248,113,113,.2); }\n\n/* ── Section wrappers ────────────────────────────────── */\n.sec-section { margin-bottom:6px; }\n.section-card {\n  background:var(--surface); border:var(--b);\n  border-radius:18px; padding:20px 22px; margin-bottom:14px;\n}\n.section-card-header {\n  display:flex; align-items:center; gap:10px;\n  margin-bottom:16px; padding-bottom:12px; border-bottom:var(--b);\n}\n.section-card-icon { font-size:18px; flex-shrink:0; }\n.section-card-title { font-size:14px; font-weight:700; color:var(--text); }\n.section-card-sub   { font-size:12px; color:var(--text3); margin-top:1px; }\n\n/* ── Status classes (three-color) ───────────────────── */\n.s-ok      { color:var(--status-ok) !important; }\n.s-caution { color:var(--status-caution) !important; }\n.s-concern { color:var(--status-concern) !important; }\n.s-neutral { color:var(--text2) !important; }\n\n/* ── Metric card left-border status accent ──────────────────────\n   Thin colored left border gives at-a-glance status so cards are\n   distinguishable without relying solely on value text color.     */\n.metric.good    { border-left: 3px solid rgba(45,212,191,.6);   }\n.metric.warn    { border-left: 3px solid rgba(245,158,11,.55);  }\n.metric.bad     { border-left: 3px solid rgba(248,113,113,.6);  }\n\n/* ── Unified status token mapping ───────────────────────\n   Single source of truth: all good/warn/bad/neutral variants\n   map to --status-ok / --status-caution / --status-concern.\n   Covers: .m-val, .metric-val, .nr-stat g/w/r, .nr-flag,\n   .pill-green/yellow/red, .flag-good/warn/bad, .ss-good/warn/bad,\n   .ss-bar, .ss-val, .cv-good/warn/bad, .proj-badge, .proj-val-*,\n   .pf-pos/neg, .t-pct, .karv-val-*, .fpill.\n   Legacy --green/--amber/--red remain ONLY for non-status uses:\n   decorative accents, .error, .upload-hint, .spike-badge,\n   .sidebar-data-card, .data-pill, .proj-conf-bar gradient.     */\n.m-val.good, .metric-val.good, .nr-stat span.g,\n.karv-val-good, .fpill.ok { color:var(--status-ok); }\n.m-val.warn, .metric-val.warn, .nr-stat span.w,\n.karv-val-warn, .fpill.warn { color:var(--status-caution); }\n.m-val.bad,  .metric-val.bad,  .nr-stat span.r,\n.karv-val-bad,  .fpill.bad  { color:var(--status-concern); }\n.m-val.neutral, .metric-val.neutral { color:var(--text2); }\n\n/* fpill background/border tokens — semantic alignment */\n.fpill.ok   { background:rgba(45,212,191,.10);  border-color:rgba(45,212,191,.22); }\n.fpill.warn { background:rgba(245,158,11,.10);  border-color:rgba(245,158,11,.22); }\n.fpill.bad  { background:rgba(248,113,113,.10); border-color:rgba(248,113,113,.22); }\n.fpill.info { background:rgba(88,166,255,.10);  color:var(--blue); border-color:rgba(88,166,255,.2); }\n\n/* ── Active sidebar nav ──────────────────────────────── */\n.nav-item.nav-active { background:rgba(61,224,208,.08); color:var(--text); }\n.sidebar-readiness-badge {\n  display:flex; align-items:center; gap:8px;\n  padding:10px 12px; border-radius:12px;\n  background:rgba(61,224,208,.06); border:1px solid rgba(61,224,208,.12);\n  margin-bottom:12px; font-size:12px;\n}\n.srb-score { font-size:22px; font-weight:700; color:var(--teal); }\n.srb-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; }\n\n/* ── Typography enforcement ─────────────────────────── */\n.t-hero    { font-size:var(--text-hero)  !important; }\n.t-h1      { font-size:var(--text-h1)    !important; }\n.t-h2      { font-size:var(--text-h2)    !important; }\n.t-body    { font-size:var(--text-body)  !important; }\n.t-label   { font-size:var(--text-label) !important; }\n.t-caption { font-size:var(--text-caption) !important; }\n\n/* ── Responsive v22 overrides ────────────────────────── */\n@media (max-width: 640px) {\n  .night-row-v22 { grid-template-columns:1fr auto; }\n  .nr-left { flex-direction:row; align-items:center; flex-wrap:wrap; grid-column:1/-1; }\n  .nr-center { gap:6px; }\n  .nr-kpi { min-width:54px; padding:6px 9px; }\n  .nr-kpi-val { font-size:14px; }\n  .readiness-hero { min-height:200px; padding:28px 16px; }\n  .readiness-score { font-size:56px; }\n  .mode-bar { display:flex; flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; max-width:220px; }\n  .mode-bar::-webkit-scrollbar { display:none; }\n  .mode-btn { padding:5px 11px; font-size:11px; }\n  .mode-hint { display:none; } /* too narrow on mobile topbar */\n  /* mobile-mode-bar below sticky header is redundant — hide it */\n  .mobile-mode-bar { display:none !important; }\n}\n\n/* ── Stability chart component classes ────────────────────────── */\n.stab-rows       { display:flex; flex-direction:column; gap:5px; margin-top:6px; }\n.stab-row        { display:flex; align-items:center; gap:8px; }\n.stab-row-label  { width:90px; font-size:10px; color:var(--text3); flex-shrink:0; }\n.stab-row-bar    { flex:1; height:10px; background:var(--surface3); border-radius:5px; overflow:hidden; }\n.stab-row-fill   { height:100%; border-radius:5px; transition:width .4s; }\n.stab-row-fill.ok   { background:var(--status-ok); }\n.stab-row-fill.warn { background:var(--status-caution); }\n.stab-row-fill.bad  { background:var(--status-concern); }\n.stab-row-val    { width:28px; font-size:10px; color:var(--text2); text-align:right; }\n.stab-score-val  { font-size:28px; font-weight:700; line-height:1; }\n.stab-score-denom{ font-size:14px; font-weight:400; }\n.stab-metric     { margin-bottom:8px; }\n\n/* ── Karv zone: propagate --zc token to swatch + name ────────── */\n.karv-zone-swatch { background:var(--zc, var(--teal)); }\n.karv-zone-name   { color:var(--zc, var(--teal)); }\n\n/* ── Chart annotation note — italic + quieter (v22.42) ──────── */\n.chart-note { font-size:11px; color:var(--text3); margin-top:var(--sp-2); line-height:1.5; font-style:italic; }\n\n/* ── Color utility classes ─────────────────────────────────────── */\n.text-blue    { color:var(--blue); }\n.text-yellow  { color:var(--yellow); }\n.text-dim     { color:var(--text3); }\n.text-blue-sm { color:var(--blue); font-size:10px; }\n.karv-footer-meta { color:var(--text3); font-size:10px; }\n\n/* ── Error / loading state classes ────────────────────────────── */\n.results-loading { padding:20px; color:var(--blue); font-size:14px; }\n.results-error   { padding:20px; color:var(--red); font-size:13px; line-height:1.8; }\n.results-error-block {\n  padding:20px; color:var(--red); background:var(--surface2);\n  border:1px solid var(--red); border-radius:8px; margin:16px 24px;\n}\n.error-code { font-size:11px; word-break:break-all; }\n.render-error-inline { color:var(--red); padding:6px; font-size:11px; }\n.render-error-detail { color:var(--red); padding:10px; font-size:11px; }\n.parse-warning-banner {\n  padding:10px 16px; color:var(--amber); background:var(--surface2);\n  border:1px solid var(--amber); border-radius:8px; margin:0 0 12px 0;\n  font-size:12px; line-height:1.6;\n}\n\n/* ── T-index + misc label classes ─────────────────────────────── */\n.t-label  { font-size:10px; }\n.srb-note { font-size:11px; color:var(--text2); line-height:1.4; }\n.bap-note { font-size:9px; opacity:.6; }\n.mt-sm  { margin-top:6px; }\n.mt-xs  { margin-top:4px; }\n.mt-18  { margin-top:18px; }\n.cite-note { font-size:8px; color:var(--text4); font-weight:400; }\n\n/* Consolidated \"flagged metrics\" empty state */\n.all-normal-note {\n  font-size:13px; color:var(--status-ok,#34D399);\n  background:rgba(52,211,153,.07); border:1px solid rgba(52,211,153,.18);\n  border-radius:10px; padding:12px 14px; margin-top:6px;\n  font-family:'IBM Plex Mono',monospace; letter-spacing:.01em;\n}\nbody.light .all-normal-note { background:rgba(16,160,110,.08); }\n\n/* Clinical category tag — replaces emoji in Smart Summary card headers.\n   Mono abbreviation in a tinted chip, matching the app's restrained vocabulary. */\n.cat-tag {\n  flex:0 0 auto; display:inline-grid; place-items:center;\n  min-width:30px; height:22px; padding:0 7px;\n  font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;\n  letter-spacing:.02em; line-height:1; border-radius:6px;\n  background:rgba(61,224,208,.12); color:var(--accent,#4dd9ac);\n  border:1px solid rgba(61,224,208,.22);\n}\n.cat-tag.cat-ox  { background:rgba(88,166,255,.12); color:#7FB3FF; border-color:rgba(88,166,255,.24); }\n.cat-tag.cat-hr  { background:rgba(248,113,113,.12); color:#F38B8B; border-color:rgba(248,113,113,.24); }\n.cat-tag.cat-slp { background:rgba(167,139,250,.14); color:#B9A6FB; border-color:rgba(167,139,250,.26); }\n.cat-tag.cat-vo2 { background:rgba(61,224,208,.12); color:var(--accent,#4dd9ac); border-color:rgba(61,224,208,.24); }\n.cat-tag.cat-bp  { background:rgba(251,191,36,.14); color:#E8B84B; border-color:rgba(251,191,36,.26); }\n.sec-label-xs { font-size:9px; margin-top:4px; }\n.motion-heatmap-grid { display:flex; flex-wrap:wrap; gap:2px; margin-top:4px; }\n\n/* ── Null value display ────────────────────────────────────────── */\n.cv-neutral { color:var(--text); }\n.val-null { color:var(--text3); }\n\n/* ── Readiness hero label + date badge ─────────────────────────── */\n.readiness-hero-label {\n  font-size:12px; font-weight:var(--fw-semibold); letter-spacing:.04em;\n  text-transform:none; color:var(--text2); margin-bottom:var(--sp-2);\n}\n.readiness-date-badge {\n  display:inline-block; font-size:12px; font-weight:var(--fw-semibold);\n  color:var(--text2); background:rgba(255,255,255,.04);\n  border:1px solid rgba(255,255,255,.07); border-radius:8px;\n  padding:4px 11px; margin-bottom:var(--sp-3);\n}\n\n/* ── Night detail date header ───────────────────────────────────── */\n.night-detail-header {\n  display:flex; align-items:center; gap:10px; flex-wrap:wrap;\n  padding-bottom:14px; margin-bottom:14px;\n  border-bottom:1px solid rgba(255,255,255,.06);\n}\n.ndh-date {\n  font-size:18px; font-weight:800; color:var(--text); letter-spacing:.02em;\n}\n.ndh-dur {\n  font-size:13px; font-weight:600; color:var(--teal);\n  background:rgba(61,224,208,.08); border:1px solid rgba(61,224,208,.15);\n  border-radius:7px; padding:2px 9px;\n}\n.ndh-file {\n  font-size:10px; color:var(--text4); margin-left:auto;\n  max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\n}\n\n/* ── Section wrappers with data-tier for research accordion ───── */\n.sec-section[data-tier=\"research\"] { display:none; }\nbody[data-mode=\"research\"] .sec-section[data-tier=\"research\"] { display:block; }\n\n/* ══════════════════════════════════════════════════════════════\n   PHASE 4 — MOTION SYSTEM\n   Spec: hover states, microinteractions, entrance animations,\n   smooth accordions, focus states, reduced-motion guard.\n══════════════════════════════════════════════════════════════ */\n\n/* ── Entrance animations ─────────────────────────────────────── */\n@keyframes heroEntrance {\n  from { opacity:0; transform:translateY(16px) scale(.97); }\n  to   { opacity:1; transform:translateY(0)    scale(1);   }\n}\n@keyframes scoreCount {\n  from { opacity:0; transform:scale(.8); }\n  to   { opacity:1; transform:scale(1);  }\n}\n\n.readiness-hero  { animation:heroEntrance .5s cubic-bezier(.16,1,.3,1) both; }\n.readiness-score { animation:scoreCount   .4s cubic-bezier(.16,1,.3,1) .1s both; }\n\n/* Stagger mini-metric subscores */\n.readiness-subscore { animation:fadeIn .3s ease both; }\n.readiness-subscore:nth-child(1) { animation-delay:.15s; }\n.readiness-subscore:nth-child(2) { animation-delay:.22s; }\n.readiness-subscore:nth-child(3) { animation-delay:.29s; }\n.readiness-subscore:nth-child(4) { animation-delay:.36s; }\n\n/* ── Expand button rotation ──────────────────────────────────── */\n.nr-expand-btn {\n  transition:transform .22s cubic-bezier(.4,0,.2,1),\n             border-color .15s,\n             color .15s;\n}\n\n/* ── Metric card micro-lift ──────────────────────────────────── */\n.metric {\n  transition:border-color .15s,\n             transform .18s cubic-bezier(.4,0,.2,1),\n             box-shadow .18s;\n}\n.metric:hover {\n  border-color:rgba(255,255,255,.10);\n  transform:translateY(-1px);\n  box-shadow:0 4px 12px rgba(0,0,0,.18);\n}\n/* Hero and research tiers: no micro-lift */\n.metric-hero:hover,\n.metric-research:hover { transform:none; box-shadow:none; }\n\n/* ── Mode toggle transition ──────────────────────────────────── */\n.mode-btn { transition:all .18s cubic-bezier(.4,0,.2,1); }\n.mode-hint {\n  font-size:10px; color:var(--text4); margin-top:4px;\n  letter-spacing:.02em; white-space:nowrap; overflow:hidden;\n  text-overflow:ellipsis; max-width:280px;\n}\n\n/* ── Sidebar nav cursor ──────────────────────────────────────── */\n.nav-item { cursor:pointer; }\n\n/* ── Research accordion smooth open/close (max-height) ──────── */\n.research-accordion-body {\n  display:block;       /* always in DOM; height controls visibility */\n  max-height:0;\n  overflow:hidden;\n  padding:0;\n  transition:max-height .32s cubic-bezier(.4,0,.2,1);\n  animation:none;      /* override any inherited fadeIn */\n}\n.research-accordion.open .research-accordion-body {\n  max-height:20000px;   /* generous cap; Full Research Dump can be very tall */\n  padding:0;\n}\n\n/* ── Karv zone hover ─────────────────────────────────────────── */\n.karv-zone { transition:border-color .15s, background .15s; }\n.karv-zone:hover { border-color:var(--zc, var(--teal)); background:var(--surface3); }\n\n/* ── Night row hover refinement ─────────────────────────────── */\n.night-row {\n  transition:border-color .18s cubic-bezier(.4,0,.2,1),\n             background   .18s cubic-bezier(.4,0,.2,1),\n             box-shadow   .18s;\n}\n.night-row:hover { box-shadow:0 2px 8px rgba(0,0,0,.15); }\n\n/* ── Focus-visible ring for keyboard navigation ─────────────── */\n.night-row:focus-visible {\n  outline:2px solid var(--teal);\n  outline-offset:2px;\n  border-color:rgba(61,224,208,.3);\n}\n.nr-expand-btn:focus-visible,\n.btn:focus-visible,\n.mode-btn:focus-visible,\n.gc-btn:focus-visible,\n.mobile-nav-item:focus-visible {\n  outline:2px solid var(--teal);\n  outline-offset:2px;\n}\n\n/* ── Chart card hover ────────────────────────────────────────── */\n.chart-wrap,\n.chart-card {\n  transition:border-color .18s, box-shadow .18s;\n}\n.chart-wrap:hover,\n.chart-card:hover {\n  border-color:rgba(255,255,255,.08);\n  box-shadow:0 4px 16px rgba(0,0,0,.16);\n}\n\n/* ── Chart SVG entrance ──────────────────────────────────────── */\n.chart-svg { animation:fadeIn .4s ease .05s both; width:100%; height:auto; display:block; }\n.chart-wrap:nth-child(2)  .chart-svg { animation-delay:.08s;  }\n.chart-wrap:nth-child(3)  .chart-svg { animation-delay:.12s;  }\n.chart-wrap:nth-child(4)  .chart-svg { animation-delay:.16s;  }\n.chart-wrap:nth-child(5)  .chart-svg { animation-delay:.20s;  }\n.chart-wrap:nth-child(n+6) .chart-svg { animation-delay:.24s;  }\n\n/* ── Readiness hero subtle pulse (only when score is good) ───── */\n.readiness-hero[data-pulse=\"true\"] {\n  animation:heroEntrance .5s cubic-bezier(.16,1,.3,1) both,\n            subtleGlow 3s ease-in-out 1s infinite;\n}\n\n/* ── Sidebar readiness badge entrance ────────────────────────── */\n.sidebar-readiness-badge { transition:opacity .3s; }\n\n/* ── Input focus states ──────────────────────────────────────── */\n.prof-input:focus {\n  outline:none;\n  border-color:var(--accent);\n  box-shadow:0 0 0 2px rgba(61,224,208,.12);\n}\n.gc-range:focus-visible { outline:2px solid var(--teal); }\n\n/* ── prefers-reduced-motion guard ───────────────────────────── */\n@media (prefers-reduced-motion: reduce) {\n  *,\n  *::before,\n  *::after {\n    animation-duration:    .01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration:   .01ms !important;\n    scroll-behavior:       auto !important;\n  }\n}\n\n/* ══════════════════════════════════════════════════════════════\n   v23 DESIGN ENHANCEMENT LAYER\n   Goal: cleaner, calmer, more premium health-dashboard feel.\n   All overrides sit here; base system stays intact.\n   ══════════════════════════════════════════════════════════════ */\n\n/* ── Token overrides ────────────────────────────────────────── */\n:root {\n  --bg:            #0C0F15;\n  --surface:       #131820;\n  --surface2:      #192030;\n  --surface3:      #1E2840;\n  --border:        #1f2e45;\n  --border2:       #26375a;\n  --text:          #EFF3F9;\n  --text2:         #8FA5BF;\n  --text3:         #5D7690;\n  --text4:         #3E5068;\n  --r-lg:          20px;\n  --r-md:          14px;\n  --r-sm:          10px;\n  --fs-body:       15px;   /* was 14px */\n  --fs-help:       13px;   /* was 12px */\n  --fs-card-title: 15px;   /* was 16px — slightly smaller so values dominate */\n  --sp-5:          28px;\n  --sp-6:          40px;\n  --sp-7:          56px;\n}\n\nbody { font-size:var(--fs-body); letter-spacing:-.01em; }\n\n/* ── Sidebar atmosphere now inherited from base ─── */\n.logo { margin-bottom:36px; padding:0 8px; }\n.logo-badge { width:34px; height:34px; border-radius:9px; font-size:15px; }\n.logo-title { font-size:14px; font-weight:700; letter-spacing:-.02em; }\n.logo-sub   { font-size:10px; color:var(--text4); margin-top:1px; }\n.nav-section-label {\n  font-size:9px; letter-spacing:.14em; color:var(--text4);\n  padding:0 10px; margin:28px 0 6px; font-weight:600;\n}\n.nav { gap:1px; }\n.nav-item {\n  padding:8px 10px; border-radius:8px;\n  font-size:13px; font-weight:400; letter-spacing:-.005em; color:var(--text3);\n}\n.nav-item:hover   { background:rgba(255,255,255,.03); color:var(--text2); }\n.nav-item.active,\n.nav-item.nav-active { background:rgba(61,224,208,.08); color:var(--teal); font-weight:500; }\n.nav-mode .nav-mode-btn.active {\n  background:rgba(61,224,208,.09);\n  box-shadow:inset 2px 0 0 rgba(61,224,208,.55);\n  font-weight:600;\n}\n.sidebar-data-card {\n  background:rgba(45,212,191,.04);\n  border:1px solid rgba(45,212,191,.09);\n  border-radius:12px;\n}\n.sidebar-readiness-badge {\n  background:rgba(61,224,208,.05);\n  border:1px solid rgba(61,224,208,.10);\n  border-radius:10px; margin-bottom:10px;\n}\n\n/* ── Topbar ─────────────────────────────────────────────────── */\n.topbar {\n  margin-bottom:36px;\n  padding-bottom:20px;\n  border-bottom:1px solid rgba(255,255,255,.045);\n}\n.topbar-title { font-size:20px; font-weight:700; letter-spacing:-.025em; }\n.topbar-sub   { font-size:12px; color:var(--text4); margin-top:2px; letter-spacing:.01em; }\n\n/* ── Main wrap ──────────────────────────────────────────────── */\n.main-wrap { padding:36px 44px 64px; max-width:1260px; }\n\n/* ── Section labels ─────────────────────────────────────────── */\n/* .sec-label v23 block removed — canonical rule below */\n.sec-label::after,\n.section-title::after { background:rgba(255,255,255,.04); }\n/* sec-label-lg 19px block removed — 18px !important wins */\n\n/* ── Global controls ────────────────────────────────────────── */\n.global-controls {\n  padding:10px 16px;\n  background:rgba(255,255,255,.02);\n  border:1px solid rgba(255,255,255,.045);\n  border-radius:12px; gap:16px; margin-bottom:28px;\n}\n.gc-label { font-size:11px; color:var(--text4); font-weight:500; }\n.gc-btn-group { background:rgba(0,0,0,.2); padding:3px; border-radius:8px; gap:1px; }\n.gc-btn { padding:4px 10px; border-radius:6px; font-size:11px; font-weight:500; }\n.gc-btn.active { background:rgba(61,224,208,.12); color:var(--teal); }\n\n/* ── Mode bar ───────────────────────────────────────────────── */\n.mode-bar {\n  background:rgba(0,0,0,.22);\n  border:1px solid rgba(255,255,255,.05);\n  padding:3px; border-radius:10px;\n}\n.mode-btn { padding:5px 13px; border-radius:7px; font-size:11px; font-weight:500; letter-spacing:.02em; }\n\n/* ── Readiness hero ─────────────────────────────────────────── */\n.readiness-hero {\n  min-height:280px; padding:52px 40px;\n  border-radius:20px;\n  background:\n    radial-gradient(ellipse at 25% 15%, rgba(61,224,208,.07) 0%, transparent 55%),\n    radial-gradient(ellipse at 78% 82%, rgba(88,166,255,.04) 0%, transparent 50%),\n    linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);\n  border:1px solid rgba(255,255,255,.055);\n  box-shadow:0 8px 32px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.04);\n  margin-bottom:40px;\n}\n/* Note: .readiness-score base font-size (56px mobile) is set per-breakpoint below */\n/* Desktop-sized score — overrides original 56px for screens above 640px */\n@media (min-width:641px) {\n  .readiness-score { font-size:64px; font-weight:700; letter-spacing:-.04em; }\n}\n.readiness-tier  {\n  font-size:12px; letter-spacing:.08em; text-transform:uppercase;\n  color:var(--text3); margin-top:10px; font-weight:600;\n}\n.readiness-note  { font-size:14px; color:var(--text3); margin-top:16px; max-width:400px; line-height:1.6; }\n.readiness-subscore {\n  background:rgba(255,255,255,.02);\n  border:1px solid rgba(255,255,255,.05);\n  border-radius:12px; padding:12px 18px; min-width:80px;\n}\n.readiness-subscore .rs-val  { font-size:20px; }\n.readiness-subscore .rs-label{ font-size:9px; letter-spacing:.08em; margin-top:4px; }\n\n/* ── Chart cards ────────────────────────────────────────────── */\n.chart-wrap,\n.chart-card {\n  padding:22px;\n  border-radius:var(--r-md);\n  border:1px solid rgba(255,255,255,.045);\n  background:var(--surface);\n}\n/* chart-title 14px bare rule removed — consolidated */\n.chart-sub   { font-size:12px; color:var(--text3); margin-bottom:16px; }\n.chart-grid  { gap:14px; margin-bottom:28px; }\n\n/* ── Adv trends accordion ───────────────────────────────────── */\n.adv-trends {\n  border-radius:12px;\n  border:1px solid rgba(255,255,255,.04);\n  background:rgba(255,255,255,.008);\n  margin:6px 0 28px;\n}\n.adv-trends summary {\n  padding:13px 18px; font-size:12px; font-weight:500;\n  color:var(--text3); letter-spacing:.02em;\n}\n.adv-trends summary:hover { background:rgba(255,255,255,.02); color:var(--text2); }\n\n/* ── Metric cards ───────────────────────────────────────────── */\n.metric {\n  background:rgba(255,255,255,.015);\n  border:1px solid rgba(255,255,255,.04);\n  border-radius:12px; padding:14px 16px;\n}\n.m-label {\n  font-size:10px; letter-spacing:.03em; color:var(--text4);\n  margin-bottom:6px; font-weight:600;\n  text-transform:none;\n}\n.m-val { font-size:19px; letter-spacing:-.02em; }\n\n/* nr-kpi-label, ss-kpi-label: text-transform overrides folded into their\n   full rule definitions below — no stub rules needed here */\n\n/* Smart Summary impression bar — weight 500, tighter spacing */\n.ss-impression {\n  font-weight: 500;       /* 600 reads as quasi-mono at body size; 500 is proportional */\n  letter-spacing: -.01em;\n}\n\n/* ── Section card ───────────────────────────────────────────── */\n.section-card {\n  border-radius:16px; padding:22px 24px; margin-bottom:16px;\n  border:1px solid rgba(255,255,255,.045);\n}\n.section-card-title { font-size:14px; font-weight:600; letter-spacing:-.01em; }\n\n/* ── Night rows ─────────────────────────────────────────────── */\n.night-table { gap:8px; margin-bottom:32px; }\n.night-row {\n  padding:18px 22px; border-radius:var(--r-md);\n  border:1px solid rgba(255,255,255,.045); background:var(--surface);\n}\n.night-row:hover {\n  border-color:rgba(61,224,208,.18);\n  background:rgba(61,224,208,.018);\n  box-shadow:0 2px 14px rgba(0,0,0,.14);\n}\n.night-detail {\n  border:1px solid rgba(255,255,255,.045); border-top:none;\n  border-bottom-left-radius:var(--r-md); border-bottom-right-radius:var(--r-md);\n  padding:24px; background:rgba(10,13,19,.5); margin-top:-7px;\n}\n.nr-date-v22 { font-size:15px; font-weight:600; letter-spacing:-.01em; }\n.nr-dur      { font-size:11px; color:var(--text4); }\n.nr-kpi {\n  padding:9px 14px; border-radius:10px;\n  border:1px solid rgba(255,255,255,.04);\n  background:rgba(255,255,255,.016);\n}\n.nr-kpi-label { font-size:9px; letter-spacing:.03em; color:var(--text4); margin-bottom:4px; text-transform:none; }\n.nr-kpi-val   { font-size:20px; letter-spacing:-.02em; }\n/* ss-kpi and ss-rank labels: match non-caps style */\n.ss-kpi-label  { text-transform:none; letter-spacing:.03em; }\n.ss-rank-label { text-transform:none; letter-spacing:.02em; }\n.nr-expand-btn {\n  border:1px solid rgba(255,255,255,.06);\n  border-radius:8px; padding:7px 10px; font-size:11px; color:var(--text4);\n}\n.nr-expand-btn:hover { border-color:rgba(61,224,208,.25); color:var(--teal); }\n.nr-chip {\n  font-size:10px; padding:3px 8px; border-radius:6px; font-weight:500;\n}\n.nr-flag { font-size:10px; padding:2px 8px; border-radius:7px; font-weight:600; }\n\n/* ── Projection cards ───────────────────────────────────────── */\n.proj-grid  { gap:14px; margin-bottom:20px; }\n.proj-card  { padding:22px; border-radius:var(--r-md); border:1px solid rgba(255,255,255,.045); gap:16px; }\n.proj-title { font-size:14px; letter-spacing:-.01em; }\n.proj-range { font-size:12px; border-radius:8px; padding:5px 11px; background:rgba(0,0,0,.2); }\n.proj-waterfall { border-radius:10px; padding:12px 14px; gap:4px; }\n\n/* ── Smart summary ──────────────────────────────────────────── */\n.smart-summary {\n  border-radius:16px; padding:22px; margin-bottom:24px;\n  background:rgba(88,166,255,.03);\n  border:1px solid rgba(88,166,255,.08);\n}\n.ss-controls {\n  border-radius:10px; padding:8px 12px;\n  background:rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.04);\n}\n.ss-kpi { border-radius:10px; padding:10px 13px; background:var(--surface); }\n\n/* ── Karvonen card ──────────────────────────────────────────── */\n.karv-card {\n  border-radius:16px; padding:20px; gap:14px;\n  border:1px solid rgba(255,255,255,.045);\n}\n.karv-readiness { padding:16px; border-radius:12px; }\n.karv-read-val  { font-size:48px; }\n\n/* ── Alerts ─────────────────────────────────────────────────── */\n.alert { border-radius:12px; padding:12px 16px; font-size:13px; }\n.alert.alert-info     { background:rgba(88,166,255,.04);  border-color:rgba(88,166,255,.13); }\n.alert.alert-advisory { background:rgba(245,158,11,.04);  border-color:rgba(245,158,11,.16); }\n\n/* ── Research accordion headers ─────────────────────────────── */\n.research-accordion-header {\n  font-size:10px; letter-spacing:.05em; color:var(--text4); margin:24px 0 12px; font-weight:600;\n  text-transform:none; /* override original uppercase */\n}\n.research-accordion-header:hover { color:var(--text3); }\n\n/* .metric-hero .m-label has higher specificity than .m-label — needs explicit override */\n.metric-hero .m-label { text-transform:none; letter-spacing:.05em; }\n\n/* ── Table ──────────────────────────────────────────────────── */\n.table-wrap { border-radius:12px; border:1px solid rgba(255,255,255,.045); }\nth { font-size:10px; letter-spacing:.08em; color:var(--text4); padding:10px 14px; }\ntd { padding:9px 14px; font-size:12px; }\n\n/* ── Buttons ────────────────────────────────────────────────── */\n.btn {\n  border-radius:8px; font-size:12px; font-weight:500;\n  padding:7px 13px; border:1px solid rgba(255,255,255,.05);\n}\n\n/* ── Tabs ───────────────────────────────────────────────────── */\n.tab { font-size:12px; font-weight:500; padding:9px 16px; letter-spacing:-.005em; }\n\n/* ── Badge ──────────────────────────────────────────────────── */\n.badge {\n  background:rgba(61,224,208,.05);\n  border:1px solid rgba(61,224,208,.13);\n  border-radius:20px; padding:3px 10px; font-size:10px; letter-spacing:.03em;\n}\n\n/* ── Night detail header ────────────────────────────────────── */\n.night-detail-header { padding-bottom:16px; margin-bottom:16px; }\n.ndh-date { font-size:17px; font-weight:700; letter-spacing:.01em; }\n.ndh-dur  { font-size:12px; border-radius:6px; padding:2px 8px; }\n\n/* ── Metric group headers ───────────────────────────────────── */\n.metric-group h3 {\n  font-size:10px; letter-spacing:.05em; text-transform:none;\n  color:var(--text4); padding-bottom:6px; margin-bottom:10px;\n}\n\n/* ── Metric hero ────────────────────────────────────────────── */\n.metric-hero {\n  border-radius:18px; padding:26px 22px;\n  background:linear-gradient(180deg, rgba(61,224,208,.07), rgba(13,16,21,.7));\n  border:1px solid rgba(61,224,208,.15);\n}\n/* .metric-hero .m-val stays at 48px from original */\n\n/* ── Profile panel ──────────────────────────────────────────── */\n#userProfilePanel { border-radius:16px; border:1px solid rgba(255,255,255,.045); }\n#profileHeader {\n  border-radius:16px 16px 0 0;\n  background:rgba(255,255,255,.02);\n  border-bottom:1px solid rgba(255,255,255,.045);\n  padding:12px 18px;\n}\n.prof-input {\n  background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.07);\n  border-radius:8px; font-size:13px;\n}\n\n/* ── Scrollbar ──────────────────────────────────────────────── */\n::-webkit-scrollbar { width:4px; height:4px; }\n::-webkit-scrollbar-thumb {\n  background:rgba(255,255,255,.08); border-radius:4px;\n}\n::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.14); }\n\n/* ── Mobile sticky header ───────────────────────────────────── */\n.mobile-sticky-header {\n  background: rgba(12,15,21,.94);\n  border-bottom: 1px solid rgba(255,255,255,.04);\n  backdrop-filter: blur(20px);\n  -webkit-backdrop-filter: blur(20px);\n}\n.msh-label { font-size:11px; color:var(--text4); letter-spacing:.04em; }\n.msh-score { font-size:22px; font-weight:700; }\n.msh-pill {\n  background: rgba(255,255,255,.035);\n  border: 1px solid rgba(255,255,255,.055);\n  border-radius: 8px;\n  font-size: 10px;\n  font-weight: 600;\n  color: var(--text2);\n}\n/* .msh-pill .msh-pill-label color/size unchanged from original */\n\n/* ── Mobile bottom nav ──────────────────────────────────────── */\n.mobile-nav {\n  background: rgba(12,15,21,.97);\n  border-top: 1px solid rgba(255,255,255,.04);\n  backdrop-filter: blur(24px);\n  -webkit-backdrop-filter: blur(24px);\n}\n.mobile-nav-item {\n  font-size: 10px;\n  font-weight: 500;\n  color: var(--text4);\n  border-radius: 10px;\n  padding: 6px 12px;\n}\n/* active/hover color (var(--teal)) unchanged from original */\n.mobile-nav-item.active { background: rgba(61,224,208,.07); }\n.mobile-nav-icon { font-size: 17px; }\n\n/* ── Mobile-nav density strip (Core / Advanced / Research) ───────\n   The topbar/sidebar mode-bar is hidden on phones, so this is the only\n   way to change detail level on mobile. Only renders inside .mobile-nav,\n   which itself is mobile-only. */\n.mobile-nav-modes {\n  display: flex;\n  gap: 5px;\n  justify-content: center;\n  padding: 7px 10px 2px;\n}\n.mnav-mode-btn {\n  flex: 1 1 0;\n  max-width: 130px;\n  padding: 5px 6px;\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: .02em;\n  color: var(--text3);\n  background: var(--surface2);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  cursor: pointer;\n  transition: all .18s cubic-bezier(.4,0,.2,1);\n}\n.mnav-mode-btn.active {\n  background: rgba(61,224,208,.13);\n  color: var(--teal);\n  border-color: rgba(61,224,208,.3);\n}\n.mnav-mode-btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }\n\n/* ── Profile auto-pills: keep long pills inside the viewport on mobile ──\n   Base #profileAutoText is inline-flex (sizes to content), which let long\n   pills overflow off-screen. On phones, make it a width-constrained block\n   flex so pills wrap and long text breaks instead of clipping. */\n@media (max-width: 768px) {\n  #profileAutoText {\n    display: flex !important;\n    flex-wrap: wrap !important;\n    max-width: 100%;\n  }\n  #profileAutoText .auto-pill {\n    max-width: 100%;\n    min-width: 0;\n    overflow-wrap: anywhere;\n  }\n  /* Taller bottom nav (mode strip + tabs) needs more scroll clearance\n     than the original 80px, or the last rows hide behind it. */\n  .main-wrap, .main-content { padding-bottom: 122px !important; }\n  #results { padding-bottom: 122px !important; }\n}\n\n/* ── Responsive overrides ───────────────────────────────────── */\n/* 1080px: hide sidebar, full-width layout, preserve bottom nav clearance.\n   padding shorthand must include bottom (80px) to avoid original bug at\n   line 937 where padding:18px erases the padding-bottom:80px from line 236. */\n@media (max-width:1080px) {\n  .main-wrap { padding:24px 20px 80px; }\n  .topbar { margin-bottom:24px; padding-bottom:16px; }\n}\n\n/* 768px: single-column, compact hero */\n@media (max-width:768px) {\n  .main-wrap { padding:18px 14px 80px; }\n  .readiness-hero { min-height:200px; padding:32px 20px; }\n  .readiness-score { font-size:56px; }  /* keep original mobile size */\n  .chart-grid { gap:10px; }\n  .night-row { padding:14px 16px; }\n  .proj-card { padding:16px; }\n  .section-card { padding:16px 18px; }\n  .chart-wrap,\n  .chart-card { padding:16px; }\n}\n\n/* 640px: tight layout, compact night rows */\n@media (max-width:640px) {\n  .main-wrap { padding:14px 12px 80px; }\n  .topbar { margin-bottom:16px; padding-bottom:12px; }\n  .topbar-title { font-size:17px; }\n  .readiness-score { font-size:48px; }\n  .readiness-hero { min-height:180px; padding:26px 16px; }\n  .nr-kpi { padding:7px 10px; }\n  .nr-kpi-val { font-size:17px; }\n  .metric { padding:11px 13px; }\n  .m-val { font-size:17px; }\n}\n\n/* 480px: minimal spacing */\n@media (max-width:480px) {\n  .readiness-score { font-size:44px; }\n  .chart-grid { gap:8px; }\n  .night-row { padding:12px 14px; }\n  .nr-kpi-val { font-size:16px; }\n}\n\n/* ── Multi-Night Summary unified card ───────────────────────── */\n.mns-card {\n  background: var(--surface);\n  border: 1px solid rgba(255,255,255,.045);\n  border-radius: var(--r-lg);\n  padding: 20px 22px 14px;\n  margin-bottom: 28px;\n}\n.mns-card .grid {\n  margin-bottom: 12px;\n}\n.mns-row-label {\n  font-size: 10px;\n  letter-spacing: .04em;\n  text-transform: none;\n  color: var(--text4);\n  font-weight: 600;\n  margin-bottom: 10px;\n}\n.mns-divider {\n  height: 1px;\n  background: rgba(255,255,255,.04);\n  margin: 16px 0 14px;\n}\n.mns-trend-pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  background: rgba(255,255,255,.025);\n  border: 1px solid rgba(255,255,255,.05);\n  border-radius: 20px;\n  padding: 4px 12px;\n  font-size: 12px;\n  color: var(--text3);\n  margin-bottom: 4px;\n}\n.mns-trend-icon { font-size: 13px; }\n.mns-trend-txt  { font-weight: 500; }\n\n/* ── Chip overflow toggle ────────────────────────────────────── */\n.chip-more-btn {\n  display: inline-flex;\n  align-items: center;\n  padding: 3px 9px;\n  border-radius: 6px;\n  font-size: 10px;\n  font-weight: 600;\n  color: var(--text4);\n  background: rgba(255,255,255,.03);\n  border: 1px solid rgba(255,255,255,.07);\n  cursor: pointer;\n  transition: color .12s, border-color .12s;\n  vertical-align: middle;\n  margin-left: 2px;\n}\n.chip-more-btn:hover {\n  color: var(--teal);\n  border-color: rgba(61,224,208,.25);\n}\n.chip-overflow {\n  display: none;\n}\n.chip-overflow.open {\n  display: contents; /* makes overflow chips direct flex children of nr-advanced → wrap correctly */\n}\n\n/* ── Export toolbar ─────────────────────────────────────────── */\n.export-toolbar {\n  display: flex;\n  align-items: center;\n  flex-wrap: wrap;\n  gap: 20px;\n  padding: 18px 22px;\n  margin-top: 32px;\n  background: var(--surface);\n  border: 1px solid rgba(255,255,255,.045);\n  border-radius: var(--r-md);\n}\n.export-primary {\n  display: flex;\n  gap: 10px;\n  flex-wrap: wrap;\n}\n.export-secondary {\n  display: flex;\n  gap: 8px;\n  flex-wrap: wrap;\n  margin-left: auto;\n  align-items: center;\n}\n.btn-export-main {\n  padding: 9px 18px;\n  font-size: 13px;\n  font-weight: 600;\n  border-radius: 9px;\n}\n/* .btn-destructive provided by base — overrides for v27 layer remain below */\n\n/* Topbar mode-bar: sidebar already has Core/Advanced/Research controls.\n   Hide the topbar duplicate on desktop to avoid redundancy. */\n@media (min-width: 1081px) {\n  .topbar .mode-bar { display: none; }\n  .topbar .mode-hint { display: none; }\n}\n\n/* nr-stat .label: 9px stat labels — keep uppercase at this size for legibility */\n/* .karv-read-label, .srb-label, .readiness-subscore .rs-label: intentional uppercase badges */\n\n/* ══ end v23 design layer ══ */\n\n/* ══════════════════════════════════════════════════════════════\n   POLISH LAYER v2 — corrected + theme toggle\n   Sections: 1 Typography · 2 Max-width · 3 Profile form\n             4 Warning banner · 5 Readiness tiles · 6 Score color\n             7 Sidebar hierarchy · 8 Chart cards · 9 Light theme\n   ══════════════════════════════════════════════════════════════ */\n\n/* ── §1  GLOBAL TYPOGRAPHY SCALE ──────────────────────────────\n   3 tiers: heading (16/600) · label (14/500) · hint (12/400 muted) */\n.t-heading {\n  font-size: 16px !important;\n  font-weight: 600 !important;\n}\n.t-label-field {\n  font-size: 14px !important;\n  font-weight: 500 !important;\n}\n.t-hint {\n  font-size: 12px !important;\n  font-weight: 400 !important;\n  color: rgba(255,255,255,0.45) !important;\n}\n\n/* Section card titles → heading tier */\n.section-card-title,\n#profileHeader h3,\n.profile-zone-label-sm,\n.karv-card > .section-card-title {\n  font-size: 16px !important;\n  font-weight: 600 !important;\n}\n\n/* Profile form field labels → label tier */\n.prof-label {\n  font-size: 14px !important;\n  font-weight: 500 !important;\n}\n\n/* Profile sublabels / hints → hint tier */\n.prof-sublabel {\n  font-size: 12px !important;\n  font-weight: 400 !important;\n  color: rgba(255,255,255,0.45) !important;\n  opacity: 1 !important;\n}\n\n/* Chart legend text → hint tier */\n.chart-legend,\n.legend-item {\n  font-size: 12px !important;\n  font-weight: 400 !important;\n  color: rgba(255,255,255,0.45) !important;\n}\n\n\n/* ── §2  MAIN CONTENT AREA — MAX-WIDTH + CENTERING ────────────  */\n.main-wrap {\n  max-width: 1100px !important;\n  /* margin-left/right handled by UX layer sidebar offset */\n  margin-right: auto !important;\n  padding-left: 24px !important;\n  padding-right: 24px !important;\n  padding-top: 40px !important;\n}\n\n/* Topbar — spacing below page title block */\n.topbar {\n  margin-bottom: 32px !important;\n  border-bottom: 1px solid rgba(255,255,255,0.08) !important;\n  padding-bottom: 16px !important;\n}\n/* Mobile breakpoints use padding shorthand — re-assert padding-top per breakpoint\n   so our value survives without being reset by the shorthand. */\n@media (max-width:1080px) {\n  .main-wrap { padding-top: 28px !important; }\n}\n@media (max-width:768px) {\n  .main-wrap { padding-top: 20px !important; }\n}\n@media (max-width:640px) {\n  .main-wrap { padding-top: 16px !important; }\n}\n\n\n/* ── §3  USER PROFILE FORM — FIELD WIDTH + SPACING + GROUPS ──── */\n/* All inputs capped to 65% of their column — compact but readable */\n.prof-input {\n  max-width: 65% !important;\n}\n/* Extra breathing room between rows */\n.prof-grid {\n  row-gap: 20px !important;\n}\n/* Group separator — border on BOTH columns 5 and 6 (SBP + DBP) so the\n   dividing line visually spans both columns WITHOUT breaking grid flow.\n   All fields keep their natural pairing. */\n.prof-grid .prof-field:nth-child(5),\n.prof-grid .prof-field:nth-child(6) {\n  border-top: 1px solid rgba(255,255,255,0.08) !important;\n  padding-top: 16px !important;\n  margin-top: 6px !important;\n}\n/* Elevation (field 10) paired with Resting HR (field 9) — no overrides needed */\n\n\n/* ── §4  ALERT / WARNING BANNER ───────────────────────────────── */\n.parse-warning-banner {\n  position: relative !important;\n  padding: 14px 48px 14px 16px !important; /* right padding leaves room for dismiss btn */\n  line-height: 1.6 !important;\n  border-radius: 10px !important;\n}\n/* Dismiss button — positioned top-right */\n.parse-warning-banner .dismiss-btn,\n.parse-warning-banner button {\n  position: absolute !important;\n  top: 10px !important;\n  right: 12px !important;\n  /* Keep any existing button styles intact; just fix position */\n}\n/* Warning lines — flex list items */\n.parse-warning-banner .warn-line {\n  display: flex !important;\n  align-items: flex-start !important;\n  gap: 6px !important;\n  margin-bottom: 4px !important;\n}\n.parse-warning-banner .warn-line::before {\n  content: \"⚠\";\n  flex-shrink: 0;\n  font-size: 13px;\n  margin-top: 1px;\n}\n\n\n/* ── §5  READINESS HERO CARD — METRIC TILE CONSISTENCY ──────── */\n/* The 4 subscores (SpO₂, HR-VAR, SLEEP, HR FLOOR) */\n.readiness-subscore {\n  min-width: 120px !important;\n  flex: 1 !important;\n  text-align: center !important;\n}\n.readiness-subscore .rs-val {\n  font-size: 26px !important;\n  font-weight: 700 !important;\n  white-space: nowrap !important;\n}\n.readiness-subscore .rs-label {\n  font-size: 11px !important;\n  text-transform: uppercase !important;\n  letter-spacing: 0.08em !important;\n  color: rgba(255,255,255,0.5) !important;\n}\n/* Recommendation / note text */\n.readiness-note {\n  background: rgba(255,255,255,0.05) !important;\n  border-radius: 8px !important;\n  padding: 10px 16px !important;\n  margin-top: 12px !important;\n}\n\n\n/* ── §6  READINESS SCORE COLOR → TEAL (not orange) ──────────── */\n/* Override the JS-set inline color by targeting the element when it has\n   status-concern or orange color — we force teal at CSS level.\n   The JS sets color via inline style; we use a higher-specificity rule\n   on the ID used for the main hero score and the sidebar score. */\n.readiness-score {\n  color: #4dd9ac !important;   /* teal accent — same as --accent */\n}\n/* Keep status coloring only on rs-val sub-scores (SpO₂, HR-VAR, SLEEP, HR FLOOR).\n   Those use .rs-val.ok / .rs-val.warn / .rs-val.bad which are fine. */\n/* Sidebar readiness badge — also neutralize to teal */\n.srb-score {\n  color: #4dd9ac !important;\n}\n\n\n/* ── §7  SIDEBAR — SECTION HIERARCHY ─────────────────────────── */\n/* Section labels NAVIGATE / DETAIL TIER */\n.nav-section-label {\n  font-size: 10px !important;\n  font-weight: 700 !important;\n  letter-spacing: 0.12em !important;\n  color: rgba(255,255,255,0.35) !important;\n  text-transform: uppercase !important;\n}\n/* \"DETAIL TIER\" label — add top margin + top border for separation */\n.nav-section-label:nth-of-type(2) {\n  margin-top: 24px !important;\n  border-top: 1px solid rgba(255,255,255,0.08) !important;\n  padding-top: 16px !important;\n}\n/* Core / Advanced / Research links — indent 8px */\n.nav-mode .nav-item {\n  padding-left: 18px !important; /* base 10px + 8px indent */\n}\n\n/* Sidebar bottom — readiness widget in its own card */\n#sidebarReadinessBadge {\n  background: rgba(255,255,255,0.05) !important;\n  border-radius: 10px !important;\n  padding: 10px 12px !important;\n  margin-bottom: 10px !important;\n  display: flex !important;\n  flex-direction: column !important;\n  gap: 4px !important;\n}\n/* Data Loaded badge + session stats sit outside the card (already separate div) */\n.sidebar-data-card {\n  /* No change needed — already separate element */\n}\n\n\n/* ── §8  CHART CARDS — STANDARDIZE PADDING, GAP, TITLE, LEGEND ─ */\n.chart-card,\n.chart-wrap {\n  padding: 16px !important;\n}\n.chart-grid {\n  gap: 16px !important;\n}\n.chart-title,\n.chart-card h4 {\n  font-size: 13px !important;\n  font-weight: 600 !important;\n}\n/* Legend: move below chart (already typically below), left-aligned */\n.chart-legend {\n  margin-top: 12px !important;\n  justify-content: flex-start !important;\n}\n\n\n/* ── §9  LIGHT / DARK THEME TOGGLE ─────────────────────────────── */\n\n/* ── Theme toggle button — fixed top-right ─ */\n#themeToggleBtn {\

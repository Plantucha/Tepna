n  position: fixed;\n  top: 14px;\n  right: 18px;\n  z-index: 600;\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.10);\n  border-radius: 20px;\n  padding: 5px 12px 5px 9px;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--text2);\n  transition: background 0.2s, border-color 0.2s, color 0.2s;\n  user-select: none;\n  -webkit-tap-highlight-color: transparent;\n  letter-spacing: 0.03em;\n}\n#themeToggleBtn:hover {\n  background: rgba(255,255,255,0.10);\n  border-color: rgba(255,255,255,0.18);\n  color: var(--text);\n}\n#themeToggleBtn .theme-icon { font-size: 14px; line-height: 1; }\n\n/* ── LIGHT THEME — token overrides on body.light ─ */\nbody.light {\n  --bg:       #F2F5F9;\n  --surface:  #FFFFFF;\n  --surface2: #EBF0F7;\n  --surface3: #DDE4EF;\n  --border:   #C8D4E4;\n  --border2:  #B0C0D8;\n  --text:     #0F1923;\n  --text2:    #3A4E65;\n  --text3:    #5A7090;\n  --text4:    #5D7A96;  /* raised from #8098B4 for WCAG AA (~4.7:1 on light bg) */\n  --b:        1px solid rgba(0,0,0,.07);\n  --b2:       1px solid rgba(61,224,208,.18);\n  --s:        0 4px 18px rgba(0,0,0,.10);\n}\n\n/* Sidebar */\n/* body.light .sidebar — using base atmospheric light gradient */\nbody.light .logo-badge {\n  box-shadow: 0 0 18px rgba(61,224,208,0.20);\n}\nbody.light .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }\nbody.light .nav-item.active,\nbody.light .nav-item.nav-active { background: rgba(61,224,208,0.12); color: #0B7A6E; }\nbody.light .nav-section-label { color: rgba(0,0,0,0.30) !important; }\nbody.light .nav-section-label:nth-of-type(2) {\n  border-top-color: rgba(0,0,0,0.07) !important;\n}\nbody.light .sidebar-data-card {\n  background: rgba(45,212,191,0.06);\n  border-color: rgba(45,212,191,0.18);\n}\nbody.light #sidebarReadinessBadge {\n  background: rgba(0,0,0,0.03) !important;\n  border: 1px solid rgba(0,0,0,0.06) !important;\n}\nbody.light .srb-note { color: var(--text3); }\n\n/* Main content */\nbody.light .main-wrap { background: transparent; }\nbody.light .topbar {\n  border-bottom-color: rgba(0,0,0,0.08) !important;\n}\nbody.light .topbar-sub { color: var(--text4); }\n\n/* Upload zone */\nbody.light #uploadArea {\n  background: #FFFFFF;\n  border-color: rgba(61,224,208,0.30);\n}\nbody.light #uploadArea:hover { background: rgba(88,166,255,0.04); border-color: var(--blue); }\n\n/* Profile panel */\nbody.light #userProfilePanel { background: #FFFFFF; border-color: rgba(0,0,0,0.07); }\nbody.light #profileHeader { background: var(--surface2); border-bottom-color: rgba(0,0,0,0.07); }\nbody.light #profileAutoDetect { background: var(--surface3); border-bottom-color: rgba(0,0,0,0.07); color: var(--text3); }\nbody.light .prof-input {\n  background: #FFFFFF;\n  border-color: rgba(0,0,0,0.14);\n  color: var(--text);\n}\nbody.light .prof-input:focus { border-color: var(--teal); }\nbody.light .prof-label { color: var(--text2) !important; }\nbody.light .prof-sublabel { color: rgba(0,0,0,0.38) !important; }\nbody.light .prof-zone-label { color: var(--text3); }\nbody.light .prof-zone-val   { color: var(--text); }\nbody.light #profileDerived  { background: var(--surface2); border-color: rgba(0,0,0,0.07); }\nbody.light #profileZones    { background: var(--surface2); border-color: rgba(0,0,0,0.07); }\nbody.light .prof-zone-row   { border-bottom-color: rgba(0,0,0,0.05); }\nbody.light .prof-grid .prof-field:nth-child(5),\nbody.light .prof-grid .prof-field:nth-child(6) {\n  border-top-color: rgba(0,0,0,0.08) !important;\n}\n\n/* Cards + surfaces */\nbody.light .section-card,\nbody.light .chart-card,\nbody.light .chart-wrap,\nbody.light .night-row,\nbody.light .proj-card,\nbody.light .smart-summary,\nbody.light .mns-card,\nbody.light .readiness-hero {\n  background: #FFFFFF;\n  border-color: rgba(0,0,0,0.07);\n}\nbody.light .night-row:hover {\n  border-color: rgba(61,224,208,0.28);\n  background: rgba(61,224,208,0.03);\n}\nbody.light .night-detail {\n  background: rgba(242,245,249,0.7);\n  border-color: rgba(0,0,0,0.06);\n}\nbody.light .metric {\n  background: rgba(0,0,0,0.02);\n  border-color: rgba(0,0,0,0.06);\n}\n\n/* Readiness hero */\nbody.light .readiness-hero {\n  background:\n    radial-gradient(ellipse at 25% 15%, rgba(61,224,208,0.08) 0%, transparent 55%),\n    radial-gradient(ellipse at 78% 82%, rgba(88,166,255,0.05) 0%, transparent 50%),\n    linear-gradient(180deg, #FFFFFF 0%, #F2F5F9 100%);\n  border-color: rgba(0,0,0,0.07);\n  box-shadow: 0 4px 24px rgba(0,0,0,0.07);\n}\nbody.light .readiness-note {\n  background: rgba(0,0,0,0.04) !important;\n}\nbody.light .readiness-subscore {\n  background: rgba(0,0,0,0.03);\n  border-color: rgba(0,0,0,0.06);\n}\n\n/* Global controls + tabs */\nbody.light .global-controls {\n  background: rgba(0,0,0,0.03);\n  border-color: rgba(0,0,0,0.06);\n}\nbody.light .mode-bar {\n  background: rgba(0,0,0,0.06);\n  border-color: rgba(0,0,0,0.08);\n}\nbody.light .mode-btn { color: var(--text3); }\nbody.light .mode-btn.active { background: rgba(61,224,208,0.16); color: #0B7A6E; }\nbody.light .tab { color: var(--text3); }\nbody.light .tab.active { color: var(--blue); }\n\n/* Charts + legend */\nbody.light .chart-legend,\nbody.light .legend-item { color: rgba(0,0,0,0.45) !important; }\nbody.light .chart-note { color: var(--text3); }\n\n/* Tables */\nbody.light thead tr { background: var(--surface2); }\nbody.light th { color: var(--text3); }\nbody.light td { color: var(--text); }\nbody.light tr:hover td { background: rgba(61,224,208,0.04); }\n\n/* Buttons */\nbody.light .btn { background: #FFFFFF; border-color: rgba(0,0,0,0.10); color: var(--text2); }\nbody.light .btn:hover { background: var(--surface2); color: var(--text); }\n\n/* Parse warning banner */\nbody.light .parse-warning-banner {\n  background: #FFF8EC;\n  border-color: #F59E0B;\n  color: #92400E;\n}\n\n/* Scrollbar */\nbody.light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.14); }\nbody.light ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.22); }\n\n/* Theme toggle button in light mode */\nbody.light #themeToggleBtn {\n  background: rgba(0,0,0,0.05);\n  border-color: rgba(0,0,0,0.12);\n  color: var(--text3);\n}\nbody.light #themeToggleBtn:hover {\n  background: rgba(0,0,0,0.09);\n  color: var(--text);\n}\n\n/* Text utility overrides */\nbody.light .text-dim    { color: var(--text3); }\nbody.light .m-label     { color: var(--text4); }\nbody.light .m-sub       { color: var(--text3); }\nbody.light .sec-label,\nbody.light .section-title { color: var(--text4); }\nbody.light .chart-sub   { color: var(--text3); }\nbody.light .nav-badge   { background: rgba(61,224,208,0.12); color: #0B7A6E; }\n\n\n/* ── Light theme: mobile sticky header ─────────────────────── */\nbody.light .mobile-sticky-header {\n  background: rgba(255,255,255,0.96);\n  border-bottom: 1px solid rgba(0,0,0,0.07);\n}\nbody.light .msh-label  { color: var(--text4); }\nbody.light .msh-score  { color: var(--text);  }\nbody.light .msh-pill {\n  background: rgba(0,0,0,0.04);\n  border: 1px solid rgba(0,0,0,0.08);\n  color: var(--text2);\n}\nbody.light .msh-pill .msh-pill-label { color: var(--text4); }\n\n/* ── Light theme: mobile bottom navigation ──────────────────── */\nbody.light .mobile-nav {\n  background: rgba(255,255,255,0.97);\n  border-top: 1px solid rgba(0,0,0,0.07);\n}\nbody.light .mobile-nav-item {\n  color: var(--text4);\n}\nbody.light .mobile-nav-item:hover,\nbody.light .mobile-nav-item.active {\n  color: #0B7A6E;          /* same teal-on-light used in sidebar */\n}\nbody.light .mobile-nav-item.active {\n  background: rgba(61,224,208,0.10);\n}\n/* ══ end §9 light theme ══ */\n\n\n/* ── §T  TABULAR NUMERALS — all numeric display elements ── */\n.m-val,\n.readiness-score,\n.readiness-subscore .rs-val,\n.nr-kpi-val,\n.ss-kpi-val,\n.ss-val,\n.proj-value,\n.proj-value,\n.pf-val,\n.karv-read-val,\n.karv-read-val,\n.karv-score-val,\n.karv-zone-range,\n.karv-pill strong,\n.metric-val,\n.gc-range-val,\n.ss-range-val,\n.msh-score,\n.srb-score,\n.srb-score,\n.ndh-date,\n.nr-dur,\n.stab-score-val,\n.prof-zone-val,\n.spike-time,\n.spike-spo2,\n.t-pct,\n.kpi-val,\n.readiness-date-badge,\ntd {\n  font-variant-numeric: tabular-nums;\n}\n\n/* ── §W  WARNING BANNER — file paths in mono ────────────── */\n.parse-warning-banner .warn-line code,\n.parse-warning-banner .file-path,\n.parse-warning-banner .warn-file {\n  font-family: 'JetBrains Mono', 'Courier New', monospace;\n  font-size: 11px;\n}\n\n/* ── FIX 2 — Karvonen zone rows: colored left borders ──────── */\n.prof-zone-row {\n  border-left: 3px solid transparent;\n  padding-left: 10px;\n}\n.zone-1 { border-left-color: #4dd9ac; }   /* teal   — Z1 Recovery  */\n.zone-2 { border-left-color: #60a5fa; }   /* blue   — Z2 Aerobic   */\n.zone-3 { border-left-color: #facc15; }   /* yellow — Z3 Threshold */\n.zone-4 { border-left-color: #fb923c; }   /* orange — Z4 Lactate   */\n.zone-5 { border-left-color: #f87171; }   /* red    — Z5 Max       */\n\n/* ── FIX 3 — profileDerived sub-group labels + layout ──────── */\n#profileDerived {\n  /* Override the flat grid — become a flex column of sub-sections */\n  display: block !important;\n  padding: 12px 14px !important;\n}\n.pd-group {\n  margin-bottom: 2px;\n}\n.pd-group-sep {\n  border-top: 1px solid rgba(255,255,255,0.08);\n  padding-top: 10px;\n  margin-top: 10px;\n}\n.pd-group-label {\n  display: block;\n  font-size: 10px;\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  opacity: 0.4;\n  margin-bottom: 5px;\n}\n.pd-group-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 4px 12px;\n  font-size: 11px;\n  color: var(--text2);\n  line-height: 1.5;\n}\nbody.light .pd-group-sep { border-top-color: rgba(0,0,0,0.08); }\n\n/* ── FIX 4 — localStorage save note: subtle + right-aligned ─── */\n#profileSaveNote {\n  text-align: right !important;\n  font-size: 11px !important;\n  opacity: 0.22 !important;\n  padding: 3px 8px 6px 0 !important;\n  display: block !important;\n  margin-top: 4px !important;\n}\n\n/* ── FIX 5 — Page title: top breathing room ───────────────────  */\n.topbar {\n  padding-top: 28px !important;\n  margin-bottom: 24px !important;\n}\n\n/* ── FIX 6 — Warning banner: bullet lines ─────────────────────  */\n.parse-warning-banner {\n  padding: 12px 48px 12px 14px !important;\n  position: relative !important;\n  line-height: 1.6 !important;\n}\n.pwb-header {\n  display: block;\n  font-size: 12px;\n  font-weight: 600;\n  margin-bottom: 6px;\n  color: var(--amber);\n}\n.warning-line {\n  display: flex;\n  gap: 6px;\n  align-items: flex-start;\n  margin-bottom: 5px;\n  line-height: 1.6;\n  font-size: 11px;\n  font-family: 'JetBrains Mono', 'Courier New', monospace;\n}\n.warning-line::before {\n  content: '›';\n  opacity: 0.5;\n  flex-shrink: 0;\n}\n.pwb-dismiss {\n  position: absolute !important;\n  top: 10px !important;\n  right: 12px !important;\n  padding: 2px 8px !important;\n  font-size: 11px !important;\n  margin: 0 !important;\n}\n\n/* ══════════════════════════════════════════════════════════════\n   MOBILE RESPONSIVENESS — v27 additions\n   Note: light theme uses body.light class (cascades to all\n   children automatically — no separate mobile scoping needed).\n   Sidebar already hidden at ≤1080px; mobile nav already shown.\n   These rules fill the remaining gaps.\n   ══════════════════════════════════════════════════════════════ */\n\n/* ── ≤768px: form, profile, metric tweaks ───────────────────── */\n@media (max-width: 768px) {\n\n  /* Profile form: single column (was only at 480px) */\n  .prof-grid {\n    grid-template-columns: 1fr !important;\n  }\n  /* Form inputs: full width on mobile (override 65% desktop cap) */\n  .prof-input {\n    max-width: 100% !important;\n  }\n  /* Group separator spans naturally in 1-col grid — remove redundant rules */\n  .prof-grid .prof-field:nth-child(5),\n  .prof-grid .prof-field:nth-child(6) {\n    grid-column: auto !important;\n  }\n\n  /* Computed stats sub-grid: single column */\n  .pd-group-grid {\n    grid-template-columns: 1fr !important;\n  }\n\n  /* Readiness subscores: wrap into 2×2 grid instead of 1 row */\n  .readiness-scores-grid {\n    display: grid !important;\n    grid-template-columns: 1fr 1fr !important;\n    gap: 8px !important;\n  }\n  .readiness-subscore {\n    min-width: 0 !important;\n  }\n\n  /* Night row KPI chips: tighter wrap */\n  .nr-center {\n    gap: 6px !important;\n    flex-wrap: wrap !important;\n  }\n  .nr-kpi {\n    min-width: 60px !important;\n    flex: 1 1 60px !important;\n  }\n\n  /* Metric grid: 2-col on 768px (already 1-col at 480px) */\n  .metric-grid {\n    grid-template-columns: repeat(2, 1fr) !important;\n  }\n\n  /* Generic metric tile grid */\n  .grid {\n    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)) !important;\n  }\n\n  /* Theme toggle: hug the corner tighter on small screens */\n  #themeToggleBtn {\n    top: 10px !important;\n    right: 10px !important;\n    padding: 4px 10px 4px 8px !important;\n    font-size: 10px !important;\n  }\n\n  /* Topbar: reduce top padding on mobile */\n  .topbar {\n    padding-top: 16px !important;\n    margin-bottom: 16px !important;\n  }\n\n  /* Smart summary controls: stack vertically */\n  .ss-controls {\n    flex-direction: column !important;\n    align-items: flex-start !important;\n    gap: 8px !important;\n  }\n\n  /* Export toolbar: stack */\n  .export-toolbar {\n    flex-direction: column !important;\n    gap: 12px !important;\n  }\n  .export-secondary {\n    margin-left: 0 !important;\n  }\n\n  /* Global controls: stack label and buttons */\n  .global-controls {\n    flex-direction: column !important;\n    align-items: flex-start !important;\n    gap: 10px !important;\n  }\n}\n\n/* ── ≤480px: additional tightening ─────────────────────────── */\n@media (max-width: 480px) {\n\n  /* Readiness subscores: single column strip at very small sizes */\n  .readiness-scores-grid {\n    grid-template-columns: repeat(2, 1fr) !important;\n  }\n\n  /* Projection card values: slightly smaller on tiny screens */\n  .proj-value {\n    font-size: 24px !important;\n  }\n\n  /* Chart title: prevent overflow */\n  .chart-title {\n    font-size: 12px !important;\n  }\n\n  /* Theme toggle: icon-only to save space */\n  #themeToggleBtn #themeLabel {\n    display: none !important;\n  }\n  #themeToggleBtn {\n    padding: 6px 8px !important;\n  }\n}\n\n/* ── FIX 3 — HRV proxy footnote ────────────────────────────── */\n.hrv-proxy-note {\n  font-size: 11px;\n  opacity: 0.4;\n  font-style: italic;\n  line-height: 1.5;\n  margin: 6px 0 2px;\n  padding: 0 2px;\n}\n\n/* ══════════════════════════════════════════════════════════════\n   UI POLISH LAYER — v26/v27 visual improvements\n   Items 1–20 per spec (CSS-side changes)\n   ══════════════════════════════════════════════════════════════ */\n\n/* ── 1. 3-level type scale ───────────────────────────────────── */\n/* Section titles */\n.sec-label-lg, .section-title-lg,\n.topbar-title,\n.readiness-hero-label, .karv-card-title {\n  font-size: 18px !important; font-weight: 600 !important; color: var(--text) !important;\n}\n/* chart-title and proj-title stay at card-level size — not section-header size */\n.chart-title { font-size: 14px !important; font-weight: 600 !important; color: var(--text) !important; }\n.proj-title  { font-size: 14px !important; font-weight: 600 !important; color: var(--text) !important; }\n/* Field labels */\n.prof-label { font-size: 14px !important; font-weight: 500 !important; color: #e0e0e0 !important; }\n/* Helper/subtitle text */\n.prof-sublabel, .topbar-sub, .chart-sub, .mode-hint { font-size: 11px !important; font-weight: 400 !important; color: #888 !important; }\n\n/* ── 2. Sub-section category labels ─────────────────────────── */\n.pd-group-label {\n  font-size: 11px !important;\n  border-left: 3px solid var(--teal) !important;\n  padding-left: 8px !important;\n  margin-top: 16px !important;\n  opacity: 1 !important;\n  color: var(--teal) !important;\n  letter-spacing: 0.12em !important;\n}\n.pd-group:first-child .pd-group-label { margin-top: 4px !important; }\n\n/* ── 3. Legend labels — short, with tooltip support ─────────── */\n.legend-item { max-width: 240px; }\n.legend-item span[title] {\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  max-width: 180px;\n  display: inline-block;\n  vertical-align: bottom;\n  cursor: help;\n}\n\n/* ── 4. Standardize all major section headings ───────────────── */\n.sec-label.sec-label-lg,\n.section-title.section-title-lg {\n  font-size: 18px !important;\n  font-weight: 600 !important;\n  color: var(--text) !important;\n}\n.sec-label {\n  font-size: 12px !important;\n  font-weight: 600 !important;\n}\n\n/* ── 5. Sidebar logo area padding + rule ─────────────────────── */\n.logo { padding-bottom: 16px !important; margin-bottom: 0 !important; }\n.sidebar-logo-rule {\n  border: none;\n  border-top: 1px solid rgba(255,255,255,0.07);\n  margin: 0 0 4px;\n}\n\n/* ── 6. Sidebar section labels — spacing + rule ──────────────── */\n.nav-section-label {\n  margin-top: 20px !important;\n  padding-top: 12px !important;\n  border-top: 1px solid rgba(255,255,255,0.07) !important;\n  font-size: 10px !important;\n  font-weight: 700 !important;\n  letter-spacing: 0.12em !important;\n}\nbody.light .nav-section-label { border-top-color: rgba(0,0,0,0.08) !important; }\n\n/* ── 7. Unified active nav item style ───────────────────────── */\n.nav-item.active,\n.nav-item.nav-active,\n.nav-mode .nav-mode-btn.active {\n  background: rgba(61,224,208,0.10) !important;\n  color: var(--teal) !important;\n  font-weight: 600 !important;\n  border-left: 3px solid var(--teal) !important;\n  padding-left: 9px !important;  /* compensate for 3px border */\n}\nbody.light .nav-item.active,\nbody.light .nav-item.nav-active,\nbody.light .nav-mode .nav-mode-btn.active {\n  color: #0B7A6E !important;\n  border-left-color: #0B7A6E !important;\n}\n.nav-item { border-left: 3px solid transparent; }\n\n/* ── 8. Readiness badge — dynamic border (set via JS) ──────── */\n#sidebarReadinessBadge {\n  border: 1px solid rgba(61,224,208,0.25) !important;\n  transition: border-color 0.3s, box-shadow 0.3s !important;\n}\n\n/* ── 9. Data Loaded pill badge ───────────────────────────────── */\n.data-pill {\n  display: inline-flex !important;\n  align-items: center !important;\n  gap: 6px !important;\n  border: 1px solid rgba(45,212,191,0.30) !important;\n  border-radius: 999px !important;\n  padding: 4px 12px !important;\n  font-size: 11px !important;\n  font-weight: 600 !important;\n  background: rgba(45,212,191,0.06) !important;\n}\n\n/* ── 10. Main content horizontal padding ─────────────────────── */\n.main-wrap {\n  padding-left: 24px !important;\n  padding-right: 24px !important;\n}\n\n/* ── 11. Form inputs full column width ───────────────────────── */\n.prof-input {\n  max-width: 100% !important;\n  width: 100% !important;\n}\n\n/* ── 12. profileAutoText pills ───────────────────────────────── */\n#profileAutoText {\n  display: flex !important;\n  flex-wrap: wrap !important;\n  gap: 6px !important;\n  align-items: center !important;\n  max-width: 100% !important;\n}\n.auto-pill {\n  display: inline-flex;\n  align-items: center;\n  border: 1px solid rgba(61,224,208,0.30);\n  border-radius: 999px;\n  padding: 3px 10px;\n  font-size: 11px;\n  background: rgba(61,224,208,0.05);\n  color: var(--text2);\n  white-space: nowrap;\n}\nbody.light .auto-pill {\n  border-color: rgba(0,140,130,0.25);\n  background: rgba(0,140,130,0.05);\n  color: var(--text3);\n}\n\n/* ── 13. Warning banner — collapsed by default ───────────────── */\n.parse-warning-banner { padding: 0 !important; }\n.parse-warning-banner[open] > .pwb-body { margin-top: 0; }\n.pwb-summary {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  flex-wrap: wrap;\n  padding: 10px 14px;\n  list-style: none;\n  cursor: pointer;\n  user-select: none;\n}\n.pwb-summary::-webkit-details-marker { display: none; }\n.pwb-summary::before {\n  content: '▶';\n  font-size: 9px;\n  color: var(--amber);\n  transition: transform 0.18s;\n  flex-shrink: 0;\n}\n.parse-warning-banner[open] .pwb-summary::before { transform: rotate(90deg); }\n.pwb-body { padding: 0 14px 10px; }\n\n/* ── 14. Chart cards — equal height, title truncation ────────── */\n.chart-grid {\n  align-items: stretch !important;\n}\n.chart-card,\n.chart-wrap {\n  display: flex !important;\n  flex-direction: column !important;\n  height: 100% !important;\n}\n.chart-title,\n.chart-card h4 {\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  max-width: 100%;\n  font-size: 13px !important;\n  font-weight: 600 !important;\n  cursor: default;\n}\n\n/* ── 15. Chart card hover state ──────────────────────────────── */\n.chart-card,\n.chart-wrap {\n  transition: background 0.18s, border-color 0.18s, box-shadow 0.18s !important;\n}\n.chart-card:hover,\n.chart-wrap:hover {\n  background: #252a3a !important;\n  border-color: var(--teal) !important;\n  box-shadow: 0 2px 14px rgba(61,224,208,0.08) !important;\n}\nbody.light .chart-card:hover,\nbody.light .chart-wrap:hover {\n  background: #f0f5ff !important;\n  border-color: var(--teal) !important;\n}\n\n/* ── 16. Karvonen zone rows — tinted background + padding ─────── */\n.prof-zone-row { padding: 8px 4px !important; align-items: center !important; }\n.zone-1 { background: rgba(77,217,172,0.09) !important;  border-bottom: 1px solid rgba(77,217,172,0.15) !important; }\n.zone-2 { background: rgba(96,165,250,0.09) !important;  border-bottom: 1px solid rgba(96,165,250,0.15) !important; }\n.zone-3 { background: rgba(250,204,21,0.09) !important;  border-bottom: 1px solid rgba(250,204,21,0.15) !important; }\n.zone-4 { background: rgba(251,146,60,0.09) !important;  border-bottom: 1px solid rgba(251,146,60,0.15) !important; }\n.zone-5 { background: rgba(248,113,113,0.09) !important; border-bottom: none !important; }\n\n/* ── 17. Theme toggle — pill style with smooth transition ─────── */\n#themeToggleBtn {\n  border-radius: 999px !important;\n  min-width: 80px !important;\n  justify-content: center !important;\n  transition: background 0.25s, color 0.25s, border-color 0.25s, box-shadow 0.25s !important;\n  box-shadow: 0 2px 8px rgba(0,0,0,0.18) !important;\n}\n#themeToggleBtn:active { transform: scale(0.96); }\n\n/* ── 18. Focus outlines for accessibility ─────────────────────── */\n.nav-item:focus-visible,\n.mode-btn:focus-visible,\n.btn:focus-visible,\n.gc-btn:focus-visible,\n.ss-btn:focus-visible,\n.tab:focus-visible,\n.mobile-nav-item:focus-visible,\n#themeToggleBtn:focus-visible,\n.pwb-toggle:focus-visible,\n.pwb-dismiss:focus-visible {\n  outline: 2px solid var(--teal) !important;\n  outline-offset: 2px !important;\n}\n.prof-input:focus-visible {\n  outline: 2px solid var(--teal) !important;\n  outline-offset: 1px !important;\n}\n\n/* ── 19. Input border-radius ─────────────────────────────────── */\n.prof-input {\n  border-radius: 8px !important;\n}\n\n/* ── 20. Consistent card padding and section gaps ────────────── */\n.section-card { padding: 16px 20px !important; margin-bottom: 16px !important; }\n.chart-card,\n.chart-wrap { padding: 16px !important; }\n.proj-card  { padding: 16px !important; margin-bottom: 16px !important; }\n.night-row  { margin-bottom: 8px !important; }\n.metric-group { margin-bottom: 16px !important; }\n\n/* ══ end ui polish layer ══ */\n\n/* ══════════════════════════════════════════════════════════════\n   UX LAYER — v27 items 1-9\n   ══════════════════════════════════════════════════════════════ */\n\n/* ── 1. STICKY SIDEBAR — position:fixed ─────────────────────── */\n.sidebar {\n  position: fixed !important;\n  left: 0 !important;\n  top: 0 !important;\n  height: 100vh !important;\n  width: 260px !important;\n  z-index: 500 !important;\n  overflow-y: auto !important;\n}\n/* Remove sidebar from grid flow — main content fills full width then left-margins */\n.app {\n  display: block !important;\n}\n.main-wrap {\n  margin-left: 260px !important;\n}\n/* Mobile: sidebar was already hidden at ≤1080px so no margin needed */\n@media (max-width: 1080px) {\n  .main-wrap { margin-left: 0 !important; }\n}\n\n/* ── 2. STICKY EXPORT TOOLBAR ────────────────────────────────── */\n#exportBar {\n  position: fixed !important;\n  bottom: 0 !important;\n  left: 260px !important;\n  right: 0 !important;\n  z-index: 400 !important;\n  background: var(--surface) !important;\n  border-top: 1px solid rgba(255,255,255,0.08) !important;\n  border-radius: 0 !important;\n  margin: 0 !important;\n  padding: 10px 24px !important;\n  box-shadow: 0 -4px 20px rgba(0,0,0,0.25) !important;\n}\n@media (max-width: 1080px) {\n  #exportBar { left: 0 !important; bottom: 60px !important; /* above mobile nav */ }\n}\n/* Add bottom padding to results so last section isn't hidden */\n#results { padding-bottom: 124px !important; }\nbody.light #exportBar {\n  background: #FFFFFF !important;\n  border-top-color: rgba(0,0,0,0.08) !important;\n  box-shadow: 0 -4px 20px rgba(0,0,0,0.08) !important;\n}\n\n/* ── 3. EXPORT TOOLBAR BUTTON TIERS ─────────────────────────── */\n/* Shared base for all export buttons */\n.btn-export-main,\n.export-primary .btn,\n.export-secondary .btn {\n  height: 36px !important;\n  padding: 0 16px !important;\n  border-radius: 8px !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n  cursor: pointer !important;\n  display: inline-flex !important;\n  align-items: center !important;\n  gap: 5px !important;\n  transition: opacity 0.15s, background 0.15s, border-color 0.15s !important;\n}\n/* PRIMARY: filled teal */\n.btn-export-main.btn-blue,\n.btn-export-main.btn-green,\n.export-primary .btn-export-main {\n  background: var(--teal) !important;\n  color: #041014 !important;\n  border: 1px solid rgba(61,224,208,0.5) !important;\n}\n.btn-export-main.btn-blue:hover,\n.btn-export-main.btn-green:hover { opacity: 0.85 !important; }\n/* SECONDARY: outlined teal */\n.export-secondary .btn-outline {\n  background: transparent !important;\n  color: var(--teal) !important;\n  border: 1px solid rgba(61,224,208,0.45) !important;\n}\n.export-secondary .btn-outline:hover {\n  background: rgba(61,224,208,0.08) !important;\n}\n/* DESTRUCTIVE: outlined red */\n.btn-destructive {\n  background: transparent !important;\n  color: #e05555 !important;\n  border: 1px solid rgba(224,85,85,0.45) !important;\n  height: 36px !important;\n  padding: 0 16px !important;\n  border-radius: 8px !important;\n  font-size: 12px !important;\n  font-weight: 600 !important;\n}\n.btn-destructive:hover {\n  background: rgba(224,85,85,0.10) !important;\n  color: #e05555 !important;\n}\n\n/* ── 4. SECTION COUNT BADGES ─────────────────────────────────── */\n.sec-count-badge {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  background: rgba(61,224,208,0.15);\n  border: 1px solid rgba(61,224,208,0.35);\n  color: var(--teal);\n  font-size: 11px;\n  font-weight: 600;\n  padding: 2px 7px;\n  border-radius: 10px;\n  margin-left: 8px;\n  vertical-align: middle;\n  letter-spacing: 0;\n}\nbody.light .sec-count-badge {\n  background: rgba(0,140,130,0.12);\n  border-color: rgba(0,140,130,0.30);\n  color: #0B7A6E;\n}\n\n/* ── 5. COLLAPSIBLE SECTION CHEVRON ─────────────────────────── */\n.sec-chev {\n  margin-left: auto;\n  font-size: 10px;\n  color: var(--text4);\n  transition: transform 0.2s ease;\n  flex-shrink: 0;\n  padding-left: 8px;\n}\n.sec-label { display: flex !important; align-items: baseline !important; }\n.sec-label .sec-chev { align-self: center; }\n\n/* ── 6. BACK TO TOP BUTTON ───────────────────────────────────── */\n#backToTop {\n  position: fixed;\n  bottom: 68px; /* above sticky toolbar */\n  right: 20px;\n  z-index: 450;\n  width: 40px;\n  height: 40px;\n  border-radius: 50%;\n  background: var(--teal);\n  color: #041014;\n  border: none;\n  font-size: 16px;\n  font-weight: 700;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  box-shadow: 0 4px 16px rgba(61,224,208,0.35);\n  opacity: 0;\n  pointer-events: none;\n  transition: opacity 0.25s ease, transform 0.2s ease;\n}\n/* #backToTop:hover and :focus-visible provided by base */\n@media (min-width: 1081px) { #backToTop { display: none !important; } }\n\n/* ── 7. HIDE DUPLICATE CORE/ADVANCED/RESEARCH BAR ───────────── */\n/* mobile-mode-bar is redundant with sidebar on all viewports */\n.mobile-mode-bar { display: none !important; }\n\n/* ── 8. SIDEBAR LOGO SEPARATOR ───────────────────────────────── */\n.logo {\n  padding-bottom: 12px !important;\n  margin-bottom: 0 !important;\n}\n.sidebar-logo-rule {\n  border: none !important;\n  border-top: 1px solid rgba(255,255,255,0.10) !important;\n  margin: 0 0 6px !important;\n}\nbody.light .sidebar-logo-rule { border-top-color: rgba(0,0,0,0.09) !important; }\n\n/* ── 9. READINESS BADGE — COLORED BORDER (initial, JS sets dynamic) */\n#sidebarReadinessBadge {\n  border: 1px solid rgba(61,224,208,0.25) !important;\n  transition: border-color 0.35s, box-shadow 0.35s !important;\n}\n/* Named state classes applied by JS */\n#sidebarReadinessBadge.rb-good {\n  border-color: #00c896 !important;\n  box-shadow: 0 0 14px rgba(0,200,150,0.20) !important;\n}\n#sidebarReadinessBadge.rb-warn {\n  border-color: #f0a500 !important;\n  box-shadow: 0 0 14px rgba(240,165,0,0.20) !important;\n}\n#sidebarReadinessBadge.rb-bad {\n  border-color: #e05555 !important;\n  box-shadow: 0 0 14px rgba(224,85,85,0.20) !important;\n}\n/* Light theme export toolbar */\nbody.light .export-secondary .btn-outline {\n  color: #0B7A6E !important;\n  border-color: rgba(0,140,130,0.40) !important;\n}\nbody.light .export-secondary .btn-outline:hover {\n  background: rgba(0,140,130,0.07) !important;\n}\nbody.light .btn-export-main.btn-blue,\nbody.light .btn-export-main.btn-green {\n  background: var(--teal) !important;\n  color: #041014 !important;\n}\n\n\n/* ── FIX 3: scroll-margin-top for sections / banner padding ─── */\n/* Prevent fixed topbar (≈56px) from obscuring section headers\n   when browser scrolls to an anchor or the user navigates */\n.sec-label,\n.section-title,\n.night-row,\n.chart-wrap,\n.chart-card {\n  scroll-margin-top: 64px;\n}\n/* The informational banner (class=\"metric mt-xs cite-note\") that\n   describes Hypoxic Burden needs visible top padding */\n.metric.cite-note {\n  padding: 12px 10px !important;\n  border-radius: 8px !important;\n  background: rgba(255,255,255,0.025) !important;\n  line-height: 1.6 !important;\n  margin-top: 8px !important;\n}\nbody.light .metric.cite-note {\n  background: rgba(0,0,0,0.03) !important;\n}\n/* ══ end ux layer ══ */\n/* ══ end polish layer ══ */\n\n@media(min-width:1081px){.readiness-hero{animation:heroEntrance .5s cubic-bezier(.16,1,.3,1) both}}\n\n/* ── Mobile responsive (v29 addition) ── */\n@media(max-width:1080px){\n  .app,.app-shell{grid-template-columns:1fr!important}\n  .main-wrap{margin-left:0!important;padding:24px 20px 124px!important}\n  #exportBar{left:0!important;bottom:60px!important}\n  .mobile-sticky-header{display:flex!important}\n  .mobile-nav{display:flex!important;flex-direction:column!important;gap:2px!important}\n}\n@media(max-width:768px){\n  .main-wrap{padding:16px 14px 124px!important}\n  .topbar{flex-direction:column!important;align-items:flex-start!important;padding-top:16px!important}\n  .tab{padding:8px 12px!important;font-size:11px!important}\n  th,td{padding:7px 10px!important;font-size:11px!important}\n  .prof-grid{grid-template-columns:1fr!important}\n  .prof-input,select.prof-input{font-size:16px!important;touch-action:manipulation!important}\n  canvas{touch-action:pan-y}\n  .global-controls{flex-direction:column!important;align-items:flex-start!important;gap:10px!important}\n  .chart-wrap,.chart-card{padding:14px!important}\n}\n@media(max-width:480px){\n  .mobile-nav-item span{display:none}\n  .mode-bar{max-width:100%;overflow-x:auto}\n}\n@media print{\n  .sidebar,#backToTop,#themeToggleBtn,#exportBar,\n  .mobile-nav,.mobile-sticky-header{display:none!important}\n  .app,.app-shell{display:block!important}\n  .main-wrap{margin:0!important;padding:0!important;max-width:100%!important}\n  .chart-wrap,.chart-card{break-inside:avoid}\n  body{background:#fff!important;color:#000!important}\n}\n\n/* ════════════════════════════════════════════════════════════════════════\n   OxyDex v2 — READABILITY & LAYOUT POLISH (appended override layer)\n   Single contained block. Delete it entirely to restore the original look.\n   Comes last in source, so its !important rules beat the earlier UX layer.\n   ════════════════════════════════════════════════════════════════════════ */\n\n/* ── A · LAYOUT — readiness hero to the top, profile form to the bottom ──\n   #results already begins with the readiness hero; it only sat low because\n   #userProfilePanel preceded it in the DOM. Flex-ordering the main column\n   hoists results above the (now collapsed) profile in one move. */\n.main-wrap                            { display:flex; flex-direction:column; }\n.topbar                               { order:-3; }\n#progressWrap, #errorMsg, #procStatus { order:-2; }\n#uploadArea                           { order:-1; }\n#results                              { order:1; }\n#userProfilePanel                     { order:9; margin-top:var(--sp-5) !important; }\n.dxl-ribbon                           { order:10; } /* license stamp always at page bottom */\n\n/* ── B · RADII — collapse the 14/16/18/24 mix to two tiers ──────────────\n   18px = panels & cards · 12px = inset tiles, chips, controls */\n.chart-wrap, .chart-card, .table-wrap, .section-card, .smart-summary,\n.karv-card, #userProfilePanel, .adv-trends, .proj-card, .readiness-hero {\n  border-radius:18px !important;\n}\n#profileHeader { border-radius:18px 18px 0 0 !important; }\n.metric, .metric-primary, .metric-secondary, .metric-research, .kpi,\n.global-controls, .alert, .sidebar-data-card, .data-pill, .karv-readiness,\n.disclosure-card, .readiness-subscore, .readiness-note,\n.proj-range, .proj-waterfall {\n  border-radius:12px !important;\n}\n\n/* ── C · TYPE — no label below 11px; one tracking for micro-labels ──────\n   Lifts the stragglers the UX layer never normalised (9–10px). */\n.kpi-label, .kpi-sub, .kpi-delta,\n.m-label, .m-sub, .m-unit,\n.nav-section-label, .sec-label,\nth, .pill, .flag, .fpill, .badge, .text-muted-sm, .proj-badge {\n  font-size:11px !important;\n}\n.kpi-label, .m-label, .nav-section-label, .sec-label, th {\n  letter-spacing:.07em !important;\n}\n\n/* ── D · CONTRAST — lift dim text (dark theme only; light untouched) ────\n   body:not(.light) outranks the :root tokens and the body.light overrides. */\nbody:not(.light) { --text3:#8C9DB3; --text4:#6E7F94; --dim:#7A8DA4; }\nbody:not(.light) .prof-sublabel,\nbody:not(.light) .topbar-sub,\nbody:not(.light) .chart-sub,\nbody:not(.light) .mode-hint { color:#9DABBD !important; }\n\n/* ── E · ACCENTS — reserve colour for status; neutralise default values ─\n   Research grid no longer floods every value blue; status .ok/.warn/.bad\n   on .m-val still carry green/amber/red. */\n.metric-research .m-val      { color:var(--text)  !important; }\n.metric-research .m-val.zero { color:var(--text3) !important; }\n\n/* ── F · EMPTY STATE — center the disclosure card under the CTA ─────────\n   It has max-width:480px but no auto margins, so it left-aligned while the\n   icon / title / Browse button above it are centered. Keep its body text\n   left-aligned (easier to read), just center the block itself. */\n.disclosure-card { margin-left:auto !important; margin-right:auto !important; }\n\n/* ── G · NIGHT LIST — separate nights clearly + prominent start date ────\n   Each row = one night. More breathing room and a shared left accent rail\n   (row + its open detail) make each night read as a distinct card; the\n   detail still connects flush to its row when expanded. */\n.night-table { gap:14px !important; }\n.night-row { margin-bottom:0 !important; }\n.night-row, .night-detail {\n  border-left:3px solid var(--border2) !important;\n}\n.night-row {\n  box-shadow:0 1px 0 rgba(0,0,0,.22) !important;\n}\n.night-detail { margin-top:-13px !important; }  /* 14px gap − 13 ≈ flush */\n\n/* ── G2 · STRONGER PER-NIGHT SEPARATION ──────────────────────────────\n   Bigger gap between nights + a teal accent rail and outer framing so\n   each night (collapsed row AND its expanded detail) reads as one card\n   clearly distinct from its neighbours. */\n.night-table { gap:30px !important; }\n.night-row, .night-detail {\n  border-left:4px solid var(--teal, #3de0d0) !important;\n}\n.night-row {\n  background:rgba(61,224,208,.035) !important;\n  box-shadow:0 4px 18px rgba(0,0,0,.28) !important;\n}\n.night-row:not([aria-expanded=\"true\"]) {\n  border-radius:var(--r-md) !important;\n}\n/* When a night is open, row + detail share one continuous frame */\n.night-row[aria-expanded=\"true\"] {\n  border-bottom-left-radius:0 !important;\n  border-bottom-right-radius:0 !important;\n}\n.night-detail.open {\n  box-shadow:0 8px 22px rgba(0,0,0,.30) !important;\n  border-bottom:1px solid rgba(61,224,208,.18) !important;\n  border-right:1px solid rgba(61,224,208,.10) !important;\n}\nbody.light .night-row {\n  background:rgba(61,224,208,.05) !important;\n  box-shadow:0 3px 14px rgba(0,0,0,.10) !important;\n}\n\n/* Date at the start of each night — larger, full-contrast, can't be missed */\n.nr-date-v22 {\n  font-size:18px !important;\n  font-weight:700 !important;\n  color:var(--text) !important;\n  letter-spacing:-.01em !important;\n}\n\n/* ════════════════════════════════════════════════════════════════════════\n   OxyDex v1.1 — ECGDex-style hero top, ANS-age card, ECG fusion, full table\n   ════════════════════════════════════════════════════════════════════════ */\n#heroTop { display:grid; grid-template-columns:1.6fr 1fr; gap:16px; align-items:stretch; margin-bottom:18px; }\n#heroTop > .readiness-hero { height:100%; margin-bottom:0; }\n@media(max-width:860px){ #heroTop{ grid-template-columns:1fr; } }\n\n.oxy-projcard {\n  background:var(--surface); border:1px solid rgba(255,255,255,.06);\n  border-radius:20px; padding:26px 24px; display:flex; flex-direction:column;\n  gap:13px; position:relative; overflow:hidden;\n}\n.oxy-projcard::before {\n  content:''; position:absolute; inset:-30% auto auto -12%; width:38%; height:120%;\n  background:radial-gradient(circle, rgba(88,166,255,.06), transparent 62%); pointer-events:none;\n}\n.oxy-projcard.proj-good { border-color:rgba(45,212,191,.3); }\n.oxy-projcard.proj-warn { border-color:rgba(245,158,11,.3); }\n.oxy-projcard.proj-bad  { border-color:rgba(248,113,113,.3); }\n.oxy-projcard > * { position:relative; z-index:1; }\n.opc-head { display:flex; align-items:center; gap:9px; }\n.opc-icon { font-size:18px; }\n.opc-title { font-size:15px; font-weight:700; letter-spacing:-.01em; }\n.opc-badge { margin-left:auto; font-size:10px; font-weight:700; padding:3px 9px; border-radius:999px;\n  background:rgba(110,133,168,.14); color:var(--text2); border:1px solid rgba(110,133,168,.2); white-space:nowrap; }\n.opc-badge.real { background:rgba(45,212,191,.12); color:var(--teal); border-color:rgba(61,224,208,.28); }\n.opc-main { display:flex; align-items:baseline; gap:10px; }\n.opc-val { font-size:54px; font-weight:700; line-height:1; letter-spacing:-.02em; font-family:'IBM Plex Mono',monospace; }\n.opc-unit { font-size:13px; color:var(--text3); }\n.opc-sub { font-size:12px; color:var(--text2); font-weight:600; }\n.opc-wf { background:var(--surface2); border-radius:12px; padding:8px 13px; display:flex; flex-direction:column; }\n.opc-row { display:flex; justify-content:space-between; align-items:center; gap:8px;\n  font-size:11.5px; color:var(--text2); padding:5px 0; border-bottom:1px solid rgba(255,255,255,.04); }\n.opc-row:last-child { border-bottom:none; }\n.opc-row .v { font-family:'IBM Plex Mono',monospace; color:var(--text); font-weight:600; white-space:nowrap; }\n.opc-cite { font-size:10.5px; color:var(--text3); line-height:1.55; margin-top:auto; }\n/* Inline evidence disc precedes its label (central badge convention, DEX-METRIC-REMOVAL\n   badge-placement fix) — give the disc a small trailing gap so it never touches the text. */\n.m-label .ev, .ss-label .ev, .ss-kpi-label .ev, .nr-kpi-label .ev, .rs-label .ev,\n.opc-row .ev, .opc-kpi-l .ev, .opc-unit .ev, .nr-chip .ev, .readiness-zone-chip .ev, .chart-title .ev, .proj-title .ev { margin-right: 5px; }\n.opc-kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }\n.opc-kpi { background:var(--surface2); border:1px solid rgba(255,255,255,.05); border-radius:12px;\n  padding:11px 6px; text-align:center; display:flex; flex-direction:column; gap:3px; }\n.opc-kpi-v { font-size:22px; font-weight:700; line-height:1; font-family:'IBM Plex Mono',monospace; letter-spacing:-.01em; }\n.opc-kpi-l { font-size:10.5px; color:var(--text3); font-weight:600; letter-spacing:.01em; }\n.opc-kpi.opc-good .opc-kpi-v { color:var(--status-ok); }\n.opc-kpi.opc-warn .opc-kpi-v { color:var(--status-caution); }\n.opc-kpi.opc-bad  .opc-kpi-v { color:var(--status-concern); }\nbody.light .opc-kpi { background:#f4f7fb; border-color:rgba(0,0,0,.05); }\nbody.light .oxy-projcard { background:#fff; border-color:rgba(0,0,0,.07); }\n\n/* ECGDex cross-check uploader */\n.ecg-xcheck { border:1px solid rgba(88,166,255,.2); border-radius:16px;\n  background:linear-gradient(160deg, var(--surface), var(--surface2)); padding:14px 16px; margin:12px 0; transition:border-color .2s, box-shadow .2s; }\n.ecg-xcheck.drag { border-color:var(--teal); box-shadow:0 0 30px rgba(61,224,208,.12); }\n.ecg-xcheck-h { font-size:12.5px; font-weight:700; color:var(--text2); display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; }\n.ecg-xcheck-h span { font-size:10.5px; font-weight:500; color:var(--text3); }\n.ecg-xcheck-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }\n.ecg-xcheck-btn { font-size:12px; font-weight:600; padding:7px 14px; border-radius:9px;\n  border:1px solid rgba(88,166,255,.25); background:rgba(88,166,255,.1); color:var(--blue); cursor:pointer; transition:background .15s; }\n.ecg-xcheck-btn:hover { background:rgba(88,166,255,.18); }\n.ecg-xcheck-status { font-size:11.5px; color:var(--text3); font-weight:600; }\n.ecg-xcheck-status.ok { color:var(--green); }\n.ecg-xcheck-chip { font-size:11px; font-weight:700; color:var(--teal); background:rgba(61,224,208,.1);\n  border:1px solid rgba(61,224,208,.22); border-radius:999px; padding:3px 11px; align-items:center; }\n\n/* ECG fusion section */\n.ecg-fusion { background:var(--surface); border:1px solid rgba(61,224,208,.18); border-radius:18px; padding:18px 20px; margin-bottom:16px; }\n.efz-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:11px; margin-bottom:12px; }\n.efz-tile { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05); border-radius:12px; padding:13px 15px; }\n.efz-val { font-size:25px; font-weight:700; font-family:'IBM Plex Mono',monospace; line-height:1; letter-spacing:-.02em; }\n.efz-val.ok{ color:var(--green); } .efz-val.warn{ color:var(--amber); } .efz-val.bad{ color:var(--red); } .efz-val.blue{ color:var(--blue); }\n.efz-lbl { font-size:10.5px; color:var(--text2); font-weight:700; margin-top:7px; text-transform:uppercase; letter-spacing:.05em; }\n.efz-sub { font-size:10.5px; color:var(--text3); margin-top:3px; line-height:1.45; }\n.efz-note { font-size:12px; color:var(--text2); line-height:1.6; border-top:1px solid rgba(255,255,255,.05); padding-top:10px; }\n.efz-note code { font-family:'IBM Plex Mono',monospace; background:rgba(88,166,255,.08); padding:1px 5px; border-radius:4px; color:var(--blue); font-size:11px; }\n.efz-chiprow { display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-bottom:13px; }\n.efz-chip { font-size:11.5px; font-weight:700; padding:5px 12px; border-radius:999px;\n  background:rgba(110,133,168,.12); color:var(--text2); border:1px solid rgba(110,133,168,.2); white-space:nowrap; }\n.efz-chip.ok { background:rgba(45,212,191,.12); color:var(--teal); border-color:rgba(61,224,208,.28); }\n.efz-chip b { font-family:'IBM Plex Mono',monospace; }\n.efz-chip-note { font-size:10.5px; color:var(--text3); line-height:1.45; }\n.efz-stagewrap { border-top:1px solid rgba(255,255,255,.05); padding-top:12px; margin-top:12px; }\n.efz-stagehd { font-size:10.5px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:9px; }\n.efz-stagerow { display:grid; grid-template-columns:64px 1fr auto; align-items:center; gap:11px; padding:4px 0; }\n.efz-stagename { font-size:11.5px; font-weight:700; color:var(--text); }\n.efz-stagebar { height:7px; border-radius:999px; background:rgba(255,255,255,.05); overflow:hidden; }\n.efz-stagefill { display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--amber),var(--red)); }\n.efz-stageval { font-size:10.5px; color:var(--text3); font-family:'IBM Plex Mono',monospace; white-space:nowrap; }\n.efz-stagerow.efz-stage-un .efz-stagename { color:var(--text3); font-weight:600; }\n.efz-stagerow.efz-stage-un .efz-stagefill { background:repeating-linear-gradient(45deg,var(--text4),var(--text4) 4px,transparent 4px,transparent 8px); }\n.efz-stagectx { font-size:10.5px; color:var(--text3); line-height:1.5; margin-top:9px; padding-top:8px; border-top:1px dashed rgba(255,255,255,.06); }\n\n/* Full metrics table — section dividers + status */\n.oxy-fulltable table { width:100%; }\n.oxy-fulltable td.fmt-m { font-family:'Inter',sans-serif; color:var(--text2); font-weight:600; }\n.oxy-fulltable td.fmt-v { color:var(--text); font-weight:600; }\n.oxy-fulltable td.fmt-note { font-family:'Inter',sans-serif; color:var(--text3); font-size:10.5px; }\n.oxy-fulltable tr.fmt-sec td { background:var(--surface3); color:var(--teal); font-weight:700;\n  font-family:'Inter',sans-serif; font-size:10px; text-transform:uppercase; letter-spacing:.08em; padding:9px 14px; }\n.oxy-fulltable tr.fmt-sec td::before { content:'●'; color:var(--teal); margin-right:7px; font-size:8px; vertical-align:middle; opacity:.7; }\n.oxy-fulltable-acc { margin-top:8px; }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ── Back to top button ── -->\n<button id=\"backToTop\" onclick=\"window.scrollTo({top:0,behavior:'smooth'})\" aria-label=\"Back to top\" title=\"Back to top\">↑<\u002Fbutton>\n\n<!-- ── Theme toggle button (fixed, top-right) ── -->\n<button id=\"themeToggleBtn\" onclick=\"toggleTheme()\" title=\"Toggle light / dark mode\" aria-label=\"Toggle light/dark theme\">\n  <span class=\"theme-icon\" id=\"themeIcon\">☀️<\u002Fspan>\n  <span id=\"themeLabel\">Light<\u002Fspan>\n<\u002Fbutton>\n\n<div class=\"app\">\n\n<!-- SIDEBAR -->\n<aside class=\"sidebar\">\n  <div class=\"logo\">\n    <div class=\"logo-badge\"><svg viewBox=\"0 0 100 100\" aria-hidden=\"true\" style=\"width:23px;height:23px\" fill=\"none\" stroke=\"#06121A\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"15,33 52,33 60,15 66,49 71,33 86,33\"><\u002Fpolyline><line x1=\"49\" y1=\"33\" x2=\"49\" y2=\"86\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n    <div>\n      <div class=\"logo-title\">OxyDex<\u002Fdiv>\n      <div class=\"logo-sub\">v1.0 · Tepna<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <hr class=\"sidebar-logo-rule\">\n\n  <div class=\"nav-section-label\">Navigate<\u002Fdiv>\n  <div class=\"nav\">\n    <div class=\"nav-item\" data-nav=\"profile\">👤 Profile<\u002Fdiv>\n    <div class=\"nav-item active\" data-nav=\"overview\">◈ Overview<\u002Fdiv>\n    <div class=\"nav-item\" data-nav=\"lastnight\">🌙 Last night<\u002Fdiv>\n    <div class=\"nav-item\" data-nav=\"firstnight\">🗓 First night<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"nav-section-label\">Detail Tier<\u002Fdiv>\n  <div class=\"nav nav-mode\">\n    <div class=\"nav-item nav-mode-btn active\" data-mode=\"core\" onclick=\"setMode('core',this)\">▣ Core<\u002Fdiv>\n    <div class=\"nav-item nav-mode-btn\" data-mode=\"advanced\" onclick=\"setMode('advanced',this)\">▤ Advanced<\u002Fdiv>\n    <div class=\"nav-item nav-mode-btn\" data-mode=\"research\" onclick=\"setMode('research',this)\">▥ Research<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sidebar-bottom\">\n    <div id=\"sidebarReadinessBadge\" class=\"sidebar-readiness-badge hidden\">\n      <div><div class=\"srb-score\" id=\"srbScore\">—<\u002Fdiv><div class=\"srb-label\">Readiness<\u002Fdiv><\u002Fdiv>\n      <div id=\"srbNote\" class=\"srb-note\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sidebar-data-card\">\n      <div class=\"data-pill\"><span class=\"data-dot\"><\u002Fspan> <span id=\"sidebarStatus\">Ready<\u002Fspan><\u002Fdiv>\n      <div class=\"sidebar-data-info\" id=\"sidebarInfo\">Drop CSV files to begin<br>All processing is local · no upload<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Faside>\n\n<!-- STICKY EXPORT BAR (outside #results, no double-flow issue) -->\n<div id=\"exportBar\" class=\"export-toolbar\" style=\"display:none\"><\u002Fdiv>\n\n<!-- MAIN CONTENT -->\n<div class=\"main-wrap\">\n\n<div class=\"topbar\">\n  <div>\n    <div class=\"topbar-title\">OxyDex <span class=\"version-badge\">v1.0.0<\u002Fspan><\u002Fdiv>\n    <div class=\"topbar-sub\" id=\"topbarSub\">Nocturnal oximetry · SpO₂ · HR · HRV · 75+ metrics · Tepna<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"topbar-actions\">\n    <div class=\"mode-bar\" id=\"modeBar\">\n      <button class=\"mode-btn active\" data-mode=\"core\" onclick=\"setMode('core',this)\">Core<\u002Fbutton>\n      <button class=\"mode-btn\" data-mode=\"advanced\" onclick=\"setMode('advanced',this)\">Advanced<\u002Fbutton>\n      <button class=\"mode-btn\" data-mode=\"research\" onclick=\"setMode('research',this)\">Research<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"mode-hint\" id=\"modeHint\">SpO₂ · ODI · HR · Spikes · PB<\u002Fdiv>\n    <span class=\"badge hidden\" id=\"topBadgeOxy\">⭕ 1Hz SpO₂<\u002Fspan>\n    <span class=\"badge hidden\" id=\"topBadgeMetrics\">📊 75+ Metrics<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- HEADER (hidden, for legacy compat) -->\n<div class=\"header hidden\">\n  <div class=\"header-icon\">⭕<\u002Fdiv>\n  <div>\n    <h1>O2Ring Parser<\u002Fh1>\n    <p>Sleep Oximetry Analysis Engine<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"header-right\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Loading bar / status — positioned ABOVE upload area so it stays visible on mobile during file ingestion -->\n<div id=\"progressWrap\" class=\"progress\" role=\"progressbar\" aria-label=\"Processing\"><div id=\"progressBar\" class=\"progress-bar\" style=\"width:0\"><\u002Fdiv><\u002Fdiv>\n<div id=\"errorMsg\" class=\"error hidden\"><\u002Fdiv>\n<div id=\"procStatus\" class=\"proc-status\"><\u002Fdiv>\n\n<div id=\"uploadArea\" onclick=\"document.getElementById('fileInput').click()\" role=\"button\" aria-label=\"Select O2Ring CSV files to upload — drag and drop or click\">\n  <div class=\"upload-icon\">📂<\u002Fdiv>\n  <h2 class=\"upload-title\">Drop O2Ring CSV files here<\u002Fh2>\n  <p class=\"upload-desc\">\n    Supports O2Ring / Wellue / ViATOM raw 1Hz CSV · native .dat / .bin recordings · Multiple files accepted<br>\n    <span class=\"upload-local\">All processing is local — no data leaves your device · Works offline<\u002Fspan><br>\n    <span class=\"upload-android\">📱 Android: tap the button below → tap ⋮ menu → \"Show all files\" if CSV is grayed out<\u002Fspan>\n  <\u002Fp>\n  <button onclick=\"event.stopPropagation();document.getElementById('fileInput').click()\" class=\"upload-cta\">📂 Browse / Select Files<\u002Fbutton>\n\n  <div class=\"synth-line\" onclick=\"event.stopPropagation()\">\n    <span>No device?<\u002Fspan>\n    <button class=\"synth-link\" type=\"button\" id=\"genBtn\">Generate synthetic<\u002Fbutton>\n    <select id=\"genScenario\" title=\"synthetic patient profile\">\n      <option value=\"baseline\" selected=\"\">Untreated OSA<\u002Foption>\n      <option value=\"severe\">Severe OSA<\u002Foption>\n      <option value=\"cpap\">On CPAP<\u002Foption>\n      <option value=\"healthy\">Healthy<\u002Foption>\n    <\u002Fselect>\n    <select id=\"genDays\" title=\"days to generate\">\n      <option value=\"1\">1 day<\u002Foption>\n      <option value=\"3\" selected=\"\">3 days<\u002Foption>\n      <option value=\"7\">7 days<\u002Foption>\n      <option value=\"14\">14 days<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n\n  <div class=\"disclosure-card\" onclick=\"event.stopPropagation()\">\n    <div class=\"disclosure-header\">\n      <span class=\"disclosure-icon\">🔬<\u002Fspan>\n      <span class=\"disclosure-title\">Power-user companion analytics<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"disclosure-body\">\n      This tool computes biometric patterns from your wearable data to support\n      <strong>personal self-quantification<\u002Fstrong>. It is not a medical device,\n      does not diagnose, treat, or screen for any condition, and is not a\n      substitute for clinical evaluation. Derived metrics (VO₂max estimate, HRV\n      proxies, AHI/CVHR estimates) are experimental approximations\n      — not validated diagnostic outputs. Consult a qualified clinician for any\n      health concern.\n    <\u002Fdiv>\n    <div class=\"disclosure-footer\">\n      <span class=\"disclosure-pill\">🔒 Local-first<\u002Fspan>\n      <span class=\"disclosure-pill\">📵 No telemetry<\u002Fspan>\n      <span class=\"disclosure-pill\">🚫 Not FDA-cleared<\u002Fspan>\n      <span class=\"disclosure-pill\">⚕ Not medical advice<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ECGDex cross-check uploader — drop an ECGDex JSON export to unlock apnea confirmation + HR validation -->\n<div id=\"ecgXcheck\" class=\"ecg-xcheck\">\n  <div class=\"ecg-xcheck-h\">⚡ Cross-check with ECGDex <span>optional · drop an ECGDex JSON export for the same night → apnea confirmation &amp; HR validation<\u002Fspan><\u002Fdiv>\n  <div class=\"ecg-xcheck-row\">\n    <label for=\"ecgJsonInput\" class=\"ecg-xcheck-btn\">＋ Load ECGDex JSON<\u002Flabel>\n    <input type=\"file\" id=\"ecgJsonInput\" accept=\".json\" style=\"display:none\">\n    <span class=\"ecg-xcheck-status\" id=\"ecgJsonStatus\">No ECGDex file<\u002Fspan>\n    <span class=\"ecg-xcheck-chip\" id=\"ecgJsonChip\" style=\"display:none\"><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"userProfilePanel\" role=\"complementary\" aria-label=\"User Profile configuration panel\" class=\"hidden\">\n  <div id=\"profileHeader\" onclick=\"toggleProfile()\">\n    <h3>👤 User Profile &nbsp;<span class=\"inline-warn\">— personalizes all formulas &amp; norms<\u002Fspan><\u002Fh3>\n    <button id=\"profileToggleBtn\" onclick=\"event.stopPropagation();toggleProfile()\" aria-expanded=\"true\">▲ collapse<\u002Fbutton>\n  <\u002Fdiv>\n  <div id=\"profileAutoDetect\"><span id=\"profileAutoText\">Upload data to auto-detect stats<\u002Fspan> &nbsp;·&nbsp; Auto-estimated fields shown with ~ prefix · Override with real values<\u002Fdiv>\n  <div id=\"profileBody\">\n    <div id=\"dexProfilePanel\"><\u002Fdiv>\n    <div id=\"profileWtHtHint\" style=\"display:none\"><\u002Fdiv>\n    <div id=\"profileDerived\" style=\"display:none\"><\u002Fdiv>\n\n    <div id=\"profileZones\">\n      <div class=\"profile-zone-label-sm\">Karvonen HR Zones<\u002Fdiv>\n      <div class=\"prof-zone-row zone-1\"><span class=\"prof-zone-label\">Z1 Recovery<\u002Fspan><span class=\"prof-zone-val\" id=\"pz1\">—<\u002Fspan><\u002Fdiv>\n      <div class=\"prof-zone-row zone-2\"><span class=\"prof-zone-label\">Z2 Aerobic<\u002Fspan><span class=\"prof-zone-val\" id=\"pz2\">—<\u002Fspan><\u002Fdiv>\n      <div class=\"prof-zone-row zone-3\"><span class=\"prof-zone-label\">Z3 Threshold<\u002Fspan><span class=\"prof-zone-val\" id=\"pz3\">—<\u002Fspan><\u002Fdiv>\n      <div class=\"prof-zone-row zone-4\"><span class=\"prof-zone-label\">Z4 Lactate<\u002Fspan><span class=\"prof-zone-val\" id=\"pz4\">—<\u002Fspan><\u002Fdiv>\n      <div class=\"prof-zone-row zone-5\"><span class=\"prof-zone-label\">Z5 Max<\u002Fspan><span class=\"prof-zone-val\" id=\"pz5\">—<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"profileSaveNote\" class=\"profile-save-note\">Values auto-saved to browser localStorage<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<input type=\"file\" id=\"fileInput\" accept=\".csv,.json,.jsonl,.bin,.dat,.txt,text/csv,text/plain,application/json,application/octet-stream\" multiple=\"\" class=\"hidden\">\n\n<div id=\"results\" aria-live=\"polite\" aria-atomic=\"false\"><\u002Fdiv>\n\n\n<div class=\"dxl dxl-ribbon\" style=\"max-width:1100px;margin:0 auto 30px\">\n  <div class=\"dxl-seg\">\n    <span class=\"dxl-mark\">T<\u002Fspan>\n    <span style=\"display:flex;flex-direction:column\">\n      <b style=\"font-size:13px\">Tepna<\u002Fb>\n      <span class=\"dxl-colophon\">physiological-signal suite<\u002Fspan>\n    <\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"dxl-seg dxl-grow\">\n    <span style=\"font-size:11.5px;color:var(--text2,#9FB0C3)\">© 2026 <b>Michal Planicka<\u002Fb> — Concept · Architecture · Algorithms<\u002Fspan>\n    <span class=\"dxl-disclaimer\">Not a medical device · does not diagnose or treat · not FDA/CE cleared · research &amp; personal use only · ◈ Made in Asheville, NC<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"dxl-seg\"><span class=\"dxl-spdx\"><span class=\"k\">licence<\u002Fspan><span class=\"v\">Apache-2.0<\u002Fspan><\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<script src=\"fe1a7aaa-871e-44e3-bbe1-fbf5dab0dfdb\"><\u002Fscript>\n<script src=\"19cf6699-e77e-419b-b79b-d7ed5c1b73b4\"><\u002Fscript>\n<script src=\"d51bcd7b-58c9-4943-b747-22d508af97a7\"><\u002Fscript>\n<script src=\"b6d137f2-ab2c-49d6-9f0d-c1fd3b9006cc\"><\u002Fscript>\n<script src=\"1bdb9e27-eb7a-4613-bcf1-2451cc872698\"><\u002Fscript>\n<script src=\"6b9242c7-be2b-4978-b370-2bf3d4f8d397\"><\u002Fscript>\n<script src=\"aec41ce5-6596-410b-b0e7-bf3f0c0d88cf\"><\u002Fscript>\n<script src=\"07324447-830c-49a4-91e1-de2887be70ea\"><\u002Fscript>\n<script src=\"e294ec38-a752-476c-9352-b15d0ce43de7\"><\u002Fscript>\n<script src=\"6172bb02-5958-46ab-bbf2-26a8b94e6e1f\"><\u002Fscript>\n<script src=\"a931f0c8-af86-4f7c-be78-ba888399adfc\"><\u002Fscript>\n<script src=\"2c5b4abc-64ba-4525-9c5b-c4fd1bce3228\"><\u002Fscript>\n<script src=\"39ff22c1-06ef-4956-92ad-03e8ea790efe\"><\u002Fscript>\n<script src=\"8a3f2f55-23a0-4c25-ab4b-88bafc6f1fae\"><\u002Fscript>\n<script src=\"c8d8ca3b-21eb-4e16-ba32-d5124abacef2\"><\u002Fscript>\n<script src=\"2ba06c67-4d6b-47ce-9734-bfd7fcdeebb4\"><\u002Fscript>\n<script src=\"ddb22d3e-9a11-4ab1-bf35-2f0957663a92\"><\u002Fscript>\n<script src=\"4d51686f-2aba-4274-9a5f-0566311d1dae\"><\u002Fscript>\n<\u002Fdiv><!-- /.main-wrap -->\n<\u002Fdiv><!-- /.app -->\n\n<!-- ── Mobile sticky readiness header (Section 13) ───────────── -->\n<div class=\"mobile-sticky-header\" id=\"mobileStickyHeader\">\n  <div>\n    <div class=\"msh-label\">Readiness<\u002Fdiv>\n    <div class=\"msh-score\" id=\"mshScore\">—<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"msh-pills\" id=\"mshPills\">\n    <div class=\"msh-pill\"><span class=\"msh-pill-label\">SpO₂<\u002Fspan><span id=\"mshSpo2\">—<\u002Fspan><\u002Fdiv>\n    <div class=\"msh-pill\"><span class=\"msh-pill-label\">RMSSD<\u002Fspan><span id=\"mshRmssd\">—<\u002Fspan><\u002Fdiv>\n    <div class=\"msh-pill\"><span class=\"msh-pill-label\">Sleep<\u002Fspan><span id=\"mshSleep\">—<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<!-- ── Mobile mode toggle bar ────────────────────────────────── -->\n<div class=\"mobile-mode-bar\" id=\"mobileModeBar\">\n  <button class=\"mode-btn active\" data-mode=\"core\" onclick=\"setMode('core',this)\">Core<\u002Fbutton>\n  <button class=\"mode-btn\" data-mode=\"advanced\" onclick=\"setMode('advanced',this)\">Advanced<\u002Fbutton>\n  <button class=\"mode-btn\" data-mode=\"research\" onclick=\"setMode('research',this)\">Research<\u002Fbutton>\n<\u002Fdiv>\n\n<!-- ── Mobile bottom navigation (Section 7 / 13) ─────────────── -->\n<nav class=\"mobile-nav\" id=\"mobileNav\" role=\"navigation\" aria-label=\"Main navigation\">\n  <div class=\"mobile-nav-modes\" role=\"group\" aria-label=\"Detail level\">\n    <button class=\"mnav-mode-btn\" data-mode=\"core\" onclick=\"setMode('core',this)\">Core<\u002Fbutton>\n    <button class=\"mnav-mode-btn\" data-mode=\"advanced\" onclick=\"setMode('advanced',this)\">Advanced<\u002Fbutton>\n    <button class=\"mnav-mode-btn\" data-mode=\"research\" onclick=\"setMode('research',this)\">Research<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"mobile-nav-items\">\n    <button class=\"mobile-nav-item active\" data-section=\"uploadArea\" onclick=\"mobileNavTo('uploadArea',this)\">\n      <span class=\"mobile-nav-icon\">📋<\u002Fspan>Overview\n    <\u002Fbutton>\n    <button class=\"mobile-nav-item\" data-section=\"sec-trends\" onclick=\"mobileNavTo('sec-trends',this)\">\n      <span class=\"mobile-nav-icon\">📈<\u002Fspan>Trends\n    <\u002Fbutton>\n    <button class=\"mobile-nav-item\" data-section=\"sec-nights\" onclick=\"mobileNavTo('sec-nights',this)\">\n      <span class=\"mobile-nav-icon\">◈<\u002Fspan>Nights\n    <\u002Fbutton>\n    <button class=\"mobile-nav-item\" data-section=\"userProfilePanel\" onclick=\"openProfile();mobileNavTo('userProfilePanel',this)\">\n      <span class=\"mobile-nav-icon\">⚙<\u002Fspan>Profile\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<script>\n// ── Mode toggle ─────────────────────────────────────────────────\n// Depth tier persists under the SHARED suite key (dex_depth_tier) via\n// MetricRegistry, so a tier set in ANY -Dex node carries across the suite\n// (System-Cohesion brief §locked-4). Legacy 'oxydex_dashMode' is migrated\n// forward by MetricRegistry.getTier().\nfunction setMode(mode, btn) {\n  if(window.MetricRegistry){ window.MetricRegistry.setTier(mode); }\n  else {\n    document.body.dataset.mode = mode;\n    document.querySelectorAll('.mode-btn, .nav-mode-btn, .mnav-mode-btn').forEach(function(b){\n      b.classList.toggle('active', b.dataset.mode === mode);\n    });\n    try { localStorage.setItem('dex_depth_tier', mode); } catch(e) {}\n  }\n  var hint = document.getElementById('modeHint');\n  if(hint) {\n    var labels = {\n      core:     'SpO₂ · ODI · HR · Spikes · PB',\n      advanced: '+ HRV · Motion · Hypoxic Burden · T-Index',\n      research: '+ VO₂max · BP Projection · Full Research Dump · Clinical Indices'\n    };\n    hint.textContent = labels[mode] || '';\n  }\n}\n(function() {\n  var saved = window.MetricRegistry ? window.MetricRegistry.getTier() : 'core';\n  if(window.MetricRegistry){ window.MetricRegistry.applyTier(saved); }\n  else {\n    document.body.dataset.mode = saved;\n    document.querySelectorAll('.mode-btn, .nav-mode-btn, .mnav-mode-btn').forEach(function(b){\n      b.classList.toggle('active', b.dataset.mode === saved);\n    });\n  }\n  var hint = document.getElementById('modeHint');\n  if(hint) {\n    var labels = {\n      core:     'SpO₂ · ODI · HR · Spikes · PB',\n      advanced: '+ HRV · Motion · Hypoxic Burden · T-Index',\n      research: '+ VO₂max · BP Projection · Full Research Dump · Clinical Indices'\n    };\n    hint.textContent = labels[saved] || '';\n  }\n})();\n\n// ── Sidebar data card + readiness badge ─────────────────────────\nvar _origRenderAll = renderAll;\nrenderAll = function() {\n  try { _origRenderAll(); } catch(e) { throw e; }\n  try {\n    var nights = Object.values(allNights).sort(function(a,b){return a.date<b.date?1:a.date>b.date?-1:0;});\n    if(nights.length) {\n      // nights sorted DESC above; [0] = most recent\n      var last = nights[0];\n      var lastDate = last.date || '';\n      safeSet('sidebarStatus','textContent','Data Loaded');\n      safeSet('sidebarInfo','innerHTML', nights.length + ' night' + (nights.length>1?'s':'') + ' · 75+ metrics<br>Last: ' + escHTML(lastDate));\n      safeSet('topbarSub','textContent','Overnight Analysis · ' + nights.length + ' session' + (nights.length>1?'s':'') + ' · ' + lastDate);\n      // Readiness badge (sidebar + mobile sticky header)\n      if(last.karv) {\n        var rbEl = document.getElementById('sidebarReadinessBadge');\n        var scoreEl = document.getElementById('srbScore');\n        var noteEl  = document.getElementById('srbNote');\n        if(rbEl && scoreEl) {\n          rbEl.style.display = 'flex';\n          scoreEl.textContent = last.karv.readiness;\n          if(noteEl) noteEl.textContent = last.karv.readinessTier + ' · ' + last.date;\n          scoreEl.className = 'srb-score';\n          var _rScore = parseInt(last.karv.readiness, 10)||0;\n          var _rCol = _rScore>=70?'var(--status-ok)':_rScore>=50?'var(--status-caution)':'var(--status-concern)';\n          scoreEl.style.color = _rCol;\n          rbEl.classList.remove('rb-good','rb-warn','rb-bad');\n          rbEl.classList.add(_rScore>=70?'rb-good':_rScore>=50?'rb-warn':'rb-bad');\n        }\n        // ── Mobile sticky header update ──────────────────────\n        var mshScore = document.getElementById('mshScore');\n        if(mshScore) {\n          mshScore.textContent = last.karv.readiness;\n          mshScore.style.color = last.karv.readinessColor === 'good'\n            ? 'var(--status-ok)' : last.karv.readinessColor === 'warn'\n            ? 'var(--status-caution)' : 'var(--status-concern)';\n        }\n      }\n      // ── Mobile sticky header mini-metrics ───────────────────\n      var mshSpo2  = document.getElementById('mshSpo2');\n      var mshRmssd = document.getElementById('mshRmssd');\n      var mshSleep = document.getElementById('mshSleep');\n      if(mshSpo2  && last.stats)  mshSpo2.textContent  = (last.stats.meanSpo2||'—') + '%';\n      if(mshRmssd && last.hrv)    mshRmssd.textContent = (last.hrv.rmssd||'—');\n      if(mshSleep && last.stats)  mshSleep.textContent = (function(){\n        var m = last.stats.durationMin||0;\n        return Math.floor(m/60)+'h'+(Math.round(m%60)<10?'0':'')+Math.round(m%60)+'m';\n      })();\n    }\n  } catch(_se) {}\n  // Re-apply mode state to newly rendered night rows + accordions\n  if (window.syncAccordions) syncAccordions();\n};\n\n// ── Mobile nav scroll-to-section (Section 7 / 13) ───────────────\nfunction mobileNavTo(sectionId, btn) {\n  document.querySelectorAll('.mobile-nav-item').forEach(function(b){\n    b.classList.remove('active');\n  });\n  if(btn) btn.classList.add('active');\n  var el = document.getElementById(sectionId);\n  // If target element is hidden (e.g. uploadArea after data loads), use\n  // the results container instead, or scroll to the top of the page.\n  if (el && el.style.display === 'none') {\n    var res = document.getElementById('results');\n    el = (res && res.style.display !== 'none') ? res : null;\n  }\n  if (el) {\n    el.scrollIntoView({ behavior:'smooth', block:'start' });\n  } else {\n    window.scrollTo({ top:0, behavior:'smooth' });\n  }\n}\n\n// ── Sidebar nav click → scroll to section ───────────────────────\n(function() {\n  // data-nav attribute → target element ID (or 'lastnight' special-case)\n  var navTargets = {\n    profile:    'userProfilePanel',\n    overview:   'sec-readiness',     // top \"Recovery Readiness · Last Night\" hero\n    lastnight:  '__lastnight__',     // sentinel — resolved dynamically at click time\n    firstnight: '__firstnight__',    // sentinel — oldest night\n    export:     'exportBar',\n  };\n  document.querySelectorAll('.nav-item[data-nav]').forEach(function(item) {\n    var key = item.getAttribute('data-nav');\n    var targetId = navTargets[key];\n    if(!targetId) return;\n    item.addEventListener('click', function() {\n      // Mark active among non-mode nav items only (don't disturb mode buttons)\n      document.querySelectorAll('.nav-item[data-nav]').forEach(function(n){\n        n.classList.remove('active','nav-active');\n      });\n      item.classList.add('active');\n      // Profile needs panel to open first\n      if(targetId === 'userProfilePanel') {\n        if(typeof openProfile === 'function') openProfile();\n        setTimeout(function(){\n          var el = document.getElementById('userProfilePanel');\n          if(el) el.scrollIntoView({ behavior:'smooth', block:'start' });\n        }, 60);\n        return;\n      }\n      // Night jump — nights render newest-first, so details[0] is the most\n      // recent (\"last night\") and details[length-1] is the oldest (\"first night\").\n      if(targetId === '__lastnight__' || targetId === '__firstnight__') {\n        var details = document.querySelectorAll('.night-detail');\n        if (!details.length) {\n          // No data yet — fall back to top of page\n          window.scrollTo({ top:0, behavior:'smooth' });\n          return;\n        }\n        var det = (targetId === '__lastnight__') ? details[0] : details[details.length - 1];\n        // Expand if collapsed\n        if (!det.classList.contains('open')) {\n          if (det.id && typeof toggleDetail === 'function') {\n            toggleDetail(det.id);\n          } else {\n            det.classList.add('open');\n            var pr = det.previousElementSibling;\n            if (pr) pr.setAttribute('aria-expanded', 'true');\n          }\n        }\n        // Land at the start of the night's section (the clickable header row)\n        var row = det.previousElementSibling;\n        var target = row || det;\n        setTimeout(function(){\n          target.scrollIntoView({ behavior:'smooth', block:'start' });\n        }, 60);\n        return;\n      }\n      var el = document.getElementById(targetId);\n      if(el) el.scrollIntoView({ behavior:'smooth', block:'start' });\n      else window.scrollTo({ top:0, behavior:'smooth' }); // fallback before data loaded\n    });\n  });\n\n  // IntersectionObserver: highlight the nav item for the section currently in view\n  var observerMap = {\n    'sec-readiness':  'overview',\n    'exportBar':      'export',\n  };\n  if(!window.IntersectionObserver) return;\n  var observer = new IntersectionObserver(function(entries) {\n    entries.forEach(function(e) {\n      var navKey = observerMap[e.target.id];\n      if(!navKey) return;\n      var navEl = document.querySelector('.nav-item[data-nav=\"'+navKey+'\"]');\n      if(navEl) navEl.classList.toggle('nav-active', e.isIntersecting);\n    });\n  }, { threshold: 0.10 });\n  Object.keys(observerMap).forEach(function(id) {\n    function tryObserve() {\n      var el = document.getElementById(id);\n      if(el) { observer.observe(el); }\n    }\n    tryObserve();\n    document.addEventListener('renderComplete', tryObserve, { once: true });\n  });\n})();\n\n// ── Theme toggle (light / dark) ───────────────────────────────\n(function () {\n  var STORAGE_KEY = 'oxydex_theme';\n  var body = document.body;\n  var btn  = document.getElementById('themeToggleBtn');\n  var icon = document.getElementById('themeIcon');\n  var lbl  = document.getElementById('themeLabel');\n\n  function applyTheme(theme) {\n    if (theme === 'light') {\n      body.classList.add('light');\n      if (icon) icon.textContent = '🌙';\n      if (lbl)  lbl.textContent  = 'Dark';\n    } else {\n      body.classList.remove('light');\n      if (icon) icon.textContent = '☀️';\n      if (lbl)  lbl.textContent  = 'Light';\n    }\n    try { localStorage.setItem(STORAGE_KEY, theme); } catch(e) {}\n  }\n\n  window.toggleTheme = function () {\n    var current = body.classList.contains('light') ? 'light' : 'dark';\n    applyTheme(current === 'light' ? 'dark' : 'light');\n  };\n\n  // Restore saved preference; default = dark\n  var saved = 'dark';\n  try { saved = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('o2ring_theme') || 'dark'; } catch(e) {}\n  applyTheme(saved);\n})();\n\n// ── Parse-warning banner toggle ────────────────────────────────\nfunction pwbToggle(btn) {\n  var d = btn.closest('.parse-warning-banner');\n  if (!d) return;\n  d.classList.toggle('pwb-collapsed');\n  btn.textContent = d.classList.contains('pwb-collapsed')\n    ? '▶ Show details'\n    : '▼ Hide details';\n}\n\n// ── Research accordion toggle (Section 9 / 11) ──────────────────\nfunction toggleResearchAccordion(el) {\n  var acc = el.closest('.research-accordion');\n  if(!acc) return;\n  acc.classList.toggle('open');\n}\n// Auto-open in research mode, close in core/advanced\n(function() {\n  function syncAccordions() {\n    var mode = document.body.dataset.mode || 'core';\n    // Open/close research accordions\n    document.querySelectorAll('.research-accordion').forEach(function(acc) {\n      if(mode === 'research') acc.classList.add('open');\n      else acc.classList.remove('open');\n    });\n    // In research mode, expand ONLY the most-recent night (det0, since nights\n    // render newest-first) so research-tier content is reachable without\n    // unrolling all 8 nights into a 100k-px wall. The rest stay collapsed to\n    // their summary rows — one click opens any of them.\n    // In core/advanced, collapse all rows back to the summary table view.\n    var _dets = document.querySelectorAll('.night-detail');\n    _dets.forEach(function(d, i) {\n      var row = d.previousElementSibling;\n      var openIt = (mode === 'research' && i === 0);\n      if (openIt) { d.classList.add('open'); if(row) row.setAttribute('aria-expanded','true'); }\n      else        { d.classList.remove('open'); if(row) row.setAttribute('aria-expanded','false'); }\n    });\n    // Show/hide the research night-jump rail with the mode\n    var _rail = document.getElementById('nightJumpRail');\n    if (_rail) _rail.style.display = (mode === 'research' && _dets.length > 1) ? 'flex' : 'none';\n    if (window.syncNightRail) window.syncNightRail(mode === 'research' ? 0 : null);\n  }\n  // Expose so toggleDetail can call it when a row is expanded\n  window.syncAccordions = syncAccordions;\n  var _origSetMode = window.setMode;\n  window.setMode = function(mode, btn) {\n    _origSetMode(mode, btn);\n    syncAccordions();\n  };\n  // Initial sync\n  syncAccordions();\n})();\n\n// ── Collapsible sec-label sections (item 5) ────────────────────\n(function() {\n  var CKEY = 'oxydex_collapse_v1';\n  var colState = {};\n  try { colState = JSON.parse(localStorage.getItem(CKEY) || localStorage.getItem('o2ring_collapse_v1') || '{}'); } catch(e) {}\n\n  function saveState() {\n    try { localStorage.setItem(CKEY, JSON.stringify(colState)); } catch(e) {}\n  }\n\n  function initCollapsible(root) {\n    // Find all .sec-label elements that immediately precede a collapsible grid\n    var labels = (root || document).querySelectorAll('.sec-label, .section-title');\n    labels.forEach(function(label) {\n      // Skip if already initialised or if it's an export toolbar or special label\n      if (label.dataset.colInit) return;\n      if (label.closest('#sec-export') || label.closest('.research-accordion-header')) return;\n      label.dataset.colInit = '1';\n\n      // Find the next grid sibling (metric grids, chart grids, etc.)\n      var next = label.nextElementSibling;\n      if (!next) return;\n      // Must be a collapsible container\n      var collapsible = (\n        next.classList.contains('grid') ||\n        next.classList.contains('metric-grid') ||\n        next.classList.contains('chart-grid') ||\n        next.classList.contains('proj-grid') ||\n        next.classList.contains('ss-kpi-grid') ||\n        next.classList.contains('adv-trends') ||\n        next.classList.contains('night-table') ||\n        next.classList.contains('metric-group') ||\n        next.classList.contains('table-wrap') ||\n        next.classList.contains('flags-wrap') ||\n        next.classList.contains('sec-section')\n      );\n      if (!collapsible) return;\n\n      // Build a stable key from label text\n      var key = (label.textContent || '').trim().slice(0, 60).replace(/\\s+/g, '_');\n\n      // Add chevron\n      var chev = document.createElement('span');\n      chev.className = 'sec-chev';\n      chev.innerHTML = '&#9660;'; // ▼\n      label.appendChild(chev);\n      label.style.cursor = 'pointer';\n      label.style.userSelect = 'none';\n\n      // Restore state\n      var collapsed = colState[key] === true;\n      next.dataset.colKey = key;\n\n      function applyState(anim) {\n        if (collapsed) {\n          next.style.display = 'none';\n          chev.style.transform = 'rotate(-90deg)';\n        } else {\n          next.style.display = '';\n          chev.style.transform = 'rotate(0deg)';\n        }\n      }\n      applyState(false);\n\n      label.addEventListener('click', function(e) {\n        // Don't trigger on links or buttons inside the label\n        if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;\n        collapsed = !collapsed;\n        colState[key] = collapsed;\n        saveState();\n        applyState(true);\n      });\n    });\n  }\n\n  // Run on initial render and whenever results are updated\n  // Run once on renderComplete event (belt-and-suspenders for async edge cases)\n  document.addEventListener('renderComplete', function() { initCollapsible(null); });\n  window.initCollapsible = initCollapsible;\n})();\n\n// ── Back to top visibility (item 6) ────────────────────────────\n(function() {\n  var btn = document.getElementById('backToTop');\n  if (!btn) return;\n  var visible = false;\n  function update() {\n    var should = window.scrollY > 300;\n    if (should !== visible) {\n      visible = should;\n      btn.style.opacity = visible ? '1' : '0';\n      btn.style.pointerEvents = visible ? 'auto' : 'none';\n    }\n  }\n  window.addEventListener('scroll', update, { passive: true });\n  update();\n})();\n\n<\u002Fscript>\n\n<script>\n(function(){\n  var CK='oxydex_last_csv', NK='oxydex_last_name';\n  window._cacheO2CSV=function(text,name){\n    try{if(text&&text.length<3e6){localStorage.setItem(CK,text);localStorage.setItem(NK,name||'data.csv');}}catch(e){}\n  };\n  window.addEventListener('DOMContentLoaded',function(){\n    var cached,name;\n    try{cached=localStorage.getItem(CK)||localStorage.getItem('o2ring_last_csv');name=localStorage.getItem(NK)||localStorage.getItem('o2ring_last_name')||'last session';}catch(e){}\n    if(cached){\n      var chip=document.createElement('div');\n      chip.id='lastSessionChip';\n      chip.style.cssText='cursor:pointer;margin:8px 0;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(61,224,208,.08);border:1px solid rgba(61,224,208,.2);border-radius:8px;font-size:12px;color:#3DE0D0';\n      chip.innerHTML='📂 Reload: <strong>'+name+'<\u002Fstrong>';\n      chip.onclick=function(){\n        setProgress&&setProgress(3);\n        try{handleFiles([new File([cached],name,{type:'text/csv'})]);}\n        catch(e){setStatus&&setStatus('⚠ '+e.message,true);}\n      };\n      var ua=document.getElementById('uploadArea');\n      if(ua&&ua.parentNode)ua.parentNode.insertBefore(chip,ua);\n    }\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<!DOCTYPE html>
<!-- OXYDEX-NADIR-HONESTY validation harness (TEMP — delete with _diag/). Runs the REAL OxyDex.computeNight
     on every raw O2Ring night and reports raw vs gated nadir + SPO2_CRITICAL_DIP before/after. -->
<meta charset="utf-8"><title>OxyDex nadir scan</title>
<style>body{font:12px/1.5 ui-monospace,monospace;background:#0d1117;color:#c9d1d9;padding:14px}
#s{color:#d29922;margin-bottom:8px}</style>
<div id="s">loading…</div><div id="out"></div>
<script src="kernel-constants.js"></script>
<script src="signal-frame.js"></script>
<script src="dex-export.js"></script>
<script src="oxydex-util.js"></script>
<script src="crossnight-envelope.js"></script>
<script src="oxydex-registry.js"></script>
<script src="oxydex-cross.js"></script>
<script src="oxydex-profile.js"></script>
<script src="oxydex-dsp.js"></script>
<script>
window.__scan={done:false,rows:[]};
var FIX={"20260612230016":1,"20260624222730":1};
var NIGHTS=["20260503210952","20260504202108","20260505202850","20260506200404","20260508202715","20260509205816","20260510202758","20260511202506","20260512205931","20260513205234","20260514195655","20260515221145","20260516212716","20260523213607","20260524214603","20260525205138","20260526201703","20260527220947","20260528213955","20260529215039","20260606220627","20260607221250","20260608214045","20260609213224","20260610211847","20260611210603","20260612230016","20260612230016_dup","20260613204643","20260614211954","20260615215711","20260616221235","20260617222311","20260618214109","20260619221457","20260620225031","20260621213131","20260622225513","20260623235633","20260624222730","20260625215617","20260626214541","20260626214541_dup","20260702220521"];
async function run(){
  for(var i=0;i<NIGHTS.length;i++){
    var name=NIGHTS[i]; document.getElementById('s').textContent='scan '+(i+1)+'/'+NIGHTS.length+' '+name;
    var stamp='O2Ring_'+name.replace('_dup','')+'.csv';
    var text; try{ text=await (await fetch('_diag/nights/O2Ring_'+name+'.csv')).text(); }catch(e){ window.__scan.rows.push({d:name,err:'fetch'}); continue; }
    var night, cerr=null;
    try{ night=OxyDex.computeNight({text:text,fileMeta:{fname:stamp,file:null}},stamp); }catch(e){ cerr=e.message; }
    var s=(night&&night.stats)?night.stats:{};
    var flags=(night&&night.flags?night.flags:[]).map(function(f){return f.code||f;});
    var raw=(s.minSpo2Raw!=null)?s.minSpo2Raw:s.minSpo2;
    window.__scan.rows.push({
      d:name, fix:!!FIX[name.replace('_dup','')],
      rawMin:raw, gatedMin:s.minSpo2, excl:s.nadirArtifactExcluded||0,
      moved:(s.minSpo2Raw!=null),
      crit:flags.indexOf('SPO2_CRITICAL_DIP')>=0,
      meanHr:s.meanHr, warm:s.sensorWarmupTrimmed||0,
      nadirFlag:flags.filter(function(c){return /SPO2_NADIR_GATED/.test(c)})[0]||'', cerr:cerr
    });
    await new Promise(function(r){setTimeout(r,0)});
  }
  render(); window.__scan.done=true; document.getElementById('s').textContent='DONE '+window.__scan.rows.length;
}
function render(){
  var r=window.__scan.rows;
  var moved=r.filter(function(x){return x.moved});
  var critAfter=r.filter(function(x){return x.crit}).length;
  var h='<b>moved (gate fired): '+moved.length+'/'+r.length+' · SPO2_CRITICAL_DIP after: '+critAfter+'</b><br><br>';
  h+='date              raw  gated  excl  crit  meanHr  FIX  note<br>';
  r.forEach(function(x){
    if(x.err){h+=x.d+'  ERR '+x.err+'<br>';return;}
    var col=x.moved?'#7ee787':(x.fix?'#d29922':'#8b949e');
    h+='<span style="color:'+col+'">'+x.d.padEnd(17)+String(x.rawMin).padStart(3)+'  '+String(x.gatedMin).padStart(4)+'  '+String(x.excl).padStart(4)+'  '+(x.crit?'YES':' - ')+'  '+String(x.meanHr).padStart(5)+'  '+(x.fix?'★':' ')+'   '+(x.cerr?('ERR '+x.cerr):x.nadirFlag)+'</span><br>';
  });
  document.getElementById('out').innerHTML=h;
}
run();
</script>

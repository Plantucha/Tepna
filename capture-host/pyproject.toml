# tepna-capture — Python tooling config (out-of-suite; the JS suite is unaffected).
# Copyright 2026 Michal Planicka · SPDX-License-Identifier: Apache-2.0

[tool.pytest.ini_options]
testpaths = ["tests"]

# Coverage config (CAPTURE-HOST-FOLLOWUPS-III test-coverage). Inert for a plain `pytest` run — it only
# takes effect when CI passes `--cov`, so a dev without pytest-cov installed still runs the suite clean.
# Source only (tests/harness/venvs excluded); the bleak/aiohttp runtime modules (capture/webmon/bonding/
# pull_session/polar_psftp) can't import in a hardware-free CI, so they read 0% here by construction.
[tool.coverage.run]
source = ["."]
omit = ["tests/*", ".venv*/*", "*/site-packages/*"]

[tool.coverage.report]
skip_empty = true
# Standard, reviewable exclusions. `if __name__ == "__main__":` CLI entry blocks are exercised by running
# the module as a script, not by unit tests — every module here that has one is a hand-run diagnostic /
# operator tool (bonding, pull_session, polar_psftp, probe_oxyii_ppg) or the daemon's own launcher
# (capture). Also the usual defensive/typing lines. Anything excluded with `# pragma: no cover` inline
# carries a comment explaining WHY it is unreachable.
exclude_also = [
    'if __name__ == .__main__.:',
    'raise NotImplementedError',
    'if TYPE_CHECKING:',
]

[tool.ruff]
line-length = 120
target-version = "py311"

# Starter lint: real errors only (E9 syntax, F pyflakes — undefined names, unused imports, bad f-strings).
# Deliberately NOT the style rules yet, so it flags bugs without churning the reverse-engineered code.
[tool.ruff.lint]
select = ["E9", "F"]

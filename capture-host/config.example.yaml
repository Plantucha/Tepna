# tepna-capture — example config.  Copy to config.yaml and edit.
# Copyright 2026 Michal Planicka · SPDX-License-Identifier: Apache-2.0

# Where nightly captures are written. The web server serves <root>/app; captures land under <root>/captures.
root: /srv/tepna
incoming_subdir: captures/incoming      # daemon writes here; a night-roller moves to captures/<YYYY-MM-DD>/
adapter: "XX:XX:XX:XX:XX:XX"            # BLE adapter MAC for bonding (bluetoothctl select). Omit = default
                                        # controller. On a multi-radio host, pin the bedside dongle here.

web:                                    # monitor + control page (HEALTH-BOX-VISION §4 live-view). Bind LAN only.
  enabled: true
  host: 0.0.0.0                         # the box serves the LAN; use 127.0.0.1 for a localhost-only test
  port: 8760

watchdog:                               # auto-recover a WEDGED BLE controller (frozen-monitor failure).
  enabled: true                         #   Acts ONLY on unambiguous wedge signs (InProgress / phantom
  interval_sec: 60                      #   BlueZ link) — NEVER on 'sensors not worn' (clean not-found).
  grace_checks: 2                       #   consecutive wedged checks before a controller power-cycle
  max_adapter_cycles: 3                 #   hard cap so recovery can never loop (external supervisor beyond)

link:                                   # weak-signal warning. Stream-rate health (packet rate vs nominal)
  rssi_enabled: true                    #   is always on & needs no privilege. RSSI dBm enrichment needs a
  rssi_interval_sec: 25                 #   NOPASSWD-sudo helper (tepna-rssi.sh) — connection RSSI is root-
                                        #   only on BlueZ; without the grant it auto-disables (rate only).

# Host clock MUST be NTP-synced and set to your real local timezone — arrival stamps depend on it.
# Stored values are floating wall-clock (Clock Contract); we write the LOCAL civil time, zone-free.

devices:
  # Polar H10 chest strap — raw ECG (MANDATORY live stream; onboard keeps only HR/RR).
  - name: Polar H10
    vendor: Polar
    model: H10
    device_id: AAAAAAAA          # short stable id used in filenames + companion pairing (one per physical sensor)
    address: "XX:XX:XX:XX:XX:XX" # BLE MAC (find with: bluetoothctl scan on). Passing MAC > name = faster/robust connect.
    streams: [ecg, acc, hr]      # ecg = the node input; acc/hr = sidecars (paired by device_id+stamp)

  # Polar Verity Sense armband — PPG (+ motion). Live OR press the button for onboard offline.
  - name: Polar Verity Sense
    vendor: Polar
    model: VeritySense
    device_id: BBBBBBBB
    address: "YY:YY:YY:YY:YY:YY"
    streams: [ppg, acc]

  # Muse S — raw EEG. Captured via a child tool, NOT bleak directly. Pick by firmware:
  - name: Muse S
    vendor: Muse
    model: S
    device_id: DDDDDDDD
    address: "ZZ:ZZ:ZZ:ZZ:ZZ:ZZ"
    streams: [eeg]
    muse_tool: muselsl           # "muselsl" (Muse 2 / S gen 1-2) | "openmuse" (Muse S Athena)

  # Wellue O2Ring-S / T8520 (advertises as "S8-AW …") — LIVE SpO2 + pulse via the OxyII protocol
  # (run_oxyii; no bond, no vendor-app round-trip). Older O2Rings on the legacy Viatom protocol:
  # add `protocol: legacy` to route them through run_viatom instead.
  - name: Wellue O2Ring-S
    vendor: Wellue
    model: O2Ring-S
    device_id: CCCCCCCC
    address: "WW:WW:WW:WW:WW:WW"        # Random-Static MAC — rotates on factory reset; re-scan if it changes
    streams: [spo2]

# Lingo (CGM) and CPAP (EDF) are NOT live-captured — drop their exports into captures/<night>/:
#   - Lingo:  encrypted/locked  -> Health Connect / Apple Health export -> drop in   (how-to-collect/libre-cgm.md)
#   - CPAP:   SD card / ezShare Wi-Fi SD pull of DATALOG/*.edf -> drop in             (how-to-collect/cpap-edf.md)
